openapi: 3.1.0
info:
  title: 商户后台 账户账务与清结算 (20-06 / D-MERCH BFF) — 前端契约面
  version: 0.5.0
  contact:
    name: Merchant Portal BFF (D-MERCH owner)
  description: |
    商户后台 React SPA 消费的资金概览 / 账户流水 / 结算单 / 月度账单 / 退款预留金管理 / 数据导出 契约。 本服务是**投影读 + 薄写编排**层：读经 JOIN 上游发布视图（10-05 余额 / 流水、10-06 结算单、10-07 月度账单）， 写经编排:储备金资金动作 → 10-05 reserve-movements（Top Up / Withdraw / auto-replenish 执行）、**auto-replenish 配置 → FINACCT 本地 `refund_reserve_config`**、Owner email OTP → 40-06 step-up； 本服务**不自落资金分录、不自管 OTP、不重定义资金口径**，OWNS 仅 D-MERCH 本地：展示配置 / 导出任务 / 储备金操作发起记录（BFF 侧，非权威资金）。 金额一律商户唯一结算币种（单商户单结算币种，骨干 11）；金额最小币种单位整数字符串（components Money）。字段类型以本 spec 为准，业务规则见 requirements。 幂等 / CSRF 口径:① **有副作用的写**（储备金 funding / withdrawal、导出创建）挂 Idempotency-Key（资金路径强一致，重投返原结果）;OTP 挑战类按流程语义不挂幂等键。 ② cookieAuth 的非安全方法（POST/PUT/DELETE）一律挂 X-CSRF-Token（double-submit，fail-closed）;无公开端点（资金面全程受 RBAC + 会话）。 鉴权 / 行级授权:所有读写均限会话当前 merchant scope（merchant 上下文从会话取、不信请求体）;储备金 funding（Top Up / auto-replenish）经 Owner email OTP（40-06 **资金动作 step-up** `/step-up/fund-actions`,BFF 编排）放行,Withdraw 不要求 OTP（仅内部回 Account Balance、不外流）。 状态码约定（同 20-01 BFF）:会话失效 / 未认证由边缘网关 + 会话层统一 **401**,业务面端点只表达 **403**（无权限 / scope 不符 / OTP 失败 / fail-secure），故各端点列 403 不列 401（有意一致省略）;跨 scope 资源统一 **404** 防枚举。
servers:
  - url: /api/merchant/v1
    description: 商户后台 BFF（经边缘网关；浏览器 ↔ BFF 用会话 cookie）
security:
  - cookieAuth: []
tags:
  - name: account-overview
    description: 资金概览：Account Balance / To Settle（派生展示）/ Refund Reserve / 可用额，商户结算币种。只读投影 10-05 v_account_balance_v1。(FINACCT-FR-01)
  - name: account-ledger
    description: 账户流水（Account Ledger）：每笔资金进出只读分页查询（过滤 + 搜索 + 双池可见）。只读投影 10-05 v_account_statement_v1。(FINACCT-FR-02)
  - name: settlement
    description: 结算单（Settlement）：按清算周期 / 状态查列表 + 逐笔结算影响明细详情。只读投影 10-06 v_settlement_summary_v1 / v_settlement_line_v1。(FINACCT-FR-03/04)
  - name: statement
    description: 月度账单（Statement）：服务费账单查阅 + 详情 + PDF 导出。只读投影 10-07 v_statement_v1（待建上游契约）。(FINACCT-FR-05)
  - name: refund-reserve
    description: 退款预留金管理：Top Up（手动充值）/ auto-replenish 配置（均经 Owner email OTP）/ Withdraw（取回 Account Balance，无 OTP）。Top Up/Withdraw 转发 10-05;auto-replenish 配置 FINACCT 本地、执行由 FINACCT 触发;OTP 经 40-06。(FINACCT-FR-06/07/08)
  - name: export
    description: 数据导出：结算单 / 流水 / 账单（Excel / PDF），与当前查询条件一致、不局限当前分页；大结果集异步处理、记审计。(FINACCT-FR-09)
paths:
  /account/overview:
    get:
      tags:
        - account-overview
      operationId: getAccountOverview
      summary: 资金概览（Account Balance / To Settle / Refund Reserve / 可用额）
      description: |
        投影 10-05 v_account_balance_v1（商户 scope）：Account Balance（canonical 账本值恒 ≥ 0）、To Settle（D-CORE 按手续费结算模式派生、本域不二次计算）、Refund Reserve、可用额（= AB − 应收商户款,可呈负,纯展示）。 Account Balance 卡片展示值是否并入平台侧预授权挂起额由**管理后台设置的 per-商户展示配置**控制（默认并入,20-06 只读消费、不改 canonical 账本值）。上游超时 → degraded=true 降级展示"暂不可用",不阻塞页面（FR-01-AC-04）。
      responses:
        '200':
          description: 资金概览（商户唯一结算币种）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountOverview'
              example:
                accountBalance:
                  amount: '1250050'
                  currency: CAD
                toSettle:
                  amount: '320075'
                  currency: CAD
                refundReserve:
                  amount: '500000'
                  currency: CAD
                availableBalance:
                  amount: '1230050'
                  currency: CAD
                currency: CAD
                settlementMode: NETTING
                preauthHoldIncludedInDisplay: true
                degraded: false
        '403':
          $ref: '#/components/responses/Forbidden'
  /account/ledger:
    get:
      tags:
        - account-ledger
      operationId: listAccountLedger
      summary: 账户流水查询（过滤 + 搜索 + 分页，只读分录投影）
      description: |
        投影 10-05 v_account_statement_v1（商户 scope，L2，索引 + 时间范围 + posted_at 倒序）。 时间倒序分页;每行含资金池 / 类型 / 带符号金额 / 对应资金池变动后余额 / 关联单据或操作记录。空结果返回空态、不报错。默认时间窗避免空窗（业务参数可配 X-07）。
      parameters:
        - name: dateFrom
          in: query
          schema:
            $ref: '#/components/schemas/Timestamp'
          description: 起始时间（含;缺省取默认窗）
        - name: dateTo
          in: query
          schema:
            $ref: '#/components/schemas/Timestamp'
          description: 结束时间（含）
        - name: type
          in: query
          description: 类型过滤（可多值）
          schema:
            type: array
            items:
              $ref: '#/components/schemas/LedgerEntryType'
        - name: pool
          in: query
          schema:
            $ref: '#/components/schemas/FundPool'
          description: 资金池过滤（缺省两池均含）
        - name: keyword
          in: query
          schema:
            type: string
            maxLength: 128
          description: 关键字（关联订单号 / 流水号 / 操作记录号;上界防注入 / DoS）
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 账户流水分页（时间倒序）
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    type: integer
                    format: int64
                    description: 总记录数
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LedgerEntry'
              example:
                total: 132
                data:
                  - entryId: led_2026051914300001
                    occurredAt: '2026-05-19T14:30:00Z'
                    pool: ACCOUNT_BALANCE
                    type: PAYMENT
                    amount:
                      amount: '9710'
                      currency: CAD
                    balanceAfter:
                      amount: '1250050'
                      currency: CAD
                    relatedRef:
                      kind: ORDER
                      id: ord_88231
                      label: '#88231'
                  - entryId: led_2026051815200002
                    occurredAt: '2026-05-18T15:20:00Z'
                    pool: ACCOUNT_BALANCE
                    type: REFUND
                    amount:
                      amount: '-2500'
                      currency: CAD
                    balanceAfter:
                      amount: '1240340'
                      currency: CAD
                    relatedRef:
                      kind: REFUND
                      id: rfd_5521
                      label: '#88102-R'
        '403':
          $ref: '#/components/responses/Forbidden'
  /settlements:
    get:
      tags:
        - settlement
      operationId: listSettlements
      summary: 结算单列表（周期 / 状态过滤 + 搜索 + 排序 + 分页）
      description: |
        投影 10-06 v_settlement_summary_v1（商户 scope，L2）。日期倒序默认;状态过滤为商户视角四态投影（待结算 / 处理中 / 已结算 / 失败,UNCONFIRMED 并入处理中,不展示具名冻结态）。 FAILED 行标记并提示资金退回待结算池、后续重新归集或人工处置。默认窗覆盖近期有数据范围（业务参数可配 X-07）。
      parameters:
        - name: dateFrom
          in: query
          schema:
            $ref: '#/components/schemas/Timestamp'
        - name: dateTo
          in: query
          schema:
            $ref: '#/components/schemas/Timestamp'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SettlementStatus'
          description: 商户视角状态过滤
        - name: keyword
          in: query
          schema:
            type: string
            maxLength: 128
          description: 结算单号 / 金额（上界防注入 / DoS）
        - name: sort
          in: query
          description: 排序（默认 settlementDate 倒序）
          schema:
            type: string
            enum:
              - settlementDate_desc
              - settlementDate_asc
              - settledAmount_desc
              - settledAmount_asc
            default: settlementDate_desc
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 结算单分页
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    type: integer
                    format: int64
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SettlementSummary'
              example:
                total: 24
                data:
                  - settlementId: stl_20260519
                    period:
                      from: '2026-05-18T00:00:00Z'
                      to: '2026-05-18T23:59:59Z'
                    netSales:
                      amount: '452000'
                      currency: CAD
                    fee:
                      amount: '13115'
                      currency: CAD
                    settledAmount:
                      amount: '438885'
                      currency: CAD
                    status: SETTLED
                    settlementDate: '2026-05-19T08:00:00Z'
        '403':
          $ref: '#/components/responses/Forbidden'
  /settlements/{settlementId}:
    get:
      tags:
        - settlement
      operationId: getSettlementDetail
      summary: 结算单详情（批次汇总 + 逐笔结算影响明细）
      description: |
        投影 10-06 v_settlement_summary_v1（汇总）+ v_settlement_line_v1（逐笔明细，商户 scope）。 逐笔结算金额合计 = 汇总本期结算金额（手续费列另计、不参与该合计,FR-04-AC-02）;退款行金额为负;非交易类结算影响明细（Top Up / auto-replenish / Withdraw / 系统账务）展示来源标识与带符号结算金额、计入合计。当前生效结算账户（银行后 4 位）只读消费自 ME。跨 scope settlementId → 404（防枚举）。
      parameters:
        - name: settlementId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 结算单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementDetail'
              example:
                summary:
                  settlementId: stl_20260519
                  period:
                    from: '2026-05-18T00:00:00Z'
                    to: '2026-05-18T23:59:59Z'
                  netSales:
                    amount: '452000'
                    currency: CAD
                  fee:
                    amount: '13115'
                    currency: CAD
                  settledAmount:
                    amount: '438885'
                    currency: CAD
                  status: SETTLED
                  settlementDate: '2026-05-19T08:00:00Z'
                lines:
                  - type: PAYMENT
                    relatedRef:
                      kind: ORDER
                      id: ord_88231
                      label: '#88231'
                    amount:
                      amount: '10000'
                      currency: CAD
                    fee:
                      amount: '290'
                      currency: CAD
                    settlementAmount:
                      amount: '9710'
                      currency: CAD
                    occurredAt: '2026-05-18T11:02:00Z'
                  - type: REFUND_REVERSAL
                    relatedRef:
                      kind: REFUND
                      id: rfd_5521
                      label: '#88102-R'
                    amount:
                      amount: '2500'
                      currency: CAD
                    settlementAmount:
                      amount: '2500'
                      currency: CAD
                    occurredAt: '2026-05-18T15:20:00Z'
                settlementAccountLast4: '6789'
                currency: CAD
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /statements:
    get:
      tags:
        - statement
      operationId: listStatements
      summary: 月度账单列表（按年份过滤）
      description: |
        投影 10-07 v_statement_v1（商户 scope，**待建上游契约,见 design 决策 B**）。服务费账单——按年份过滤;列 = 期间（月）/ Net Settlement（月度净结算汇总）/ 交易笔数 / 服务费 / 可见状态（ISSUED / PAID,如上游提供）。无数据返回空态。
      parameters:
        - name: year
          in: query
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
          description: 年份过滤（缺省取最近有数据年;有界防异常输入）
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 月度账单分页
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    type: integer
                    format: int64
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatementSummary'
              example:
                total: 12
                data:
                  - statementId: stmt_2026-04
                    period: 2026-04
                    netSettlement:
                      amount: '9820000'
                      currency: CAD
                    txnCount: 3421
                    serviceFee:
                      amount: '284900'
                      currency: CAD
                    status: ISSUED
        '403':
          $ref: '#/components/responses/Forbidden'
  /statements/{statementId}:
    get:
      tags:
        - statement
      operationId: getStatementDetail
      summary: 月度账单详情（服务明细分行 + Net Settlement）
      description: |
        投影 10-07 v_statement_v1 详情（商户 scope）。含发票号 + 出具日期 + 服务明细（按服务 / 渠道分行:笔数 / Gross / 费率 / Fee）+ Gross Volume / Service Fee / Net Settlement;不含税 / 终端 APP 订阅费、不区分收费模式（FR-05-AC-03）。跨 scope → 404。
      parameters:
        - name: statementId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 月度账单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatementDetail'
              example:
                statementId: stmt_2026-04
                invoiceNo: INV-2026-04-000123
                issuedAt: '2026-05-01T00:00:00Z'
                currency: CAD
                serviceLines:
                  - service: In-store QR
                    channel: WeChat Pay
                    count: 1820
                    gross:
                      amount: '5200000'
                      currency: CAD
                    rate: 2.65%
                    fee:
                      amount: '137800'
                      currency: CAD
                  - service: Online
                    channel: Alipay
                    count: 1601
                    gross:
                      amount: '4904900'
                      currency: CAD
                    rate: 3.00%
                    fee:
                      amount: '147100'
                      currency: CAD
                grossVolume:
                  amount: '10104900'
                  currency: CAD
                serviceFee:
                  amount: '284900'
                  currency: CAD
                netSettlement:
                  amount: '9820000'
                  currency: CAD
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /statements/{statementId}/pdf:
    get:
      tags:
        - statement
      operationId: getStatementPdf
      summary: 单月账单 PDF 导出
      description: 按 FR-05 详情口径生成可下载 PDF（列头 / 枚举 / 日期 / 金额按用户 locale 本地化 X-06,金额带商户结算币种）。跨 scope → 404。
      parameters:
        - name: statementId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 账单 PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /refund-reserve/otp-challenges:
    post:
      tags:
        - refund-reserve
      operationId: requestRefundReserveOtp
      summary: 发起 Owner email OTP 挑战（绑定本次操作摘要）
      description: |
        编排 40-06 **资金动作 step-up**（`POST /step-up/fund-actions`;本服务不自管 OTP）。BFF 据请求体操作摘要按 canonical 形式算 `actionFingerprint`、并注入 **`actionType`（常量 `REFUND_RESERVE_FUNDING`、BFF 固定生成）** + 据**会话当前 merchant 上下文**定的 `merchantId` 与 **Owner `approverIdentityId`（谁是该 merchant 的 Owner 由本域确定，40-06 不判定）**，一并传 40-06——`actionType` / `merchantId` / Owner 一律 BFF 注入、取会话 scope、**不信请求体**（无有效 scope → 403 不发起）。challenge **绑定 actionType + 操作摘要 canonical 指纹**（topUpAmount + autoReplenish.enabled/accountLimit + **字段存在性**）+ merchant + approver + identity + client + **发起会话 sid** —— funding 提交时校验摘要指纹一致 ∧ 当前会话 sid == challenge 绑定 sid（跨会话提交 → 403）,**防 confused-deputy**（批 A 放行 B:员工发起小额 challenge、Owner 报码、员工改提交大额 / 任意 accountLimit）。40-06 向 Owner（`approverIdentityId` 的已验证邮箱）发一次性 OTP,返回 challengeId + 脱敏目标 + 冷却。`displaySummary` 由 BFF 从**同一 canonical 摘要派生**（不可与 fingerprint 分叉,防 Owner 看小额放大额）。OTP 有效期 / 冷却 / 错误尝试上限为业务参数（默认可配 X-07,上限委派 40-06）。挑战类不挂幂等键（每次重新发起）。Top Up 与 auto-replenish 同次共用一次 OTP（FR-07-AC-07;摘要含 config 全字段,Owner 知悉同时变更自动补足规则）。
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/RefundReserveOperationSummary'
              unevaluatedProperties: false
            example:
              topUpAmount:
                amount: '100000'
                currency: CAD
              autoReplenish:
                enabled: true
                accountLimit:
                  amount: '50000'
                  currency: CAD
      responses:
        '202':
          description: OTP 已发起（或冷却结束后重发）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpChallenge'
              example:
                challengeId: chl_9f2a7c
                deliveredTo: o***@e***.com
                cooldownSeconds: 60
                expiresAt: '2026-05-19T14:35:00Z'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /refund-reserve/funding:
    post:
      tags:
        - refund-reserve
      operationId: submitRefundReserveFunding
      summary: 储备金充值 + auto-replenish 配置（单次 Owner email OTP；二者至少其一）
      description: |
        合并入口（FR-06 Top Up + FR-07 auto-replenish 配置可单独或同次提交,FR-07-AC-07 单 OTP 覆盖）。**两阶段 OTP-gated intent 编排**(见 design §跨部署服务交互路由「储备金 funding 单 OTP 双写」): ① 首次以 `Idempotency-Key` 创建 `reserve_operation_intent`(持久化操作摘要**归一规范形式** + challengeId + **确定性派生键**:两子写键 `{intentId}:top_up` / `{intentId}:auto_replenish_config` + **40-06 verify 幂等键 `{intentId}:{challengeId}:stepup`**〔**per-challenge**:重绑新 challenge 自然换键、不撞旧已消费行〕——崩溃重试复用、绝不新生成); ② 校验提交摘要与 challenge 绑定摘要一致(失配 → 拒绝重挑战,防 confused-deputy)→ 调 40-06 verify 校验 OTP(**以确定性键 `{intentId}:{challengeId}:stepup` 调用**——响应丢 / 崩溃后重试同键 → 40-06 短 TTL 返**首次 verification 成功事实**〔`verified`/`verificationId`,即使 challenge 此刻已过期〕、**不撞「异键→已消费→410」死锁**;失败 → 二者都不生效,FR-06-AC-03 / FR-07-AC-02;OTP 错误尝试上限锁定 → 40-06 返 **423**、限流 → 429,BFF 不放大尝试)→ **持久化「OTP 放行 marker」入 intent**(marker = verify 成功事实,**40-06 不再签放行 proof**;放行维度在子写阶段由 intent 摘要真相源（摘要绑定不变量）等价 enforce,见 §安全落地); ③ 凭 marker 推进两单写者(**OTP 不再二次校验** —— 解 40-06 OTP 单次原子消费与重试冲突):topUpAmount → 转发 10-05 `POST /ledger/reserve-movements(top_up)` 以子写键 `{intentId}:top_up` 作 `idempotencyKey=businessDocRef`(守 AB 足额 LEDGER-INV-05);autoReplenish → **FINACCT 本地 `refund_reserve_config` upsert**(配置写幂等、非 10-05 转发;auto-replenish 实际补足执行由 FINACCT `AutoReplenishService` 后续反应 Reserve-low 时发起)。 **重试**:同 `Idempotency-Key` 重投 → 载入既有 intent → 凭已持久化 marker + 子写键复用推进未完成子写(**绝不新生成键** → 10-05 凭子写键幂等去重,LEDGER-ERR-03,**不重复划转**);**重投摘要须与 intent 持久化摘要 canonical 一致,否则 409(同键异摘要),不推进子写**;**同 `Idempotency-Key` 但带异 `otp.challengeId` 默认按冲突拒——唯一例外 = marker 未落 ∧ 旧 challenge 已过期 ∧ 摘要不变时的「重绑」**(`reserve_operation_intent.challenge_id` 经 CAS 指向 BFF 新 initiate 的 challenge、verify 键随 challengeId 换新,见 §安全落地恢复矩阵格③);部分失败(topUp 成功 / config 失败)各自凭子写键重试(无跨 owner 原子写,良性中间态)。 **资金真相源(摘要绑定不变量)**:子写转发 10-05 的 amount / operation / config **一律取 intent 持久化摘要、不取本次请求体**(请求体仅作幂等键匹配 + 摘要一致性校验)——堵「重试维度放大已 OTP 背书的金额 / 夹带 config」。摘要绑定 + 会话 sid 校验见 §安全落地。金额 > 0 由 PositiveMoney schema 守;auto-replenish 开启时 accountLimit 必填且 > 0(FR-07-AC-08,if/then + PositiveMoney 守)。
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: '**端点级必填**（资金写资损红线;BFF 据此建 / 载入 intent + 确定性派生子写键,缺失 → 400 不可推进）。**注**:此前端面键 ≠ 转发 10-05 的 `idempotencyKey`——BFF 按 intent 派生 per-子写键作下游 idempotencyKey,前端键仅用于 BFF 侧 intent 去重,**严禁透传为下游 body idempotencyKey**。'
          schema:
            type: string
            minLength: 1
            pattern: \S
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundReserveFundingRequest'
            example:
              topUpAmount:
                amount: '100000'
                currency: CAD
              autoReplenish:
                enabled: true
                accountLimit:
                  amount: '50000'
                  currency: CAD
              otp:
                challengeId: chl_9f2a7c
                code: '482915'
      responses:
        '200':
          description: 已处理（**响应项 ⟺ 请求提交项**:topUpAmount 提交则有 topUpResult、autoReplenish 提交则有 autoReplenishResult;部分项失败时该项 status=FAILED、未达终态时 PENDING,各凭子写键可重试）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundReserveFundingResult'
              example:
                topUpResult:
                  operationId: rop_5f31a0
                  kind: TOP_UP
                  status: SUCCEEDED
                  amount:
                    amount: '100000'
                    currency: CAD
                  fundEventId: fe_77120
                  occurredAt: '2026-05-19T14:33:10Z'
                autoReplenishResult:
                  status: SAVED
                  enabled: true
                  accountLimit:
                    amount: '50000'
                    currency: CAD
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: OTP 校验失败 / 摘要与 challenge 绑定失配(摘要绑定不变量) / challenge 会话 sid 不符 / 无权限(fail-secure;失败时二者都不生效,FR-06-AC-03)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: 同 front Idempotency-Key 但提交摘要与 intent 持久化摘要不一致（同键异摘要,不推进子写;防重试维度放大）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '410':
          $ref: '#/components/responses/Gone'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /refund-reserve/withdrawals:
    post:
      tags:
        - refund-reserve
      operationId: submitRefundReserveWithdrawal
      summary: 储备金取回 Account Balance（无 OTP）
      description: |
        转发 10-05 POST /ledger/reserve-movements(withdraw,守 Refund Reserve 足额,LEDGER-INV-05)以 BFF 生成的子写键作 `idempotencyKey=businessDocRef`。资金回 Account Balance 后随正常结算入银行、不发起独立 payout、不提供外部目的地选择、不要求 Owner email OTP（FR-08-AC-03）。 **应收抵扣在 10-05 账本内部完成**(借 Refund Reserve / 贷 应收先冲减 → AB,账本口径归 10-05,BFF 不可见不编排)。`max=true`（取回全部）转发 10-05 `drainReserve`（**已落地**:10-05 在 reserve 的 per-account version CAS 临界区内 resolve drain 额 = 当时 balance−reserved,原子无 TOCTOU、按子写键幂等;BFF 不自读余额填 amount〔防重引 TOCTOU〕）。固定额 Withdraw 走 amount。金额 ≤ 0 / 执行时 Refund Reserve 不足 → 拒绝、不划转、不创建子写（FR-08-AC-02）。资金路径幂等（X-05;同 `Idempotency-Key` 重投载入 intent 复用子写键、不重复划转）。
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: '**端点级必填**（资金写资损红线;BFF 据此建 / 载入 intent + 派生子写键,缺失 → 400 不可推进）。前端面键 ≠ 转发 10-05 的 `idempotencyKey`,**严禁透传同值**。'
          schema:
            type: string
            minLength: 1
            pattern: \S
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundReserveWithdrawalRequest'
            examples:
              fixedAmount:
                summary: 固定额取回
                value:
                  amount:
                    amount: '30000'
                    currency: CAD
              drainAll:
                summary: 取回全部（转发 10-05 drainReserve）
                value:
                  max: true
      responses:
        '200':
          description: 取回处理结果（未达终态时 status=PENDING,凭子写键可重试收敛）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReserveOperationResult'
              example:
                operationId: rop_6a02bd
                kind: WITHDRAW
                status: SUCCEEDED
                amount:
                  amount: '30000'
                  currency: CAD
                fundEventId: fe_77130
                occurredAt: '2026-05-19T15:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /refund-reserve/operations/{operationId}:
    get:
      tags:
        - refund-reserve
      operationId: getReserveOperation
      summary: 查询储备金操作状态（PENDING 轮询入口）
      description: 查询储备金操作（intent）的**全部子写**状态（前端**不直连 10-05**,BFF 代查 10-05 getFundEventResult 收敛后返回 `OperationDetail`,含 topUp / withdraw / **auto-replenish config 子写**——解「浏览器丢 Idempotency-Key / 换端后 config PENDING 不可见」）。PENDING 子项凭 `operationId` 轮询本端点收敛,或以原 `Idempotency-Key` 重投原写端点（幂等返原结果、BFF 不另划转）。跨 scope operationId → 404。
      parameters:
        - name: operationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 操作（intent）全部子写状态（含终态 / PENDING）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationDetail'
              example:
                operationId: rop_5f31a0
                opType: FUNDING
                topUpResult:
                  operationId: rop_5f31a0
                  kind: TOP_UP
                  status: SUCCEEDED
                  amount:
                    amount: '100000'
                    currency: CAD
                  fundEventId: fe_77120
                  occurredAt: '2026-05-19T14:33:10Z'
                autoReplenishResult:
                  status: SAVED
                  enabled: true
                  accountLimit:
                    amount: '50000'
                    currency: CAD
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /exports:
    post:
      tags:
        - export
      operationId: createExport
      summary: 创建导出任务（结算单 / 流水 / 账单；Excel / PDF；异步）
      description: |
        按当前查询条件（筛选 / 搜索 / 排序）创建导出任务,范围与查询一致、不局限当前分页（FR-09-AC-01/03）。**导出 scope = 发起会话 merchant scope**(持久化进 export_job.scope_snapshot 作 **scope 上界冻结、只防放宽**;worker 执行复用同一行级授权 chokepoint,**不在执行时重信 filters / resourceId 放宽 scope**;resourceId 跨 scope → 拒绝/404)。导出是绕分页的批量读路径——实时授权**分阶段**:**worker 异步执行 = 发起 operator 的 membership / 读权限当前有效(40-06 在线求值、与活跃会话解耦;operator 登出 / 会话自然过期不拒执行,仅 membership 撤销 / 降权拒)**;**同步下载 = 会话 + membership 双裁决**。即「scope_snapshot 不放宽 ∩ 实时 membership 不越当前权限」取交集——撤权 operator 不能带走数据,又不误伤登出后的正常异步任务。详 design §安全落地。大结果集异步处理、超业务参数上限不静默丢弃而给超限提示或转异步（FR-09-AC-07）;导出请求记审计事件（X-03,FR-09-AC-08）;空结果导出空表头文件或提示无数据。OWNS 导出任务（D-MERCH 本地 export_job）。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
            example:
              kind: LEDGER
              format: XLSX
              filters:
                dateFrom: '2026-05-01T00:00:00Z'
                dateTo: '2026-05-19T23:59:59Z'
                pool: ACCOUNT_BALANCE
      responses:
        '202':
          description: 导出任务已受理（轮询 GET /exports/{exportJobId} 取结果）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              example:
                exportJobId: exp_3c81f0
                status: PENDING
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /exports/{exportJobId}:
    get:
      tags:
        - export
      operationId: getExport
      summary: 查询导出任务状态 / 下载
      description: 查询导出任务状态;READY 时 downloadUrl **指向本 BFF 下载端点**(应用代理流式回源 + 会话鉴权 + merchant scope + **实时授权裁决**:发起 operator 当时仍须对该 merchant 有有效 membership / 读权限,撤权 → 403),**不得**指向对象存储 presigned 直链(纯凭 URL 取数 = 旁路会话);短期 + 不可枚举是纵深、非唯一控制。详 §安全落地。跨 scope exportJobId → 404。
      parameters:
        - name: exportJobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 导出任务状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              example:
                exportJobId: exp_3c81f0
                status: READY
                downloadUrl: /api/merchant/v1/exports/exp_3c81f0/download
                expiresAt: '2026-05-19T16:00:00Z'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-msession
      description: |
        商户后台 BFF 服务端会话 cookie（httpOnly / secure / SameSite；`__Host-` 前缀强制 Secure + Path=/ + 无 Domain，杜绝子域注入）。 浏览器不见 40-06 token；BFF 映射 cookie → 40-06 access/refresh token。会话裁决商户 scope（merchant 上下文从会话取、不信请求体）。 写接口（非安全方法）另需 CSRF 防护（见 ../../_design/api/components.openapi.yaml#/components/parameters/CsrfToken）。
  schemas:
    FundPool:
      type: string
      description: 资金池。
      enum:
        - ACCOUNT_BALANCE
        - REFUND_RESERVE
    SettlementMode:
      type: string
      description: 手续费结算模式（只读展示,切换归管理后台）:NETTING 轧差 / MONTHLY 月结（收支分离）。
      enum:
        - NETTING
        - MONTHLY
    SettlementStatus:
      type: string
      description: 结算单商户视角状态投影（10-06 四态;UNCONFIRMED 并入 PROCESSING、不展示具名冻结态）。
      enum:
        - PENDING
        - PROCESSING
        - SETTLED
        - FAILED
    LedgerEntryType:
      type: string
      description: 账户流水类型（商户视角）。**两组枚举非对称(各有对方没有的一项,均有注脚)**:① `SETTLEMENT_PAYOUT`（结算出款腿）仅在流水、**不是 settlement_line 明细类型**（payout 是批输出非输入明细）;② **退款失败回冲在流水侧归 `REFUND`（带相反正号、与原退款负腿抵消）、流水不单列 REFUND_REVERSAL**——而 settlement_line 侧单列 `REFUND_REVERSAL`（逐笔可追溯需要）,这是同概念两命名空间的有意差异（流水按账本腿、settlement 按可追溯明细）。
      enum:
        - PAYMENT
        - REFUND
        - SYSTEM_ADJUSTMENT
        - TOP_UP
        - AUTO_REPLENISH
        - WITHDRAW
        - SETTLEMENT_PAYOUT
    AccountOverview:
      type: object
      required:
        - accountBalance
        - toSettle
        - refundReserve
        - availableBalance
        - currency
        - settlementMode
        - preauthHoldIncludedInDisplay
        - degraded
      description: 资金概览（投影 10-05 v_account_balance_v1）。
      properties:
        accountBalance:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Account Balance 卡片展示值（canonical 账本值恒 ≥ 0;展示值是否并入预授权挂起额由 preauthHoldIncludedInDisplay 决定,不改 canonical 账本值）。
        toSettle:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 待结算（D-CORE 按手续费结算模式派生,本域只展示、不二次计算）。
        refundReserve:
          $ref: '#/components/schemas/Money'
        availableBalance:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 可用额（= Account Balance − 应收商户款,可呈负、纯展示;反欠平台体现为负,口径归 10-05）。
        currency:
          $ref: '#/components/schemas/Currency'
        settlementMode:
          $ref: '#/components/schemas/SettlementMode'
        preauthHoldIncludedInDisplay:
          type: boolean
          readOnly: true
          description: '**管理后台设置的 per-商户展示配置**（v1 `ClientManager.setMergePreauthBalance`;20-06 **只读消费**、非本域可写）:Account Balance 卡片展示值是否并入平台侧预授权挂起额（默认 true、与现网一致;不并入时不单列挂起额）。不改 canonical 账本值与 To Settle 派生口径。'
        degraded:
          type: boolean
          description: 上游账务查询超时降级标志（true → 展示「暂不可用」,不阻塞页面,FR-01-AC-04）。
    RelatedRef:
      type: object
      description: 关联单据 / 操作记录引用（订单 / 退款 / 结算单 / 储备金操作 / 系统调整）。
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - ORDER
            - REFUND
            - SETTLEMENT
            - RESERVE_OPERATION
            - SYSTEM_ADJUSTMENT
        id:
          type: string
          description: 业务标识（系统账务对手方账户不展示）。
        label:
          type: string
          description: 展示用辅标识（如关联订单号）。
    LedgerEntry:
      type: object
      required:
        - entryId
        - occurredAt
        - pool
        - type
        - amount
        - balanceAfter
      description: 账户流水分录（投影 10-05 v_account_statement_v1 商户侧腿;只读、不可变,冲正归 10-05）。
      properties:
        entryId:
          type: string
          readOnly: true
        occurredAt:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
        pool:
          $ref: '#/components/schemas/FundPool'
        type:
          $ref: '#/components/schemas/LedgerEntryType'
        amount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 带符号金额（出账为负;商户结算币种）。
        balanceAfter:
          allOf:
            - $ref: '#/components/schemas/Money'
          readOnly: true
          description: 对应资金池变动后余额（读 10-05 异步流水投影 balance_after）。
        relatedRef:
          $ref: '#/components/schemas/RelatedRef'
        memo:
          type: string
          description: 备注（系统账务展示调整原因,不暴露对手方账户）。
    SettlementSummary:
      type: object
      required:
        - settlementId
        - period
        - netSales
        - fee
        - settledAmount
        - status
        - settlementDate
      description: 结算单汇总（投影 10-06 v_settlement_summary_v1）。
      properties:
        settlementId:
          type: string
          readOnly: true
        period:
          $ref: '#/components/schemas/Period'
        netSales:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 净销售额。
        fee:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 手续费。
        settledAmount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 本期结算金额（本结算单打入银行的净额;D-CORE 按本批结算影响明细 + 手续费结算模式产出,本域只展示）。
        status:
          $ref: '#/components/schemas/SettlementStatus'
          readOnly: true
        settlementDate:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
    SettlementLine:
      type: object
      required:
        - type
        - amount
        - settlementAmount
        - occurredAt
      description: 逐笔结算影响明细（投影 10-06 v_settlement_line_v1）。
      properties:
        type:
          type: string
          description: 明细类型（逐值对齐 10-06 settlement_line.source_type;REFUND_REVERSAL = 退款失败回冲、正向明细,符号与 REFUND 相反、不可坍缩进 REFUND）。
          enum:
            - PAYMENT
            - REFUND
            - REFUND_REVERSAL
            - TOP_UP
            - AUTO_REPLENISH
            - WITHDRAW
            - SYSTEM_ADJUSTMENT
        relatedRef:
          $ref: '#/components/schemas/RelatedRef'
        amount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 原始金额（负向项为负）。
        fee:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 手续费（如适用;另计、不参与逐笔结算金额合计）。
        settlementAmount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 本笔结算金额（带符号;逐笔合计 = 汇总本期结算金额,FR-04-AC-02）。
        occurredAt:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
        memo:
          type: string
    SettlementDetail:
      type: object
      required:
        - summary
        - lines
        - currency
      description: 结算单详情 = 汇总 + 逐笔明细 + 当前生效结算账户（只读消费 ME）。
      properties:
        summary:
          $ref: '#/components/schemas/SettlementSummary'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/SettlementLine'
        settlementAccountLast4:
          type: string
          readOnly: true
          description: 当前生效结算账户银行后 4 位（只读消费 ME,仅供核对）。
        currency:
          $ref: '#/components/schemas/Currency'
    StatementSummary:
      type: object
      required:
        - statementId
        - period
        - netSettlement
        - txnCount
        - serviceFee
        - status
      description: 月度账单汇总（投影 10-07 v_statement_v1）。**消费方假设契约——10-07 当前 placeholder、待 v_statement_v1 落定后对齐**（字段 / 生成时点 / 新鲜度可能调整,决策 B）。
      properties:
        statementId:
          type: string
          readOnly: true
        period:
          type: string
          description: 账单期间（月,YYYY-MM）。
        netSettlement:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Net Settlement（月度净结算汇总;不等同单张结算单本期结算金额）。
        txnCount:
          type: integer
          format: int64
          description: 交易笔数。
        serviceFee:
          $ref: '#/components/schemas/Money'
        status:
          type: string
          readOnly: true
          description: 可见状态（ISSUED 已出具 / PAID 已结清,如上游提供;轧差模式多停留 ISSUED）。
          enum:
            - ISSUED
            - PAID
    StatementServiceLine:
      type: object
      required:
        - count
        - gross
        - fee
      description: 账单服务明细行（按服务 / 渠道分行）。
      properties:
        service:
          type: string
        channel:
          type: string
        count:
          type: integer
          format: int64
        gross:
          $ref: '#/components/schemas/Money'
        rate:
          type: string
          description: 费率展示（如 2.65%;口径归 10-07,本域只展示）。
        fee:
          $ref: '#/components/schemas/Money'
    StatementDetail:
      type: object
      required:
        - statementId
        - invoiceNo
        - issuedAt
        - currency
        - serviceLines
        - grossVolume
        - serviceFee
        - netSettlement
      description: 月度账单详情（服务费账单;不含税 / 终端 APP 订阅费、不区分收费模式,FR-05-AC-03）。
      properties:
        statementId:
          type: string
          readOnly: true
        invoiceNo:
          type: string
          readOnly: true
          description: 发票号。
        issuedAt:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
        currency:
          $ref: '#/components/schemas/Currency'
        serviceLines:
          type: array
          items:
            $ref: '#/components/schemas/StatementServiceLine'
        grossVolume:
          $ref: '#/components/schemas/Money'
        serviceFee:
          $ref: '#/components/schemas/Money'
        netSettlement:
          $ref: '#/components/schemas/Money'
    Period:
      type: object
      required:
        - from
        - to
      description: 清算周期区间。
      properties:
        from:
          $ref: '#/components/schemas/Timestamp'
        to:
          $ref: '#/components/schemas/Timestamp'
    OtpChallenge:
      type: object
      required:
        - challengeId
        - deliveredTo
        - cooldownSeconds
        - expiresAt
      description: Owner email OTP 挑战（编排 40-06 资金动作 step-up `POST /step-up/fund-actions`）。challenge 绑定 identity + client + merchant + **发起会话 sid** + **操作摘要 canonical 指纹**（funding 提交须同会话、摘要一致,见 §安全落地）。
      properties:
        challengeId:
          type: string
          readOnly: true
        deliveredTo:
          type: string
          readOnly: true
          description: 脱敏投递目标（如 o***@e***.com）。
        cooldownSeconds:
          type: integer
          readOnly: true
          description: 重发冷却秒数（业务参数,X-07）。
        expiresAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          readOnly: true
          description: challenge 失效时间（业务参数 X-07,委派 40-06）;过期后 funding 提交即使摘要一致亦 → 410 重挑战（防长期持 challengeId）。
    OtpProof:
      type: object
      required:
        - challengeId
        - code
      additionalProperties: false
      description: OTP 凭证（提交 funding 时携带;经 40-06 校验）。`additionalProperties:false` 嵌套闭合——顶层 RefundReserveFundingRequest 的 `unevaluatedProperties:false` 不递归进此子对象,须本级独立闭合防夹带。
      properties:
        challengeId:
          type: string
        code:
          type: string
          minLength: 4
          maxLength: 12
          description: Owner 邮箱 OTP（长度业务参数 X-07,此处给宽界）。
    AutoReplenishConfig:
      type: object
      required:
        - enabled
      additionalProperties: false
      description: auto-replenish 配置（开关 + Account Limit 阈值;Refund Reserve 低于阈值时由 **FINACCT `AutoReplenishService`** 自动从 Account Balance 补足,FINACCT-owned、本地存配置,见 design）。**additionalProperties:false 防夹带未背书字段**;字段存在性纳入 OTP 摘要指纹。**注**:`enabled=true ⇒ accountLimit 必填` 由下方 if/then 守;`accountLimit > 0` 由 PositiveMoney schema 守。
      if:
        properties:
          enabled:
            const: true
        required:
          - enabled
      then:
        properties:
          accountLimit: {}
        required:
          - accountLimit
      properties:
        enabled:
          type: boolean
        accountLimit:
          allOf:
            - $ref: '#/components/schemas/PositiveMoney'
          description: Account Limit 阈值（enabled=true 时必填且 > 0〔PositiveMoney + if/then 守〕,FR-07-AC-08;关闭时是否保留供下次开启归 design）。
    RefundReserveOperationSummary:
      type: object
      description: 储备金 funding 操作摘要（**topUpAmount / autoReplenish 至少其一**,anyOf 守;空 `{}` 非法）。**OTP challenge 绑定此摘要的 canonical 指纹**（含 Money 的 amount + **currency 双字段**、字段存在性递归;currency 须 == 会话唯一结算币种、失配 403,见 design 摘要绑定不变量）,funding 提交摘要指纹须与 challenge 绑定一致——防 confused-deputy（批 A 放行 B / 改币种 / 夹带 config）。**闭合（拒未知字段、防夹带）由消费方 schema 收口**:funding 请求 + otp-challenge 入口均挂 `unevaluatedProperties:false`;**本摘要自身不闭合**——否则其 `unevaluatedProperties:false` 会让 funding 请求 `allOf` 扩展的 `otp` 成为「未求值」而被拒（schema 不可满足）。须配 contract test 守 anyOf + 指纹 + 闭合。
      anyOf:
        - required:
            - topUpAmount
        - required:
            - autoReplenish
      properties:
        topUpAmount:
          allOf:
            - $ref: '#/components/schemas/PositiveMoney'
          description: Top Up 金额（来源固定 Account Balance;> 0 由 PositiveMoney schema 守;缺省则本次只改配置）。
        autoReplenish:
          allOf:
            - $ref: '#/components/schemas/AutoReplenishConfig'
          description: auto-replenish 配置变更（缺省则本次只 Top Up;含 enabled + accountLimit 全字段,纳入 OTP 摘要绑定）。
    RefundReserveFundingRequest:
      description: funding 请求 = 操作摘要 + OTP 凭证（摘要须与 otp.challengeId 绑定的摘要一致,否则拒绝重挑战）。`unevaluatedProperties:false` 闭合全集 = {topUpAmount, autoReplenish, otp},未知字段拒绝（资金 OTP 摘要字段全集与请求 schema 同源,防 confused-deputy 夹带）。
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/RefundReserveOperationSummary'
        - type: object
          required:
            - otp
          properties:
            otp:
              $ref: '#/components/schemas/OtpProof'
    ReserveOperationResult:
      type: object
      required:
        - operationId
        - kind
        - status
      description: 储备金**商户发起**操作结果（Top Up / Withdraw;资金分录归 10-05〔本结果引用其 fundEventId〕、业务操作记录归 FINACCT `refund_reserve_operation`。auto-replenish **系统执行**结果归 FINACCT `refund_reserve_operation`(kind=auto_replenish)、不在此商户发起 kind,商户经流水 AUTO_REPLENISH + 站内事件可见）。
      properties:
        operationId:
          type: string
          readOnly: true
          description: BFF 操作记录标识（D-MERCH 本地 reserve_operation_intent;关联 10-05 fundEventId）。
        kind:
          type: string
          readOnly: true
          enum:
            - TOP_UP
            - WITHDRAW
        status:
          type: string
          readOnly: true
          description: SUCCEEDED 已落账 / FAILED 已拒绝(不划转) / **PENDING** 已放行但上游结果未达终态(response 丢失 / in-flight;以 10-05 getFundEventResult 回查收敛、凭子写键可重试,不另划转)。
          enum:
            - SUCCEEDED
            - FAILED
            - PENDING
        amount:
          $ref: '#/components/schemas/Money'
          readOnly: true
        fundEventId:
          type: string
          readOnly: true
          description: 10-05 资金事件标识（权威执行结果）。
        resultCode:
          type: string
          description: 失败结构化结果码（如 LEDGER-ERR-01;骨干07）。
        resultDetail:
          type: string
          description: 结果描述（不拼平台侧账户 / 对手方）。
        occurredAt:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
    ConfigResult:
      type: object
      required:
        - status
        - enabled
      description: auto-replenish 配置变更结果（**FINACCT 本地 `refund_reserve_config` upsert**,FINACCT-owned、非 10-05 转发）。配置写幂等(BFF `{intentId}:auto_replenish_config` 键 + 本地 upsert);本地写一般同步,PENDING 罕见。auto-replenish 实际补足执行归 FINACCT `AutoReplenishService`(反应 Reserve-low、发 top-up reserve-movement、记 refund_reserve_operation),不在本配置写。
      properties:
        status:
          type: string
          readOnly: true
          description: SAVED 已保存 / FAILED 已拒绝(config = FINACCT 本地 `refund_reserve_config` upsert、一般同步)/ PENDING(仅 funding 编排中间态、罕见)。
          enum:
            - SAVED
            - FAILED
            - PENDING
        enabled:
          type: boolean
        accountLimit:
          $ref: '#/components/schemas/PositiveMoney'
          readOnly: true
        resultCode:
          type: string
        resultDetail:
          type: string
    RefundReserveFundingResult:
      type: object
      description: funding 处理结果（按提交项返回;部分失败时各项独立 status）。
      properties:
        topUpResult:
          $ref: '#/components/schemas/ReserveOperationResult'
        autoReplenishResult:
          $ref: '#/components/schemas/ConfigResult'
    OperationDetail:
      type: object
      required:
        - operationId
        - opType
      description: 储备金**商户发起**操作（funding / withdrawal）全部子写状态（GET /operations 返回;含 config 子写,供 PENDING 收敛轮询）。auto-replenish **系统触发**操作不经此查询——经账户流水 AUTO_REPLENISH + 站内事件可见。
      properties:
        operationId:
          type: string
          readOnly: true
          description: BFF intent 标识。
        opType:
          type: string
          readOnly: true
          enum:
            - FUNDING
            - WITHDRAW
        topUpResult:
          $ref: '#/components/schemas/ReserveOperationResult'
        autoReplenishResult:
          $ref: '#/components/schemas/ConfigResult'
        withdrawResult:
          $ref: '#/components/schemas/ReserveOperationResult'
    RefundReserveWithdrawalRequest:
      type: object
      additionalProperties: false
      description: 储备金取回（**amount 与 max 恰二选一**,oneOf 守;both / neither 非法）。`additionalProperties:false` 闭合全集 = {amount, max}、拒夹带未知字段——与 funding 同级（碰钱写入口防夹带）。须配 contract test 覆盖 `amount+foo`/`max+foo`（夹带拒绝）+ `amount+max`/`{}`（oneOf 拒绝）。
      oneOf:
        - properties:
            amount: {}
          required:
            - amount
          not:
            properties:
              max: {}
            required:
              - max
        - properties:
            max: {}
          required:
            - max
          not:
            properties:
              amount: {}
            required:
              - amount
      properties:
        amount:
          allOf:
            - $ref: '#/components/schemas/PositiveMoney'
          description: 取回金额（> 0 由 PositiveMoney schema 守;与 max 二选一）。
        max:
          type: boolean
          const: true
          description: 取回当前全部可取回 Refund Reserve（仅接受 true,不取全部请走 amount;转发 10-05 drainReserve〔已落地〕,10-05 在 reserve per-account CAS 临界区内 resolve 额、原子无 TOCTOU;BFF 不自读余额填）。
    ExportRequest:
      type: object
      required:
        - kind
        - format
      description: 导出请求（按当前查询条件;范围与查询一致、不局限当前分页）。
      properties:
        kind:
          type: string
          description: 导出对象:结算单列表 / 单结算单详情 / 流水 / 月度账单。
          enum:
            - SETTLEMENTS
            - SETTLEMENT_DETAIL
            - LEDGER
            - STATEMENT
        format:
          type: string
          enum:
            - XLSX
            - PDF
        resourceId:
          type: string
          description: 单资源导出标识（SETTLEMENT_DETAIL = settlementId / STATEMENT = statementId）。
        filters:
          type: object
          description: 列表导出的查询条件镜像（与对应列表端点过滤 / 搜索 / 排序一致;字段随对应列表）。
          additionalProperties: true
    ExportJob:
      type: object
      required:
        - exportJobId
        - status
      description: 导出任务（OWNS:D-MERCH 本地 export_job）。
      properties:
        exportJobId:
          type: string
          readOnly: true
        status:
          type: string
          readOnly: true
          enum:
            - PENDING
            - PROCESSING
            - READY
            - FAILED
        downloadUrl:
          type: string
          readOnly: true
          description: READY 时短期有效下载链接。
        expiresAt:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
        resultDetail:
          type: string
          description: FAILED 原因 / 空结果 / 超限提示。
    Currency:
      type: string
      description: ISO-4217 币种码。本期最小覆盖 CAD/USD/HKD(部署时可配置扩展)。
      examples:
        - CAD
        - USD
        - HKD
    Money:
      type: object
      description: 金额 = 最小币种单位整数(字符串) + 币种(禁裸数字流转;骨干07 金额口径:字符串防 JSON number 精度丢失)。
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          pattern: ^-?[0-9]+$
          description: 最小币种单位整数的字符串(如 CAD 分 "1050";展示层按币种 minorUnit 换算)。骨干07:可重定义面默认最小单位整数字符串;十进制金额须接口契约显式声明。
        currency:
          $ref: '#/components/schemas/Currency'
    ErrorEnvelope:
      type: object
      description: 统一错误返回(骨干07 错误响应体:结构化整数 code + detail + 可选 links;扩展 traceId/details)。
      required:
        - code
        - detail
      properties:
        code:
          type: integer
          description: 结构化整数错误码(骨干07:能力域段 + 责任方类别 + 域内末段;可解析责任方+来源域,与 HTTP 状态正交)。
        detail:
          type: string
          description: 错误描述(面向调用方;本地化按 locale,X-06)。
        links:
          type: object
          description: 可选:错误说明 / 后续恢复操作链接(骨干07)。
          additionalProperties:
            type: string
        traceId:
          type: string
          description: 可选:关联 id,串联日志 / 分布式 trace(可观测)。
        details:
          type: array
          description: 可选:字段级校验错误(骨干07)。
          items:
            type: object
            required:
              - field
              - issue
            properties:
              field:
                type: string
              issue:
                type: string
    Timestamp:
      type: string
      format: date-time
      description: 'RFC 3339 date-time。in/out 非对称(骨干07):**响应 MUST UTC `Z`**(如 2026-05-19T14:30:00Z); **请求/query 入参 MAY 任意合法 offset**,服务端归一 UTC(format: date-time 同时接受 Z 与 offset, 「出参 Z」是约定、非 schema 可强制)。展示/清算切日按商户 IANA 时区(单独字段,offset ≠ timezone)。'
    PositiveMoney:
      description: 正额金额（amount = 最小币种单位正非零整数字符串、currency 同 Money）；schema 化收口「> 0」、不靠 contract test。用于「划多少」类输入（资金划转额 / 阈值 / 退款额等），方向由 operation / eventType + posting 规则决定、非符号；区别于 Money（带符号、用于余额 / 分录 / 结算净额 / 回冲等可正可负的账面值）。
      allOf:
        - $ref: '#/components/schemas/Money'
        - type: object
          properties:
            amount:
              type: string
              pattern: ^[1-9][0-9]*$
  responses:
    Forbidden:
      description: 403 无权限(fail-secure,默认拒绝)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: 404 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: 429 限流 / 冷却中 / 请求过频(临时锁定走 423 Locked)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    BadRequest:
      description: 400 业务/校验错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Gone:
      description: 410 一次性凭据失效(OTP / 验证链接 过期 / 已使用)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Locked:
      description: 423 登录临时锁定(防爆破)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: 409 冲突(幂等键冲突 / 状态冲突 / 标识已占用)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  parameters:
    PageNum:
      name: pageNum
      in: query
      description: 页码(从 1 计;骨干07 分页)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      description: 每页记录数(上限可配置;骨干07 分页默认 20)
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: CSRF 令牌(double-submit;cookie 会话鉴权的非安全方法[POST/PUT/PATCH/DELETE]必带;缺失/不匹配 → 403 fail-closed)
      schema:
        type: string
        minLength: 1
        pattern: \S
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: 幂等键(写接口;骨干07 三段命中语义)
      schema:
        type: string
        minLength: 1
        pattern: \S
