openapi: 3.1.0
info:
  title: 商户后台 账户账务与清结算 (20-06) — 前端契约面
  version: 0.5.7
  contact:
    name: 商户后台 BFF
  description: |
    商户后台 React SPA 消费的资金概览 / 账户流水 / 结算单 / 月度账单 / 退款预留金管理 / 数据导出 契约。 资金概览 / 流水 / 结算单 / 月度账单为**只读**；结算金额由平台资金能力产出，本面只展示、不二次计算。 储备金 Top Up / Withdraw 为**资金动作**，结算影响归清结算能力；auto-replenish 配置由本面管理、其自动补足由平台触发；Owner email OTP 二次验证经身份验证能力。 金额一律商户唯一结算币种（单商户单结算币种）；金额最小币种单位整数字符串（components Money）。字段类型以本 spec 为准。 幂等 / CSRF 口径:① **有副作用的写**（储备金 funding / withdrawal、导出创建）挂 Idempotency-Key（资金路径强一致，重投返原结果）;OTP 挑战类按流程语义不挂幂等键。 ② cookieAuth 的非安全方法（POST/PUT/DELETE）一律挂 X-CSRF-Token（double-submit，fail-closed）;无公开端点（资金面全程受 RBAC + 会话）。 鉴权 / 行级授权:所有读写均限会话当前 merchant scope（merchant 上下文从会话取、不信请求体）;储备金 funding（Top Up / auto-replenish）经 Owner email OTP（身份验证能力，资金动作二次验证）放行,Withdraw 不要求 OTP（仅内部回 Account Balance、不外流）。 状态码约定（同商户后台其它 BFF 面）:会话失效 / 未认证由边缘网关 + 会话层统一 **401**,业务面端点只表达 **403**（无权限 / scope 不符 / OTP 失败 / fail-secure），故各端点列 403 不列 401（有意一致省略）;跨 scope 资源统一 **404** 防枚举。
servers:
  - url: /api/merchant/v1
    description: 商户后台 BFF（经边缘网关；浏览器 ↔ BFF 用会话 cookie）
security:
  - cookieAuth: []
tags:
  - name: account-overview
    description: 资金概览：Account Balance / To Settle（派生展示）/ Refund Reserve / 可用额，商户结算币种。只读。
  - name: account-ledger
    description: 账户流水（Account Ledger）：每笔资金进出只读分页查询（过滤 + 搜索 + 双池可见）。只读。
  - name: settlement
    description: 结算单（Settlement）：按清算周期 / 状态查列表 + 逐笔结算影响明细详情。只读。
  - name: statement
    description: 月度账单（Statement）：服务费账单查阅 + 详情 + PDF 导出。只读。
  - name: refund-reserve
    description: 退款预留金管理：Top Up（手动充值）/ auto-replenish 配置（均经 Owner email OTP）/ Withdraw（取回 Account Balance，无 OTP）。OTP 经身份验证能力，结算影响归清结算能力。
  - name: export
    description: 数据导出：结算单 / 流水**异步 XLSX**（createExport → 轮询 → downloadExport）+ **Statement 同步 PDF**（getStatementPdf）；与当前查询条件一致、不局限当前分页；大结果集异步处理、均记导出审计事件。
paths:
  /account/overview:
    get:
      tags:
        - account-overview
      operationId: getAccountOverview
      summary: 资金概览（Account Balance / To Settle / Refund Reserve / 可用额）
      description: |
        资金概览（商户 scope）：Account Balance（账本值恒 ≥ 0）、To Settle（按手续费结算模式派生、本面不二次计算）、Refund Reserve、可用额（= Account Balance − 应收商户款,可呈负,纯展示）。 Account Balance 卡片展示值是否并入平台侧预授权挂起额由**管理后台设置的 per-商户展示配置**控制（默认并入,本面只展示、不改账本值）。上游账务查询超时 → degraded=true 降级展示"暂不可用"、不伪造资金,不阻塞页面。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: 资金概览（商户唯一结算币种）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountOverview'
              example:
                accountBalance:
                  amount: '1250050'
                  currency: CAD
                toSettle:
                  amount: '320075'
                  currency: CAD
                refundReserve:
                  amount: '500000'
                  currency: CAD
                availableBalance:
                  amount: '1230050'
                  currency: CAD
                currency: CAD
                settlementMode: NETTING
                preauthHoldIncludedInDisplay: true
                degraded: false
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /account/ledger:
    get:
      tags:
        - account-ledger
      operationId: listAccountLedger
      summary: 账户流水查询（过滤 + 搜索 + 分页，只读）
      description: |
        账户流水（商户 scope）：按时间倒序分页;每行含资金池 / 类型 / 带符号金额 / 对应资金池变动后余额 / 关联单据或操作记录。空结果返回空态、不报错。默认时间窗避免空窗（业务参数可配）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: dateFrom
          in: query
          schema:
            $ref: '#/components/schemas/Timestamp'
          description: 起始时间（含;缺省取默认窗）
        - name: dateTo
          in: query
          schema:
            $ref: '#/components/schemas/Timestamp'
          description: 结束时间（含）
        - name: type
          in: query
          description: 类型过滤（可多值）
          schema:
            type: array
            items:
              $ref: '#/components/schemas/LedgerEntryType'
        - name: pool
          in: query
          schema:
            $ref: '#/components/schemas/FundPool'
          description: 资金池过滤（缺省两池均含）
        - name: keyword
          in: query
          schema:
            type: string
            maxLength: 128
          description: 关键字（关联订单号 / 流水号 / 操作记录号;有长度上界）
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 账户流水分页（时间倒序）
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    type: integer
                    format: int64
                    description: 总记录数
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LedgerEntry'
              example:
                total: 132
                data:
                  - entryId: led_2026051914300001
                    occurredAt: '2026-05-19T14:30:00Z'
                    pool: ACCOUNT_BALANCE
                    type: PAYMENT
                    amount:
                      amount: '9710'
                      currency: CAD
                    balanceAfter:
                      amount: '1250050'
                      currency: CAD
                    relatedRef:
                      kind: ORDER
                      id: ord_88231
                      label: '#88231'
                  - entryId: led_2026051815200002
                    occurredAt: '2026-05-18T15:20:00Z'
                    pool: ACCOUNT_BALANCE
                    type: REFUND
                    amount:
                      amount: '-2500'
                      currency: CAD
                    balanceAfter:
                      amount: '1240340'
                      currency: CAD
                    relatedRef:
                      kind: REFUND
                      id: rfd_5521
                      label: '#88102-R'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /settlements:
    get:
      tags:
        - settlement
      operationId: listSettlements
      summary: 结算单列表（周期 / 状态过滤 + 搜索 + 排序 + 分页）
      description: |
        结算单列表（商户 scope）。日期倒序默认;状态过滤为商户视角四态（待结算 / 处理中 / 已结算 / 失败,不展示具名冻结态）。 FAILED 行标记并提示资金退回待结算池、后续重新归集或人工处置。默认窗覆盖近期有数据范围（业务参数可配）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: dateFrom
          in: query
          schema:
            $ref: '#/components/schemas/Timestamp'
        - name: dateTo
          in: query
          schema:
            $ref: '#/components/schemas/Timestamp'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SettlementStatus'
          description: 商户视角状态过滤
        - name: keyword
          in: query
          schema:
            type: string
            maxLength: 128
          description: 结算单号 / 金额（有长度上界）
        - name: sort
          in: query
          description: 排序（默认 settlementDate 倒序）
          schema:
            type: string
            enum:
              - settlementDate_desc
              - settlementDate_asc
              - settledAmount_desc
              - settledAmount_asc
            default: settlementDate_desc
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 结算单分页
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    type: integer
                    format: int64
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SettlementSummary'
              example:
                total: 24
                data:
                  - settlementId: stl_20260519
                    period:
                      from: '2026-05-18T00:00:00Z'
                      to: '2026-05-18T23:59:59Z'
                    netSales:
                      amount: '452000'
                      currency: CAD
                    fee:
                      amount: '13115'
                      currency: CAD
                    settledAmount:
                      amount: '438885'
                      currency: CAD
                    status: SETTLED
                    settlementDate: '2026-05-19T08:00:00Z'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /settlements/{settlementId}:
    get:
      tags:
        - settlement
      operationId: getSettlementDetail
      summary: 结算单详情（批次汇总 + 逐笔结算影响明细）
      description: |
        结算单详情（商户 scope）= 汇总 + 逐笔明细。 逐笔结算金额合计 = 汇总本期结算金额（手续费列另计、不参与该合计）;退款行金额为负;非交易类结算影响明细（Top Up / auto-replenish / Withdraw / 系统账务）展示来源标识与带符号结算金额、计入合计。当前生效结算账户（银行后 4 位）只读展示。跨 scope settlementId → 404（防枚举）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: settlementId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 结算单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementDetail'
              example:
                summary:
                  settlementId: stl_20260519
                  period:
                    from: '2026-05-18T00:00:00Z'
                    to: '2026-05-18T23:59:59Z'
                  netSales:
                    amount: '452000'
                    currency: CAD
                  fee:
                    amount: '13115'
                    currency: CAD
                  settledAmount:
                    amount: '438885'
                    currency: CAD
                  status: SETTLED
                  settlementDate: '2026-05-19T08:00:00Z'
                lines:
                  - type: PAYMENT
                    relatedRef:
                      kind: ORDER
                      id: ord_88231
                      label: '#88231'
                    amount:
                      amount: '10000'
                      currency: CAD
                    fee:
                      amount: '290'
                      currency: CAD
                    settlementAmount:
                      amount: '9710'
                      currency: CAD
                    occurredAt: '2026-05-18T11:02:00Z'
                  - type: REFUND_REVERSAL
                    relatedRef:
                      kind: REFUND
                      id: rfd_5521
                      label: '#88102-R'
                    amount:
                      amount: '2500'
                      currency: CAD
                    settlementAmount:
                      amount: '2500'
                      currency: CAD
                    occurredAt: '2026-05-18T15:20:00Z'
                settlementAccountLast4: '6789'
                currency: CAD
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /statements:
    get:
      tags:
        - statement
      operationId: listStatements
      summary: 月度账单列表（按年份过滤）
      description: |
        月度服务费账单（商户 scope）——按年份过滤;列 = 期间（月）/ Net Settlement（月度净结算汇总）/ 交易笔数 / 服务费 / 可见状态（ISSUED / PAID,如可用）。无数据返回空态。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: year
          in: query
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
          description: 年份过滤（缺省取最近有数据年;有界防异常输入）
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 月度账单分页
          content:
            application/json:
              schema:
                type: object
                required:
                  - total
                  - data
                properties:
                  total:
                    type: integer
                    format: int64
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatementSummary'
              example:
                total: 12
                data:
                  - statementId: stmt_2026-04
                    period: 2026-04
                    netSettlement:
                      amount: '9820000'
                      currency: CAD
                    txnCount: 3421
                    serviceFee:
                      amount: '284900'
                      currency: CAD
                    status: ISSUED
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /statements/{statementId}:
    get:
      tags:
        - statement
      operationId: getStatementDetail
      summary: 月度账单详情（服务明细分行 + Net Settlement）
      description: |
        月度账单详情（商户 scope）。含发票号 + 出具日期 + 服务明细（按服务 / 渠道分行:笔数 / Gross / 费率 / Fee）+ Gross Volume / Service Fee / Net Settlement;不含税 / 终端 APP 订阅费、不区分收费模式。跨 scope → 404。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: statementId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 月度账单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatementDetail'
              example:
                statementId: stmt_2026-04
                invoiceNo: INV-2026-04-000123
                issuedAt: '2026-05-01T00:00:00Z'
                currency: CAD
                serviceLines:
                  - service: In-store QR
                    channel: WeChat Pay
                    count: 1820
                    gross:
                      amount: '5200000'
                      currency: CAD
                    rate: 2.65%
                    fee:
                      amount: '137800'
                      currency: CAD
                  - service: Online
                    channel: Alipay
                    count: 1601
                    gross:
                      amount: '4904900'
                      currency: CAD
                    rate: 3.00%
                    fee:
                      amount: '147100'
                      currency: CAD
                grossVolume:
                  amount: '10104900'
                  currency: CAD
                serviceFee:
                  amount: '284900'
                  currency: CAD
                netSettlement:
                  amount: '9820000'
                  currency: CAD
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /statements/{statementId}/pdf:
    get:
      tags:
        - statement
      operationId: getStatementPdf
      summary: 单月账单 PDF 导出
      description: 按账单详情口径生成可下载 PDF（列头 / 枚举 / 日期 / 金额按用户 locale 本地化,金额带商户结算币种）。**同步下载也记一条导出审计事件（与异步导出同口径）**。跨 scope → 404。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: statementId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 账单 PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /refund-reserve/otp-challenges:
    post:
      tags:
        - refund-reserve
      operationId: requestRefundReserveOtp
      summary: 发起 Owner email OTP 挑战（绑定本次操作摘要）
      description: |
        向该商户 Owner 的已验证邮箱发起一次性 email OTP（经身份验证能力）。挑战**绑定本次操作摘要**（Top Up 金额 + auto-replenish 配置的开关 / 阈值 + 字段存在性）与发起会话——提交 funding 时须摘要一致、同会话提交,否则 → 403（防串改金额 / 币种 / 夹带配置）。操作上下文（商户 / Owner）取会话 scope、不信请求体（无有效 scope → 403 不发起）。返回 challengeId + 脱敏投递目标 + 冷却。展示摘要与绑定摘要同源（防 Owner 看小额、放大额）。OTP 有效期 / 冷却 / 错误尝试上限为业务参数（默认可配）。挑战类不挂幂等键（每次重新发起）。Top Up 与 auto-replenish 同次共用一次 OTP（摘要含配置全字段,Owner 知悉同时变更自动补足规则）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/RefundReserveOperationSummary'
              unevaluatedProperties: false
            example:
              topUpAmount:
                amount: '100000'
                currency: CAD
              autoReplenish:
                enabled: true
                accountLimit:
                  amount: '50000'
                  currency: CAD
      responses:
        '202':
          description: OTP 已发起（或冷却结束后重发）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpChallenge'
              example:
                challengeId: chl_9f2a7c
                deliveredTo: o***@e***.com
                cooldownSeconds: 60
                expiresAt: '2026-05-19T14:35:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-error-codes:
        '409':
          - 208001
  /refund-reserve/funding:
    post:
      tags:
        - refund-reserve
      operationId: submitRefundReserveFunding
      summary: 储备金充值 + auto-replenish 配置（单次 Owner email OTP；二者至少其一）
      description: |
        合并入口：Top Up 与 auto-replenish 配置可单独或同次提交,共用一次 OTP。 提交须携带发起时拿到的 OTP challengeId + 验证码,且**提交摘要须与该 challenge 绑定的摘要一致、同会话提交**,否则 → 403（防串改金额 / 夹带配置）;失败时 **Top Up 与配置两者都不生效**。OTP 错误尝试上限锁定 → 423、冷却中 / 限流 → 429。 Top Up 从 Account Balance 划入 Refund Reserve（守 Account Balance 足额,不足 → 拒）;auto-replenish 保存配置（其自动补足执行由平台在 Refund Reserve 低于阈值时触发,不在本次写内）。 **幂等**：挂 `Idempotency-Key`、同键重投返**首次结果**、**不重复划转**;**同键异摘要 → 409**（同键异 payload,不推进）。**响应项 ⟺ 提交项**、可部分成功——各子项独立 status,未达终态时 PENDING、凭 operationId 轮询收敛。金额 > 0 由 PositiveMoney schema 守;auto-replenish 开启时 accountLimit 必填且 > 0。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: Idempotency-Key
          in: header
          required: true
          description: '**端点级必填**（资金写资损红线;缺失 → 400 不可推进）。同键重投返首次结果、不重复划转;重试请复用同一键。'
          schema:
            type: string
            minLength: 1
            pattern: \S
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundReserveFundingRequest'
            example:
              topUpAmount:
                amount: '100000'
                currency: CAD
              autoReplenish:
                enabled: true
                accountLimit:
                  amount: '50000'
                  currency: CAD
              otp:
                challengeId: chl_9f2a7c
                code: '482915'
      responses:
        '200':
          description: 已处理（**响应项 ⟺ 请求提交项**:topUpAmount 提交则有 topUpResult、autoReplenish 提交则有 autoReplenishResult;部分项失败时该项 status=FAILED、未达终态时 PENDING,凭 operationId 轮询收敛）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundReserveFundingResult'
              example:
                operationId: rri_7a1c9
                topUpResult:
                  operationId: rri_7a1c9
                  kind: TOP_UP
                  status: SUCCEEDED
                  amount:
                    amount: '100000'
                    currency: CAD
                  fundEventId: fe_77120
                  occurredAt: '2026-05-19T14:33:10Z'
                autoReplenishResult:
                  status: SAVED
                  enabled: true
                  accountLimit:
                    amount: '50000'
                    currency: CAD
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
          description: OTP 校验失败 / 提交摘要与 challenge 绑定摘要失配 / 提交会话与发起会话不符 / 无权限（失败时 Top Up 与配置两者都不生效）
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
          description: 同 Idempotency-Key 但提交摘要与首次不一致（同键异 payload,不推进）；页面预期商户 ≠ 会话当前 → 同 409（stale-tab 防串写，资金红线）
        '410':
          $ref: '#/components/responses/Gone'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-error-codes:
        '409':
          - 208001
          - 208005
  /refund-reserve/withdrawals:
    post:
      tags:
        - refund-reserve
      operationId: submitRefundReserveWithdrawal
      summary: 储备金取回 Account Balance（无 OTP）
      description: |
        把 Refund Reserve 取回到 Account Balance（守 Refund Reserve 足额）。资金回 Account Balance 后随正常结算入银行、不发起独立 payout、不提供外部目的地选择、不要求 Owner email OTP。 应收抵扣在平台账本内部完成、本面不可见不编排。`max=true`（取回全部）由服务端按执行时的实际可取金额定额,前端**不自读余额填 amount**（避免余额变化造成取回金额错误）。固定额 Withdraw 走 amount。金额 ≤ 0 / 执行时 Refund Reserve 不足 → 拒绝、不划转。资金路径幂等（同 `Idempotency-Key` 重投、不重复划转）；同 `Idempotency-Key` 异 amount/max（同键异 payload）→ 409（208005,与 funding / createExport 冲突码同口径）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: Idempotency-Key
          in: header
          required: true
          description: '**端点级必填**（资金写资损红线;缺失 → 400 不可推进）。同键重投返首次结果、不重复划转;重试请复用同一键。'
          schema:
            type: string
            minLength: 1
            pattern: \S
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundReserveWithdrawalRequest'
            examples:
              fixedAmount:
                summary: 固定额取回
                value:
                  amount:
                    amount: '30000'
                    currency: CAD
              drainAll:
                summary: 取回全部（服务端定额）
                value:
                  max: true
      responses:
        '200':
          description: 取回处理结果（未达终态时 status=PENDING,凭 operationId 轮询收敛）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReserveOperationResult'
              example:
                operationId: rri_6a02bd
                kind: WITHDRAW
                status: SUCCEEDED
                amount:
                  amount: '30000'
                  currency: CAD
                fundEventId: fe_77130
                occurredAt: '2026-05-19T15:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-error-codes:
        '409':
          - 208001
          - 208005
  /refund-reserve/operations/{operationId}:
    get:
      tags:
        - refund-reserve
      operationId: getReserveOperation
      summary: 查询储备金操作状态（PENDING 轮询入口）
      description: 查询一次储备金操作的**全部子项**状态（Top Up / Withdraw / auto-replenish 配置）——即使浏览器丢了 Idempotency-Key 或换端,也可凭 operationId 查到各子项进度。PENDING 子项凭 `operationId` 轮询本端点收敛,或以原 `Idempotency-Key` 重投原写端点（幂等返原结果、不另划转）。跨 scope operationId → 404。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: operationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 操作全部子项状态（含终态 / PENDING）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationDetail'
              example:
                operationId: rri_5f31a0
                opType: FUNDING
                topUpResult:
                  operationId: rri_5f31a0
                  kind: TOP_UP
                  status: SUCCEEDED
                  amount:
                    amount: '100000'
                    currency: CAD
                  fundEventId: fe_77120
                  occurredAt: '2026-05-19T14:33:10Z'
                autoReplenishResult:
                  status: SAVED
                  enabled: true
                  accountLimit:
                    amount: '50000'
                    currency: CAD
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /exports:
    post:
      tags:
        - export
      operationId: createExport
      summary: 创建导出任务（结算单 / 流水 XLSX；异步。月度账单 PDF 走同步 getStatementPdf、不经此路径）
      description: |
        按当前查询条件（筛选 / 搜索 / 排序）创建导出任务,范围与查询一致、不局限当前分页。导出范围固定为发起时的当前商户,filters 只表达筛选条件、不能扩大商户范围;resourceId 跨 scope → 拒绝 / 404。导出下载时仍按发起者当前对该商户的有效权限裁决——撤权后不能取走数据。大结果集异步处理、超上限不静默丢弃而给超限提示或转异步;导出请求记审计事件;空结果导出空表头文件或提示无数据。**幂等**：挂 `Idempotency-Key`、同键重投返**首次创建的任务**（不重复建任务、响应丢失可安全重试）；同键异 scope / 参数 → 409。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
            example:
              kind: LEDGER
              format: XLSX
              filters:
                dateFrom: '2026-05-01T00:00:00Z'
                dateTo: '2026-05-19T23:59:59Z'
                pool: ACCOUNT_BALANCE
      responses:
        '202':
          description: 导出任务已受理（轮询 GET /exports/{exportJobId} 取结果）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              example:
                exportJobId: exp_3c81f0
                status: PENDING
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
          - 208005
  /exports/{exportJobId}:
    get:
      tags:
        - export
      operationId: getExport
      summary: 查询导出任务状态 / 下载
      description: 查询导出任务状态;READY 时 downloadUrl 指向 download 端点、经会话鉴权 + merchant scope + 发起者对该商户当前有效权限裁决（撤权 → 403）,短期有效。跨 scope exportJobId → 404。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: exportJobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 导出任务状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              example:
                exportJobId: exp_3c81f0
                status: READY
                downloadUrl: /api/merchant/v1/exports/exp_3c81f0/download
                expiresAt: '2026-05-19T16:00:00Z'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /exports/{exportJobId}/download:
    get:
      tags:
        - export
      operationId: downloadExport
      summary: 下载导出文件
      description: READY 任务的实际文件下载,`getExport` 的 downloadUrl 指向此端点:经会话 + 当前 merchant scope + 发起者对该商户当前有效权限裁决（撤权 → 403）。跨 scope / 不存在 → 404;任务未 READY → 409;下载链接过期 → 410。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: exportJobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 导出文件流（XLSX 二进制）
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '410':
          $ref: '#/components/responses/Gone'
      x-error-codes:
        '409':
          - 208001
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-msession
      description: |
        商户后台 BFF 服务端会话 cookie（httpOnly / secure / SameSite；`__Host-` 前缀强制 Secure + Path=/ + 无 Domain，杜绝子域注入）。 浏览器只持此会话 cookie、不持后端 token。会话裁决商户 scope（当前商户从会话取、不信请求体）。 写接口（非安全方法）另需 CSRF 防护（X-CSRF-Token）；商户级读写另挂 MerchantContextGuard 守卫（见下方 parameters）。
  schemas:
    FundPool:
      type: string
      description: 资金池。
      enum:
        - ACCOUNT_BALANCE
        - REFUND_RESERVE
    SettlementMode:
      type: string
      description: 手续费结算模式（只读展示,切换归管理后台）:NETTING 轧差 / MONTHLY 月结（收支分离）。
      enum:
        - NETTING
        - MONTHLY
    SettlementStatus:
      type: string
      description: 结算单商户视角状态（四态;不展示具名冻结态）。封闭枚举：扩值按破坏性变更版本化。
      enum:
        - PENDING
        - PROCESSING
        - SETTLED
        - FAILED
    LedgerEntryType:
      type: string
      description: 账户流水类型（商户视角）。**与结算明细类型有意不完全一致**:① `SETTLEMENT_PAYOUT`（结算出款）仅出现在流水、不作为结算明细类型;② 退款失败回冲在流水侧归 `REFUND`（带相反正号、与原退款负腿抵消）、流水不单列 REFUND_REVERSAL——而结算明细侧单列 `REFUND_REVERSAL`（逐笔可追溯需要）。封闭枚举：扩值按破坏性变更版本化。
      enum:
        - PAYMENT
        - REFUND
        - SYSTEM_ADJUSTMENT
        - TOP_UP
        - AUTO_REPLENISH
        - WITHDRAW
        - SETTLEMENT_PAYOUT
    AccountOverview:
      description: 资金概览。**按 degraded 拆两分支**：正常返全金额；上游账务查询超时 → 降级分支**金额字段省略**、不伪造资金、展示「暂不可用」。
      oneOf:
        - $ref: '#/components/schemas/AccountOverviewNormal'
        - $ref: '#/components/schemas/AccountOverviewDegraded'
    AccountOverviewNormal:
      type: object
      additionalProperties: false
      description: 正常：金额可用（degraded=false）。
      required:
        - accountBalance
        - toSettle
        - refundReserve
        - availableBalance
        - currency
        - settlementMode
        - preauthHoldIncludedInDisplay
        - degraded
      properties:
        accountBalance:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Account Balance 卡片展示值（账本值恒 ≥ 0;展示值是否并入预授权挂起额由 preauthHoldIncludedInDisplay 决定,不改账本值）。
        toSettle:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 待结算（按手续费结算模式派生,本面只展示、不二次计算）。
        refundReserve:
          $ref: '#/components/schemas/Money'
        availableBalance:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 可用额（= Account Balance − 应收商户款,可呈负、纯展示;反欠平台体现为负）。
        currency:
          $ref: '#/components/schemas/Currency'
        settlementMode:
          $ref: '#/components/schemas/SettlementMode'
        preauthHoldIncludedInDisplay:
          type: boolean
          readOnly: true
          description: '**管理后台设置的 per-商户展示配置**（本面只读展示、非本面可写）:Account Balance 卡片展示值是否并入平台侧预授权挂起额（默认 true;不并入时不单列挂起额）。不改账本值与 To Settle 派生口径。'
        degraded:
          type: boolean
          const: false
          description: 金额可用（非降级）。
    AccountOverviewDegraded:
      type: object
      additionalProperties: false
      description: 上游账务查询超时降级：**金额字段省略**、展示「暂不可用」（不伪造资金数据）。currency / settlementMode / 展示配置不受上游超时影响，仍返回。
      required:
        - currency
        - settlementMode
        - preauthHoldIncludedInDisplay
        - degraded
      properties:
        currency:
          $ref: '#/components/schemas/Currency'
        settlementMode:
          $ref: '#/components/schemas/SettlementMode'
        preauthHoldIncludedInDisplay:
          type: boolean
          readOnly: true
          description: 管理后台设置的 per-商户展示配置（只读消费）。
        degraded:
          type: boolean
          const: true
          description: 上游账务查询超时降级；金额字段不可用、不伪造。
    RelatedRef:
      type: object
      description: 关联单据 / 操作记录引用（订单 / 退款 / 结算单 / 储备金操作 / 系统调整）。
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - ORDER
            - REFUND
            - SETTLEMENT
            - RESERVE_OPERATION
            - SYSTEM_ADJUSTMENT
        id:
          type: string
          description: 业务标识（系统账务对手方账户不展示）。
        label:
          type: string
          description: 展示用辅标识（如关联订单号）。
    LedgerEntry:
      type: object
      required:
        - entryId
        - occurredAt
        - pool
        - type
        - amount
        - balanceAfter
      description: 账户流水分录（商户侧;只读、不可变——冲正另生成一条新分录、不改历史）。
      properties:
        entryId:
          type: string
          readOnly: true
        occurredAt:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
        pool:
          $ref: '#/components/schemas/FundPool'
        type:
          $ref: '#/components/schemas/LedgerEntryType'
        amount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 带符号金额（出账为负;商户结算币种）。
        balanceAfter:
          allOf:
            - $ref: '#/components/schemas/Money'
          readOnly: true
          description: 对应资金池变动后余额。
        relatedRef:
          $ref: '#/components/schemas/RelatedRef'
        memo:
          type: string
          description: 备注（系统账务展示调整原因,不暴露对手方账户）。
    SettlementSummary:
      type: object
      required:
        - settlementId
        - period
        - netSales
        - fee
        - settledAmount
        - status
        - settlementDate
      description: 结算单汇总。
      properties:
        settlementId:
          type: string
          readOnly: true
        period:
          $ref: '#/components/schemas/Period'
        netSales:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 净销售额。
        fee:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 手续费。
        settledAmount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 本期结算金额（本结算单打入银行的净额;按本批结算影响明细 + 手续费结算模式产出,本面只展示）。
        status:
          $ref: '#/components/schemas/SettlementStatus'
          readOnly: true
        settlementDate:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
    SettlementLine:
      type: object
      required:
        - type
        - amount
        - settlementAmount
        - occurredAt
      description: 逐笔结算影响明细。
      properties:
        type:
          type: string
          description: 明细类型（REFUND_REVERSAL = 退款失败回冲、正向明细,符号与 REFUND 相反、不可坍缩进 REFUND）。封闭枚举：扩值按破坏性变更版本化。
          enum:
            - PAYMENT
            - REFUND
            - REFUND_REVERSAL
            - TOP_UP
            - AUTO_REPLENISH
            - WITHDRAW
            - SYSTEM_ADJUSTMENT
        relatedRef:
          $ref: '#/components/schemas/RelatedRef'
        amount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 原始金额（负向项为负）。
        fee:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 手续费（如适用;另计、不参与逐笔结算金额合计）。
        settlementAmount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 本笔结算金额（带符号;逐笔合计 = 汇总本期结算金额）。
        occurredAt:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
        memo:
          type: string
    SettlementDetail:
      type: object
      required:
        - summary
        - lines
        - currency
      description: 结算单详情 = 汇总 + 逐笔明细 + 当前生效结算账户（只读展示）。
      properties:
        summary:
          $ref: '#/components/schemas/SettlementSummary'
        lines:
          type: array
          items:
            $ref: '#/components/schemas/SettlementLine'
        settlementAccountLast4:
          type: string
          readOnly: true
          description: 当前生效结算账户银行后 4 位（只读展示,仅供核对）。
        currency:
          $ref: '#/components/schemas/Currency'
    StatementSummary:
      type: object
      required:
        - statementId
        - period
        - netSettlement
        - txnCount
        - serviceFee
        - status
      description: 月度账单汇总。月度账单上游契约待建,字段 / 生成时点 / 新鲜度落定后可能调整。
      properties:
        statementId:
          type: string
          readOnly: true
        period:
          type: string
          description: 账单期间（月,YYYY-MM）。
        netSettlement:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Net Settlement（月度净结算汇总;不等同单张结算单本期结算金额）。
        txnCount:
          type: integer
          format: int64
          description: 交易笔数。
        serviceFee:
          $ref: '#/components/schemas/Money'
        status:
          type: string
          readOnly: true
          description: 可见状态（ISSUED 已出具 / PAID 已结清,如上游提供;轧差模式多停留 ISSUED）。封闭枚举：上游扩值按破坏性变更版本化。
          enum:
            - ISSUED
            - PAID
    StatementServiceLine:
      type: object
      required:
        - count
        - gross
        - fee
      description: 账单服务明细行（按服务 / 渠道分行）。
      properties:
        service:
          type: string
        channel:
          type: string
        count:
          type: integer
          format: int64
        gross:
          $ref: '#/components/schemas/Money'
        rate:
          type: string
          description: 费率展示（如 2.65%;本面只展示）。
        fee:
          $ref: '#/components/schemas/Money'
    StatementDetail:
      type: object
      required:
        - statementId
        - invoiceNo
        - issuedAt
        - currency
        - serviceLines
        - grossVolume
        - serviceFee
        - netSettlement
      description: 月度账单详情（服务费账单;不含税 / 终端 APP 订阅费、不区分收费模式）。
      properties:
        statementId:
          type: string
          readOnly: true
        invoiceNo:
          type: string
          readOnly: true
          description: 发票号。
        issuedAt:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
        currency:
          $ref: '#/components/schemas/Currency'
        serviceLines:
          type: array
          items:
            $ref: '#/components/schemas/StatementServiceLine'
        grossVolume:
          $ref: '#/components/schemas/Money'
        serviceFee:
          $ref: '#/components/schemas/Money'
        netSettlement:
          $ref: '#/components/schemas/Money'
    Period:
      type: object
      required:
        - from
        - to
      description: 清算周期区间。
      properties:
        from:
          $ref: '#/components/schemas/Timestamp'
        to:
          $ref: '#/components/schemas/Timestamp'
    OtpChallenge:
      type: object
      required:
        - challengeId
        - deliveredTo
        - cooldownSeconds
        - expiresAt
      description: Owner email OTP 挑战。挑战绑定本次操作摘要与发起会话——funding 提交须同会话、摘要一致,否则 → 403。
      properties:
        challengeId:
          type: string
          readOnly: true
        deliveredTo:
          type: string
          readOnly: true
          description: 脱敏投递目标（如 o***@e***.com）。
        cooldownSeconds:
          type: integer
          readOnly: true
          description: 重发冷却秒数（业务参数）。
        expiresAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          readOnly: true
          description: challenge 失效时间（业务参数）;过期后 funding 提交即使摘要一致亦 → 410 重挑战。
    OtpProof:
      type: object
      required:
        - challengeId
        - code
      additionalProperties: false
      description: OTP 凭证（提交 funding 时携带）。
      properties:
        challengeId:
          type: string
        code:
          type: string
          minLength: 4
          maxLength: 12
          description: Owner 邮箱 OTP（长度业务参数,此处给宽界）。
    AutoReplenishConfig:
      type: object
      required:
        - enabled
      additionalProperties: false
      description: auto-replenish 配置（开关 + Account Limit 阈值;Refund Reserve 低于阈值时由平台自动从 Account Balance 补足）。配置字段变更纳入 OTP 摘要。`enabled=true ⇒ accountLimit 必填且 > 0`。
      if:
        properties:
          enabled:
            const: true
        required:
          - enabled
      then:
        properties:
          accountLimit: {}
        required:
          - accountLimit
      properties:
        enabled:
          type: boolean
        accountLimit:
          allOf:
            - $ref: '#/components/schemas/PositiveMoney'
          description: Account Limit 阈值（enabled=true 时必填且 > 0）。
    RefundReserveOperationSummary:
      type: object
      description: 储备金 funding 操作摘要（**topUpAmount / autoReplenish 至少其一**,anyOf 守;空 `{}` 非法）。OTP challenge 绑定此摘要（含金额 + 币种 + 字段存在性;币种须 == 商户结算币种、失配 → 403）,funding 提交摘要须与 challenge 绑定一致——否则 → 403（防串改金额 / 改币种 / 夹带配置）。
      anyOf:
        - required:
            - topUpAmount
        - required:
            - autoReplenish
      properties:
        topUpAmount:
          allOf:
            - $ref: '#/components/schemas/PositiveMoney'
          description: Top Up 金额（来源固定 Account Balance;> 0;缺省则本次只改配置）。
        autoReplenish:
          allOf:
            - $ref: '#/components/schemas/AutoReplenishConfig'
          description: auto-replenish 配置变更（缺省则本次只 Top Up;含 enabled + accountLimit 全字段,纳入 OTP 摘要绑定）。
    RefundReserveFundingRequest:
      description: funding 请求 = 操作摘要 + OTP 凭证（摘要须与 otp.challengeId 绑定的摘要一致,否则拒绝重挑战）。字段全集 = {topUpAmount, autoReplenish, otp},未知字段拒绝。
      unevaluatedProperties: false
      allOf:
        - $ref: '#/components/schemas/RefundReserveOperationSummary'
        - type: object
          required:
            - otp
          properties:
            otp:
              $ref: '#/components/schemas/OtpProof'
    ReserveOperationResult:
      type: object
      required:
        - operationId
        - kind
        - status
      description: 储备金**商户发起**操作结果（Top Up / Withdraw）。auto-replenish 的系统执行结果不在此商户发起 kind,商户经流水 AUTO_REPLENISH + 站内事件可见。
      properties:
        operationId:
          type: string
          readOnly: true
          description: 操作标识（= 顶层 RefundReserveFundingResult / OperationDetail 同一操作 ID,供轮询）。
        kind:
          type: string
          readOnly: true
          enum:
            - TOP_UP
            - WITHDRAW
        status:
          type: string
          readOnly: true
          description: SUCCEEDED 已落账 / FAILED 已拒绝(不划转) / **PENDING** 已放行但结果未达终态(响应丢失 / 处理中;凭 operationId 轮询收敛,不另划转)。
          enum:
            - SUCCEEDED
            - FAILED
            - PENDING
        amount:
          $ref: '#/components/schemas/Money'
          readOnly: true
        fundEventId:
          type: string
          readOnly: true
          description: 资金事件标识（权威执行结果）。
        resultCode:
          type: string
          description: 失败结构化结果码。
        resultDetail:
          type: string
          description: 结果描述（不拼平台侧账户 / 对手方）。
        occurredAt:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
    ConfigResult:
      type: object
      required:
        - status
        - enabled
      description: auto-replenish 配置变更结果。配置写幂等、一般同步;其自动补足执行由平台在 Refund Reserve 低于阈值时触发,不在本配置写。
      properties:
        status:
          type: string
          readOnly: true
          description: SAVED 已保存 / FAILED 已拒绝 / PENDING(仅 funding 处理中间态、罕见)。
          enum:
            - SAVED
            - FAILED
            - PENDING
        enabled:
          type: boolean
        accountLimit:
          $ref: '#/components/schemas/PositiveMoney'
          readOnly: true
        resultCode:
          type: string
        resultDetail:
          type: string
    RefundReserveFundingResult:
      type: object
      required:
        - operationId
      description: funding 处理结果（按提交项返回;部分失败时各项独立 status）。
      properties:
        operationId:
          type: string
          readOnly: true
          description: 操作标识（= 稳定轮询键，供 getReserveOperation 轮询；**config-only PENDING 提交也返回**；顶层与各子结果 operationId 同值 = 同一操作）。
        topUpResult:
          $ref: '#/components/schemas/ReserveOperationResult'
        autoReplenishResult:
          $ref: '#/components/schemas/ConfigResult'
    OperationDetail:
      type: object
      required:
        - operationId
        - opType
      description: 储备金**商户发起**操作（funding / withdrawal）全部子写状态（GET /operations 返回;含 config 子写,供 PENDING 收敛轮询）。auto-replenish **系统触发**操作不经此查询——经账户流水 AUTO_REPLENISH + 站内事件可见。
      properties:
        operationId:
          type: string
          readOnly: true
          description: 操作标识。
        opType:
          type: string
          readOnly: true
          enum:
            - FUNDING
            - WITHDRAW
        topUpResult:
          $ref: '#/components/schemas/ReserveOperationResult'
        autoReplenishResult:
          $ref: '#/components/schemas/ConfigResult'
        withdrawResult:
          $ref: '#/components/schemas/ReserveOperationResult'
    RefundReserveWithdrawalRequest:
      type: object
      additionalProperties: false
      description: 储备金取回（**amount 与 max 恰二选一**,both / neither 非法）。字段全集 = {amount, max}、拒未知字段。
      oneOf:
        - properties:
            amount: {}
          required:
            - amount
          not:
            properties:
              max: {}
            required:
              - max
        - properties:
            max: {}
          required:
            - max
          not:
            properties:
              amount: {}
            required:
              - amount
      properties:
        amount:
          allOf:
            - $ref: '#/components/schemas/PositiveMoney'
          description: 取回金额（> 0;与 max 二选一）。
        max:
          type: boolean
          const: true
          description: 取回当前全部可取回 Refund Reserve（仅接受 true,不取全部请走 amount;全部金额由服务端按执行时的实际可取额定额,前端不自读余额填）。
    ExportRequest:
      description: 导出请求（异步、按当前查询条件、范围与查询一致不局限分页）。**按 kind 拆 oneOf**（各类必需字段不同：列表类带 filters、单资源需 resourceId；format 钉 XLSX）。月度账单 PDF 不经此（走同步 getStatementPdf）。
      oneOf:
        - $ref: '#/components/schemas/ExportSettlementsRequest'
        - $ref: '#/components/schemas/ExportSettlementDetailRequest'
        - $ref: '#/components/schemas/ExportLedgerRequest'
      discriminator:
        propertyName: kind
        mapping:
          SETTLEMENTS: '#/components/schemas/ExportSettlementsRequest'
          SETTLEMENT_DETAIL: '#/components/schemas/ExportSettlementDetailRequest'
          LEDGER: '#/components/schemas/ExportLedgerRequest'
    ExportSettlementsRequest:
      type: object
      additionalProperties: false
      description: 结算单列表导出（XLSX）。
      required:
        - kind
        - format
      properties:
        kind:
          type: string
          const: SETTLEMENTS
        format:
          type: string
          const: XLSX
        filters:
          $ref: '#/components/schemas/SettlementExportFilters'
    ExportSettlementDetailRequest:
      type: object
      additionalProperties: false
      description: 单结算单详情导出（XLSX；必需 resourceId = settlementId）。
      required:
        - kind
        - format
        - resourceId
      properties:
        kind:
          type: string
          const: SETTLEMENT_DETAIL
        format:
          type: string
          const: XLSX
        resourceId:
          type: string
          description: settlementId。
    ExportLedgerRequest:
      type: object
      additionalProperties: false
      description: 账户流水导出（XLSX）。
      required:
        - kind
        - format
      properties:
        kind:
          type: string
          const: LEDGER
        format:
          type: string
          const: XLSX
        filters:
          $ref: '#/components/schemas/LedgerExportFilters'
    SettlementExportFilters:
      type: object
      additionalProperties: false
      description: 结算单导出过滤（镜像 listSettlements query params：dateFrom / dateTo / status / keyword / sort）。
      properties:
        dateFrom:
          $ref: '#/components/schemas/Timestamp'
        dateTo:
          $ref: '#/components/schemas/Timestamp'
        status:
          $ref: '#/components/schemas/SettlementStatus'
        keyword:
          type: string
          maxLength: 128
        sort:
          type: string
          enum:
            - settlementDate_desc
            - settlementDate_asc
            - settledAmount_desc
            - settledAmount_asc
          default: settlementDate_desc
    LedgerExportFilters:
      type: object
      additionalProperties: false
      description: 账户流水导出过滤（镜像 getLedger query params：dateFrom / dateTo / type〔多值〕 / pool / keyword）。
      properties:
        dateFrom:
          $ref: '#/components/schemas/Timestamp'
        dateTo:
          $ref: '#/components/schemas/Timestamp'
        type:
          type: array
          items:
            $ref: '#/components/schemas/LedgerEntryType'
          description: 类型过滤（可多值，同 getLedger）
        pool:
          $ref: '#/components/schemas/FundPool'
        keyword:
          type: string
          maxLength: 128
    ExportJob:
      type: object
      required:
        - exportJobId
        - status
      description: 导出任务。
      properties:
        exportJobId:
          type: string
          readOnly: true
        status:
          type: string
          readOnly: true
          enum:
            - PENDING
            - PROCESSING
            - READY
            - FAILED
        downloadUrl:
          type: string
          readOnly: true
          description: READY 时短期有效下载链接。
        expiresAt:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
        resultDetail:
          type: string
          description: FAILED 原因 / 空结果 / 超限提示。
    Currency:
      type: string
      description: ISO-4217 币种码。本期最小覆盖 CAD/USD/HKD/CNY(部署时可配置扩展)。
      examples:
        - CAD
        - USD
        - HKD
        - CNY
    Money:
      type: object
      description: 金额 = 最小币种单位整数(字符串) + 币种(禁裸数字流转;金额口径:字符串防 JSON number 精度丢失)。
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          pattern: ^-?[0-9]+$
          description: 最小币种单位整数的字符串(如 CAD 分 "1050";展示层按币种 minorUnit 换算)。可重定义面默认最小单位整数字符串;十进制金额须接口契约显式声明。
        currency:
          $ref: '#/components/schemas/Currency'
    ErrorEnvelope:
      type: object
      description: 统一错误返回(错误响应体:结构化整数 code + detail + 可选 links;扩展 traceId/details)。
      required:
        - code
        - detail
      properties:
        code:
          type: integer
          description: 结构化整数错误码(能力域段 + 责任方类别 + 域内末段;可解析责任方+来源域,与 HTTP 状态正交)。
        detail:
          type: string
          description: 错误描述(面向调用方;本地化按 locale)。
        links:
          type: object
          description: 可选:错误说明 / 后续恢复操作链接。
          additionalProperties:
            type: string
        traceId:
          type: string
          description: 可选:关联 id,串联日志 / 分布式 trace(可观测)。
        details:
          type: array
          description: 可选:字段级校验错误。
          items:
            type: object
            required:
              - field
              - issue
            properties:
              field:
                type: string
              issue:
                type: string
    MerchantBffError:
      description: 商户后台 BFF 错误体 = ErrorEnvelope + 可选 context（错误专属结构化上下文，非字段校验 details）。
      allOf:
        - $ref: '#/components/schemas/ErrorEnvelope'
        - type: object
          properties:
            context:
              type: object
              description: 错误专属结构化上下文（非 details 字段校验数组）。MERCHANT_CONTEXT_CHANGED 时携 currentMerchantId 供前端 re-sync。
              properties:
                currentMerchantId:
                  type:
                    - string
                    - 'null'
                  description: 服务端会话当前商户（≠ 请求携带的 expected X-Merchant-Context）；**null = 无当前商户**（前端须重选）。**契约不变量**：code=208001 时本字段必 **present**（值可为 null）。
    Timestamp:
      type: string
      format: date-time
      description: 'RFC 3339 date-time。in/out 非对称:**响应 MUST UTC `Z`**(如 2026-05-19T14:30:00Z); **请求/query 入参 MAY 任意合法 offset**,服务端归一 UTC(format: date-time 同时接受 Z 与 offset, 「出参 Z」是约定、非 schema 可强制)。展示/清算切日按商户 IANA 时区(单独字段,offset ≠ timezone)。'
    PositiveMoney:
      description: 正额金额（amount = 最小币种单位正非零整数字符串、currency 同 Money）；schema 化收口「> 0」。用于「划多少」类输入（资金划转额 / 阈值 / 退款额等），金额方向由具体业务操作表达、不用正负号表示；区别于 Money（可正可负，用于余额 / 分录 / 结算净额 / 回冲等账面值）。
      allOf:
        - $ref: '#/components/schemas/Money'
        - type: object
          properties:
            amount:
              type: string
              pattern: ^[1-9][0-9]*$
  parameters:
    MerchantContextGuard:
      name: X-Merchant-Context
      in: header
      required: true
      description: |
        stale-tab 一致性守卫（读写统一）：页面预期的当前商户 ID。与会话当前商户比对，一致才执行； **不一致 → 409 `MerchantBffConflict`**（`code` `208001`、`MERCHANT_CONTEXT_CHANGED`）——**读不返回错商户数据、写不执行**，响应 `context.currentMerchantId` 回显服务端当前商户供前端直接 re-sync。 挂在所有依赖当前商户的读 + 写接口；前端统一 interceptor 发送 + 处理 409（提示并刷新当前商户）。 **豁免**：listMerchants（返回 currentMerchantId 的 re-sync 入口）、switchCurrentMerchant（切换当前商户）、withdrawOnboardingApplication（目标由 path 指定、与当前商户无关）、以及不依赖当前商户的接口。
      schema:
        type: string
        minLength: 1
    PageNum:
      name: pageNum
      in: query
      description: 页码(从 1 计;分页)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      description: 每页记录数(上限可配置;分页默认 20)
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: CSRF 令牌(double-submit;cookie 会话鉴权的非安全方法[POST/PUT/PATCH/DELETE]必带;缺失/不匹配 → 403 fail-closed)
      schema:
        type: string
        minLength: 1
        pattern: \S
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: 幂等键(写接口;三段命中语义)
      schema:
        type: string
        minLength: 1
        pattern: \S
  responses:
    Forbidden:
      description: 403 无权限(fail-secure,默认拒绝)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    MerchantBffConflict:
      description: |
        409 冲突。前端据整数 `code` 区分子因——**常见 `208xxx` 商户后台 BFF 业务·资源型**（下列枚举）；**部分 409 另带身份类业务码**（如 `968xxx`：Login ID 占用 / 改邮箱在途等），**具体码以该 op 的 `x-error-codes` 为准**（另有同域 op 专属 `208xxx`，均不在此枚举）： `208001` **stale-tab 守卫 `MERCHANT_CONTEXT_CHANGED`**——**必携 `context.currentMerchantId`** 供前端 re-sync 当前商户； `208002` 资源已有进行中变更请求或已 `PENDING_REVIEW`（重复提交）； `208003` 状态前置不符（非法状态迁移 / 目标已决策）； `208005` 幂等键复用但 payload 不一致。 （`208004` 不适用本 BFF 面、故不在此枚举。） 前端动作：208001 刷新当前商户、208002 提示已存在、208003 重载最新态、208005 排查重复请求。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MerchantBffError'
          examples:
            staleTab:
              summary: stale-tab 守卫命中（code 208001，必携 context.currentMerchantId）
              value:
                code: 208001
                detail: 页面预期商户与会话当前商户不一致，请刷新到当前商户
                context:
                  currentMerchantId: '1000024'
            businessConflict:
              summary: 业务冲突（code 208002，资源已有进行中变更请求 / 已 PENDING_REVIEW；业务·资源型无 context）
              value:
                code: 208002
                detail: 该资源已有进行中的变更请求或已处于待审核状态，请勿重复提交
            idempotencyConflict:
              summary: 幂等键冲突（code 208005，同 Idempotency-Key 复用但请求内容不一致；业务·资源型无 context）
              value:
                code: 208005
                detail: 该幂等键已用于其他请求内容，请核对原请求；如确需发起新的业务操作，再使用新幂等键
    NotFound:
      description: 404 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    BadRequest:
      description: 400 业务/校验错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: 429 限流 / 冷却中 / 请求过频(临时锁定走 423 Locked)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Gone:
      description: 410 一次性凭据失效(OTP / 验证链接 过期 / 已使用)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Locked:
      description: 423 登录临时锁定(防爆破)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
