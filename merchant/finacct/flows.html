# 账户账务与清结算 —— 调用时序

> 本文是 `openapi.yaml` 的**调用顺序伴档**：OpenAPI 讲清每个接口的入参 / 出参 / 错误码（WHAT），本文讲清**多步流程里先调谁、后调谁、分支怎么走、什么触发 OTP / 轮询**（HOW）。
>
> **视角**：浏览器(SPA) ↔ BFF。前端只与 BFF 交互；BFF 内部对身份服务（Owner OTP）、账务核心（资金划转）的委派**不画**（后端面，与前端无关）。外部参与方（Owner 邮箱）仅在用户可见时出现。
>
> **接口 ID = `operationId`**：下方每个发往 BFF 的调用都标 `[operationId]`，即 OpenAPI 原生 `operationId`——全局唯一，也是生成客户端的**方法名**。**图例表与正文里的 operationId 是可点深链**，直达 ReDoc 接口详情；时序图**内**的 `[operationId]` 受 Mermaid 限制不可点，点同名链接即可。
>
> **通用约定**（每条流程都成立，不在图里重复）：浏览器**不持 token**——靠 httpOnly opaque 会话 cookie(`__Host-msession`)，服务端持后端 token；非安全方法(POST/PUT/DELETE)一律带 `X-CSRF-Token`；**所有当前商户相关读写携带页面当前 merchantId（`X-Merchant-Context`）**——与会话当前商户不一致 → 409 `MERCHANT_CONTEXT_CHANGED`，FE 统一处理（见 [API 基础约定](../../conventions.html)）；金额一律**最小币种单位整数字符串 + 币种**（如 `{ amount: "150000", currency: CAD }`）；错误体统一 `ErrorEnvelope`（结构 / 状态码 / 责任方→前端策略 / 分页 / 幂等 / CSRF / 鉴权会话 详见 [API 基础约定](../../conventions.html)）。
>
> ⚠️ **碰钱红线**：储备金 Top Up / Withdraw 是**资金动作**——写请求带 `Idempotency-Key`，**重试必须复用同一个键**（同一幂等键重试会继续原操作，不重复划转）；金额格式 / OTP 校验失败即不生效，前端**不放大重试**、按错误码引导用户。
>
> ⚠️ **design / review 阶段**契约 —— 实现前可能调整，可据此并行开发，勿当冻结契约。

## 接口 ID 对照(图例，点 operationId 跳接口)

| operationId | method + path | 用途 |
|---|---|---|
| [`getAccountOverview`](index.html#tag/account-overview/operation/getAccountOverview) | `GET /account/overview` | 资金概览(Account Balance / To Settle / Refund Reserve 三池) |
| [`listAccountLedger`](index.html#tag/account-ledger/operation/listAccountLedger) | `GET /account/ledger` | 账户流水(过滤 + 搜索 + 分页，只读分录投影) |
| [`listSettlements`](index.html#tag/settlement/operation/listSettlements) | `GET /settlements` | 结算单列表(周期 / 状态过滤 + 搜索 + 排序 + 分页) |
| [`getSettlementDetail`](index.html#tag/settlement/operation/getSettlementDetail) | `GET /settlements/{settlementId}` | 结算单详情(批次汇总 + 逐笔结算影响明细) |
| [`listStatements`](index.html#tag/statement/operation/listStatements) | `GET /statements` | 月度账单列表(按年份过滤) |
| [`getStatementDetail`](index.html#tag/statement/operation/getStatementDetail) | `GET /statements/{statementId}` | 月度账单详情(服务明细分行 + Net Settlement) |
| [`getStatementPdf`](index.html#tag/statement/operation/getStatementPdf) | `GET /statements/{statementId}/pdf` | 单月账单 PDF 导出(二进制流) |
| [`requestRefundReserveOtp`](index.html#tag/refund-reserve/operation/requestRefundReserveOtp) | `POST /refund-reserve/otp-challenges` | 储备金操作发起 Owner email OTP(绑定本次操作摘要) |
| [`submitRefundReserveFunding`](index.html#tag/refund-reserve/operation/submitRefundReserveFunding) | `POST /refund-reserve/funding` | 储备金充值 + auto-replenish 配置(单次 Owner OTP) |
| [`submitRefundReserveWithdrawal`](index.html#tag/refund-reserve/operation/submitRefundReserveWithdrawal) | `POST /refund-reserve/withdrawals` | 储备金取回 Account Balance(无 OTP) |
| [`getReserveOperation`](index.html#tag/refund-reserve/operation/getReserveOperation) | `GET /refund-reserve/operations/{operationId}` | 储备金操作状态(PENDING 轮询入口) |
| [`createExport`](index.html#tag/export/operation/createExport) | `POST /exports` | 创建导出任务(结算单 / 流水 / 账单；异步) |
| [`getExport`](index.html#tag/export/operation/getExport) | `GET /exports/{exportJobId}` | 导出任务状态 / 下载 |

## 读类：单调用，无编排

资金概览 / 账户流水 / 结算单(列表 + 详情) / 月度账单(列表 + 详情 + PDF) 都是**单次 GET**，由对应页面直接调用、无多步时序：

- 列表类(`listAccountLedger` / `listSettlements` / `listStatements`)用共享 `pageNum` / `pageSize` 分页 + `{ total, data[] }`，按各自过滤 / 搜索参数查询。
- 详情类(`getSettlementDetail` / `getStatementDetail`)按 `{id}` 取单条。
- `getStatementPdf` 返回 `application/pdf` 二进制流（非 JSON），前端直接触发下载。
- `getAccountOverview` 上游账务读超时会**降级**（concept：degraded 概览），前端展示「暂不可用」而非阻塞——只读降级，**资金写无安全降级**（见下）。

下面 3 条是有多步编排、值得讲清调用顺序的流程。

---

## 储备金充值 + auto-replenish 配置(两阶段 Owner OTP)

碰钱动作，**两阶段**：先 [`requestRefundReserveOtp`](index.html#tag/refund-reserve/operation/requestRefundReserveOtp) 拿 `challengeId`（OTP 投递到 **Owner 邮箱**），用户读到 OTP 后用 [`submitRefundReserveFunding`](index.html#tag/refund-reserve/operation/submitRefundReserveFunding) 带 OTP + **同一操作摘要**提交。一次可同时 Top Up + 配置 auto-replenish（二者至少其一、共用一次 OTP）。

```mermaid
sequenceDiagram
    participant B as 浏览器(SPA)
    participant A as 商户后台 BFF
    participant EO as Owner 邮箱
    B->>A: [requestRefundReserveOtp] POST /refund-reserve/otp-challenges { topUpAmount?, autoReplenish? }
    A->>EO: 发 Owner email OTP(绑定本次操作摘要 + 会话)
    A-->>B: 202 OtpChallenge{ challengeId, deliveredTo, cooldownSeconds, expiresAt }
    EO-->>B: 用户读取 Owner 邮箱 OTP
    B->>A: [submitRefundReserveFunding] POST /refund-reserve/funding<br/>Idempotency-Key ＋ { otp(challengeId ＋ 验证码), 同一 topUpAmount?/autoReplenish? }
    alt 子项均同步达终态
        A-->>B: 200 RefundReserveFundingResult{ topUpResult?, autoReplenishResult? }(项 ⟺ 提交项)
    else 有子项未达终态
        A-->>B: 200 RefundReserveFundingResult{ topUpResult/autoReplenishResult 含 PENDING 子项 }
        loop 直到子项终态
            B->>A: [getReserveOperation] GET /refund-reserve/operations/{operationId}
            A-->>B: 200 OperationDetail{ opType＝FUNDING, topUpResult/autoReplenishResult 子项 status }
        end
    end
    Note over B,A: 重试必须复用同一 Idempotency-Key → 同一幂等键重试会继续原操作，不重复验证 OTP、也不重复划转<br/>提交内容与申请 OTP 时不一致 403（防夹带/改额，须重发 OTP）<br/>challenge 过期 410（重发 OTP）<br/>OTP 错误超限锁定 423<br/>冷却中/限流 429<br/>同一幂等键对应的请求内容不一致 409<br/>金额格式/校验 400
```

- **OTP 发往 Owner 邮箱、非操作者邮箱**：202 返回脱敏目标邮箱供前端展示「OTP 已发至 o***@example.com」；若操作者非 Owner，需 Owner 转告 OTP（资金动作须 Owner 联签）。
- **同一摘要贯穿两阶段**：funding 提交的 `topUpAmount` / `autoReplenish` 必须与发 OTP 时**完全一致**——服务端校验提交内容与申请 OTP 时完全一致，不一致 403（杜绝「批了 A 改成 B / 改币种 / 夹带配置」）。前端两阶段间不要让用户改额。
- **项 ⟺ 提交项、可部分成功**：提交 `topUpAmount` + `autoReplenish` → 回 `topUpResult`（status `SUCCEEDED/FAILED/PENDING`）+ `autoReplenishResult`（status `SAVED/FAILED/PENDING`）；可能一项成功、一项失败，前端**分项回报**、别整体判成败。
- **PENDING 轮询**：`RefundReserveFundingResult` / `OperationDetail` **无顶层 `status`**——看各子项（`topUpResult` / `autoReplenishResult`）的 `status`；未同步达终态时拿 `operationId` 轮询 `getReserveOperation` 至子项终态，终态以账务核心为准。
- **失败两者都不生效**：OTP 校验失败 / 提交内容不一致 / 会话不符时，Top Up 与配置**都不生效**，前端按错误码引导（重发 OTP / 稍后重试）。
- **金额由 PositiveMoney 守 > 0**；auto-replenish 开启时 Account Limit 必填且 > 0。

## 储备金取回(Withdraw，无 OTP)

[`submitRefundReserveWithdrawal`](index.html#tag/refund-reserve/operation/submitRefundReserveWithdrawal) 把 Refund Reserve 挪回 Account Balance——是**把钱挪回自己名下**，故**不需要 OTP**（与 Top Up 的对外资金承诺不同）。支持固定额或全额取回。

```mermaid
sequenceDiagram
    participant B as 浏览器(SPA)
    participant A as 商户后台 BFF
    B->>A: [submitRefundReserveWithdrawal] POST /refund-reserve/withdrawals<br/>Idempotency-Key ＋ { amount 或 max＝true(全额) }
    alt 同步达终态
        A-->>B: 200 ReserveOperationResult{ operationId, kind, status, amount }
    else 未达终态
        A-->>B: 200 ReserveOperationResult{ status＝ PENDING }
        loop 直到终态
            B->>A: [getReserveOperation] GET /refund-reserve/operations/{operationId}
            A-->>B: 200 OperationDetail{ opType＝WITHDRAW, withdrawResult.status }
        end
    end
    Note over B,A: 全额取回传 max＝true，前端不自读余额填 amount（避免余额变化造成取回金额错误）<br/>Reserve 不足 → status＝FAILED、不划转<br/>amount 与 max 二选一（both/neither 非法 400）<br/>幂等键复用、同一幂等键对应的请求内容不一致 409、限流 429
```

- **全额用 `max=true`**：「取回全部」由服务端按执行时的实际可取金额处理（后端处理、前端不可见），前端**不要**自己读余额再填 `amount`（会引入并发竞态）。固定额才传 `amount`。
- **`amount` 与 `max` 二选一**：都传 / 都不传 → 400。
- 取回去向 = 商户当前生效结算账户（只读展示）；Reserve 不足则 `FAILED`、不划转。

## 数据导出(异步：创建 → 轮询 → 下载)

列表 / 账单页的导出按钮走异步任务：[`createExport`](index.html#tag/export/operation/createExport) 受理建任务，前端用 [`getExport`](index.html#tag/export/operation/getExport) **轮询**到完成拿下载链接。

```mermaid
sequenceDiagram
    participant B as 浏览器(SPA)
    participant A as 商户后台 BFF
    B->>A: [createExport] POST /exports<br/>Idempotency-Key ＋ { kind, format(XLSX/PDF), resourceId?, filters? }
    A-->>B: 202 ExportJob{ exportJobId, status＝ PENDING }
    loop 直到 status 终态
        B->>A: [getExport] GET /exports/{exportJobId}
        A-->>B: 200 ExportJob{ status, downloadUrl?, expiresAt? }
    end
    Note over B,A: 按当前查询条件导出（filters，不局限当前分页）<br/>完成后 downloadUrl 短期有效（expiresAt 过期需重新导出）<br/>大结果集异步、超限/非法过滤 400
```

- **按查询条件、非当前页**：`filters` 镜像对应列表端点的过滤字段，导出的是符合条件的**全集**、不是当前分页；导出范围固定为发起时的当前商户，`filters` 仅表达筛选条件、不能扩大商户范围。
- **完成才有 `downloadUrl`**：轮询到终态(完成)再触发下载；`downloadUrl` 短期有效（`expiresAt`），过期需重新发起导出。
- 大结果集异步执行，前端发起后给 toast / 通知，不阻塞页面。
