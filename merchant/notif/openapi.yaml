openapi: 3.1.0
info:
  title: 商户后台 通知 (20-07 BFF) — 前端契约面
  version: 0.1.1
  contact:
    name: 商户后台 BFF
  description: |
    通知前端契约：通知设置页（Email / WeChat 通道总开关、只读 Primary + Extra 邮箱增删〔OTP 验证〕、 WeChat 通知接收方扫码绑定 / 解绑）+ 站内信（顶栏铃铛未读计数、列表 / 详情、已读回执、Dashboard 摘要）。 字段类型以本 spec 为准。 merchant scope 从会话取、不信请求体；全部 op merchant-current-scoped，均挂 MerchantContextGuard（stale-tab 守卫，无豁免）。 **全部端点前置 `Merchant.status = ACTIVE` 门禁**（非 ACTIVE → 403；仅 ACTIVE 商户可用日常能力〔通知设置 / 铃铛 / 站内信中心〕，会话上下文含 INCOMPLETE / PENDING_REVIEW / REJECTED 仅供入驻 / 拒绝页）。
servers:
  - url: /api/merchant/v1
    description: 商户后台 BFF（浏览器经边缘网关 merchant.* 可达；cookieAuth 会话 + CSRF）
security:
  - cookieAuth: []
tags:
  - name: notification-settings
    description: 通知设置：Email / WeChat 通道总开关 + 接收方管理（Extra 邮箱 OTP 两步、WeChat 扫码绑定会话）。
  - name: notices
    description: 站内信：铃铛未读计数 / 列表 / 详情 / 已读回执（商户级共享已读）/ Dashboard 摘要。
paths:
  /notification-settings:
    get:
      tags:
        - notification-settings
      operationId: getNotificationSettings
      summary: 读通知设置（通道开关 + Email 接收方 + WeChat 接收方）
      description: |
        返回当前商户通知设置聚合：Email / WeChat 通道总开关、只读 Primary（= Owner Primary Email，生命周期归注册登录与认证域、 变更随之即时反映）、已验证 Extra 邮箱列表、WeChat 通知接收方列表（昵称 + 绑定时间，平等、无 Primary/Extra 之分）。 站内信无商户开关（不出现在本聚合）。 **生效设置**：商户从未配置过通道开关时**仍返回 200**，两开关取商户已配置值、未配置则取当前部署默认值 （未配置商户实时取当前部署默认、而非某时刻冻结值）；接收方列表独立于开关设置、照常返回已有 Extra / WeChat。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: 通知设置聚合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSettings'
              example:
                channels:
                  email:
                    enabled: true
                  wechat:
                    enabled: true
                primaryEmail: owner@example.com
                extraEmailRecipients:
                  - recipientId: xtr_9f2a1c
                    email: finance@example.com
                    verifiedAt: '2026-07-01T10:00:00Z'
                wechatRecipients:
                  - recipientId: wnb_3d8e2f
                    nickname: 老板娘
                    boundAt: '2026-07-02T08:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /notification-settings/channels/{channel}:
    put:
      tags:
        - notification-settings
      operationId: updateNotificationChannel
      summary: 切换 Email / WeChat 通道总开关（关闭仅停投递、配置保留）
      description: |
        设置指定通道总开关。关闭后该通道不投递，接收方配置保留。 天然幂等（重复置同值 no-op）。站内信无商户开关、不在 channel 枚举内。 **首次配置**：从未配置过开关的商户首次切换直接成功——未配置的通道视为当前部署默认；**未被本次修改的通道不受影响**（另一通道保持其生效值）；两通道各自独立、互不覆盖。加 Extra / 绑 WeChat 不影响开关设置（接收方独立）。
      parameters:
        - name: channel
          in: path
          required: true
          description: 通道（仅 email / wechat；站内信无商户开关）。封闭枚举：新增通道属破坏性变更、走并行版本。
          schema:
            type: string
            enum:
              - email
              - wechat
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - enabled
              properties:
                enabled:
                  type: boolean
                  description: 通道总开关目标值
            example:
              enabled: false
      responses:
        '200':
          description: 已更新（返回该通道当前态）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationChannelState'
              example:
                enabled: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /notification-settings/email/extra-recipients/otp-challenges:
    post:
      tags:
        - notification-settings
      operationId: requestExtraEmailOtp
      summary: 添加 Extra 邮箱第 1 步——向候选邮箱发送 OTP
      description: |
        对候选 Extra 邮箱发起 OTP 挑战：服务端规范化（去首尾空格 + 大小写归一）→ 格式校验（非法 → 400，不发码）→ 去重校验（与 Primary 或已有 Extra 重复 → 409 208012）→ 发 6 位验证码到该邮箱（异步外发； 外发**受理未确认** → 502/504——非最终发送失败、不新增 Extra、可稍后重试）。 有效期 / 重发冷却 / 尝试上限为部署可配业务参数；冷却窗口内重复请求 → 429。 按多步挑战流程语义不挂幂等键（每次发新挑战，**仅使同一候选邮箱〔规范化后〕的既有活动挑战失效** 〔superseded，验证同 410〕；不同候选邮箱的挑战互不影响、可并行验证）。 本 OTP 只授予通知投递资格，不创建 / 修改员工登录 ID、不构成登录安全凭据。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  description: 候选 Extra 邮箱（服务端规范化后校验 + 发码）
            example:
              email: Finance@Example.com
      responses:
        '202':
          description: OTP 已受理发送（返回挑战信息；邮件为异步外发）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtraEmailOtpChallenge'
              example:
                challengeId: neo_5b1c9e3a
                email: finance@example.com
                cooldownSeconds: 60
                expiresAt: '2026-07-22T10:05:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '429':
          $ref: '#/components/responses/TooManyRequestsWithCooldown'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '409':
          - 208001
          - 208012
        '429':
          - 208013
  /notification-settings/email/extra-recipients/otp-challenges/{challengeId}/verification:
    post:
      tags:
        - notification-settings
      operationId: verifyExtraEmailOtp
      summary: 添加 Extra 邮箱第 2 步——校验 OTP，通过即生效
      description: |
        校验候选邮箱 OTP：匹配 + 未过期 + 未消费 + 未超尝试上限 → 通过则该邮箱（经验证）加入 Extra 列表并生效。 **通过时以当前 Primary 重做去重**（挑战有效期内 Owner Primary Email 若已改成该候选邮箱）：与当前 Primary / 已有 Extra 冲突 → 不创建 Extra、返 409 208012。开关配置独立、不受加 Extra 影响（见 updateNotificationChannel）。 OTP 错误分类（按挑战生命周期）：**错误但可重试 → 400 `204010`（剩余尝试数走 `context.attemptsRemaining`〔整数类型〕、`details` 不承载）；尝试超限作废 → 423；过期 / 已消费失败 / 被同邮箱新挑战替代（superseded）→ 410** （用户侧提示文案统一「验证失败」、detail 不泄露码值比对信息）。 并发竞态下该邮箱已被添加 → 409 208012。OTP 一次性消费；**成功重放例外**： 同一挑战已验证成功后以同码重试（首次 201 响应丢失场景）→ 重放首次结果（返已创建接收方，不再走 410）。
      parameters:
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
          description: Extra 邮箱 OTP challenge 实例 id
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - code
              properties:
                code:
                  type: string
                  pattern: ^[0-9]{6}$
                  description: 6 位数字验证码
            example:
              code: '493028'
      responses:
        '201':
          description: 验证通过，Extra 接收方已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtraEmailRecipient'
              example:
                recipientId: xtr_9f2a1c
                email: finance@example.com
                verifiedAt: '2026-07-22T10:02:11Z'
        '400':
          $ref: '#/components/responses/OtpRetryableBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '410':
          $ref: '#/components/responses/Gone'
        '423':
          $ref: '#/components/responses/Locked'
      x-error-codes:
        '400':
          - 204010
        '409':
          - 208001
          - 208012
  /notification-settings/email/extra-recipients/{recipientId}:
    delete:
      tags:
        - notification-settings
      operationId: removeExtraEmailRecipient
      summary: 移除 Extra 邮箱接收方
      description: |
        从 Extra 列表移除指定接收方，此后不再收到该通道通知。Primary 无对应资源 id、不可经本 op 触达 （Primary 只读）。**幂等：删除以 recipientId 为准、天然幂等**——已删 / 不存在 / 跨商户一律 404（反枚举）。
      parameters:
        - name: recipientId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
          description: Extra 接收方 id
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: 已移除
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /notification-settings/wechat/bind-sessions:
    post:
      tags:
        - notification-settings
      operationId: createWechatBindSession
      summary: 发起 WeChat 通知接收方绑定（创建绑定会话、返回二维码）
      description: |
        创建 WeChat 绑定会话并返回二维码：**会话创建为 PENDING（expiresAt 与二维码 TTL 同源）后才返回 201**； 创建失败 → 500、不返回二维码。 SPA 展示二维码并在会话 TTL 内轮询 getWechatBindSession。用户扫码关注 / 授权后，绑定结果由后端承接、 经轮询可见（同一微信身份跨会话去重合并）。 取消 / 二维码超时 / 扫码失败 → 会话到期即失效，不新增绑定、可重新发起；**无物理 CANCELLED 态——用户取消 / 关页仅停前端轮询、不改服务器会话**，会话仍 PENDING 且未过 expiresAt 时扫码照常生效。 按多步挑战流程语义不挂幂等键（可安全重发的挑战资源：重复创建各自独立会话、受 TTL 约束自然过期）。 微信侧不可用 → 502/504（无降级伪成功）。会话 TTL 为部署可配业务参数。 与微信快捷登录绑定解耦。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '201':
          description: 绑定会话已创建（返回二维码）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WechatBindSession'
              example:
                sessionId: wbs_7c4e1a
                status: pending
                qrCodeUrl: https://mp.example/qr/abcdef
                expiresAt: '2026-07-22T10:10:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '409':
          - 208001
  /notification-settings/wechat/bind-sessions/{sessionId}:
    get:
      tags:
        - notification-settings
      operationId: getWechatBindSession
      summary: 轮询 WeChat 绑定会话状态
      description: |
        轮询绑定会话：pending（待扫码）/ completed（绑定完成，必携接收方）/ expired（可重新发起）。**expired 纯时间派生**（`PENDING 且 now > expiresAt`）、非服务端物理状态；用户取消 / 关页只是前端停轮询、不改会话。 轮询不受微信侧可用性影响；expired 由 expiresAt 判定 （纯读不迁移状态）；completed 表示后端已承接绑定完成。会话过期后晚到的扫码不产生绑定 （不新增绑定）；同一微信身份重复扫码不产生新接收方（去重合并）。 会话状态单调不回退。跨商户 / 不存在 → 404。
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
          description: 绑定会话 id
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: 会话状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WechatBindSessionStatus'
              examples:
                pending:
                  summary: 待扫码
                  value:
                    sessionId: wbs_7c4e1a
                    status: pending
                    expiresAt: '2026-07-22T10:10:00Z'
                completed:
                  summary: 绑定完成（携接收方）
                  value:
                    sessionId: wbs_7c4e1a
                    status: completed
                    expiresAt: '2026-07-22T10:10:00Z'
                    boundRecipient:
                      recipientId: wnb_3d8e2f
                      nickname: 老板娘
                      boundAt: '2026-07-22T10:03:20Z'
                expired:
                  summary: 会话过期（now > expiresAt 派生；不新增绑定，可重新发起）
                  value:
                    sessionId: wbs_7c4e1a
                    status: expired
                    expiresAt: '2026-07-22T10:10:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /notification-settings/wechat/recipients/{recipientId}:
    delete:
      tags:
        - notification-settings
      operationId: removeWechatNotifyRecipient
      summary: 解绑 WeChat 通知接收方
      description: |
        从 WeChat 通知接收方列表移除指定绑定，此后不再收到该通道通知；不影响微信快捷登录绑定。**幂等：删除以 recipientId 为准、天然幂等**——已删 / 不存在 / 跨商户一律 404（反枚举）。
      parameters:
        - name: recipientId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
          description: WeChat 通知接收方（绑定）id
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: 已解绑
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /notices:
    get:
      tags:
        - notices
      operationId: listNotices
      summary: 站内信列表（时间倒序分页，含已读 / 未读）
      description: |
        按时间倒序分页返回当前商户保留期内全部站内信（含已读 / 未读），每条含标题 / 时间 / 已读态 / 样式 （success / failure / warning / default，来源未提供则 default）。每页条数默认可配。
      parameters:
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: 站内信分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoticeListPage'
              example:
                total: 2
                unreadCount: 1
                data:
                  - noticeId: ntc_88a1
                    title: 退款已完成
                    style: success
                    status: UNREAD
                    createdAt: '2026-07-22T09:00:00Z'
                  - noticeId: ntc_87f0
                    title: 结算变更审核通过
                    style: default
                    status: READ
                    createdAt: '2026-07-21T18:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /notices/unread-count:
    get:
      tags:
        - notices
      operationId: getNoticeUnreadCount
      summary: 铃铛未读计数（商户级共享）
      description: |
        返回当前商户未读站内信计数（商户级——商户内操作员共享一份）；无消息 → 0。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: 未读计数
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoticeUnreadCount'
              example:
                unreadCount: 3
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /notices/summary:
    get:
      tags:
        - notices
      operationId: getNoticeSummary
      summary: 最新通知摘要（Dashboard / 首页摘要区消费）
      description: |
        返回最新 N 条通知摘要（按通知时间倒序，字段沿用站内信列表摘要口径）； N 默认值为业务参数（部署可配），limit 入参仅可收窄、不超服务端上限。
      parameters:
        - name: limit
          in: query
          required: false
          description: 返回条数（缺省用服务端默认 N；仅可收窄）
          schema:
            type: integer
            minimum: 1
            maximum: 50
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: 最新通知摘要
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NoticeListItem'
              example:
                data:
                  - noticeId: ntc_88a1
                    title: 退款已完成
                    style: success
                    status: UNREAD
                    createdAt: '2026-07-22T09:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /notices/{noticeId}:
    get:
      tags:
        - notices
      operationId: getNotice
      summary: 站内信详情（纯读，无副作用）
      description: |
        返回站内信详情（标题 + 时间 + 富文本正文；正文为来源已净化内容，前端渲染另走受限白名单）。 **纯读无副作用**（可安全重试 / 预取）；「打开详情自动已读」由 SPA 随详情加载调 markNoticeRead 完成（页面行为编排）。 跨商户 / 不存在 → 404、不改变任何未读计数（反枚举）。
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
          description: 站内信 id
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: 站内信详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoticeDetail'
              example:
                noticeId: ntc_88a1
                title: 退款已完成
                style: success
                status: UNREAD
                createdAt: '2026-07-22T09:00:00Z'
                body: <p>订单 202607220001 的退款已完成。</p>
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /notices/{noticeId}/read-receipt:
    post:
      tags:
        - notices
      operationId: markNoticeRead
      summary: 单条已读回执（商户级生效；幂等）
      description: |
        将指定站内信标记为已读（`UNREAD → READ`，商户级——对全商户生效、未读计数同步下降）。 幂等：已读条重复回执 → 200 无变化、不重复改变计数。 跨商户 / 不存在 → 404、不改变计数。
      parameters:
        - name: noticeId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
          description: 站内信 id
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: 已读（或已是已读的幂等 no-op）；返回商户级最新未读计数
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoticeReadResult'
              example:
                noticeId: ntc_88a1
                status: READ
                unreadCount: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /notices/read-receipts:
    post:
      tags:
        - notices
      operationId: markAllNoticesRead
      summary: 全部已读（商户级生效；幂等）
      description: |
        将当前商户所有 `UNREAD` 站内信标记为 `READ`、未读计数归 0（商户级）。幂等（无未读时 no-op）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: 全部已读完成（计数归 0）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoticeUnreadCount'
              example:
                unreadCount: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-msession
      description: |
        商户后台 BFF 服务端会话 cookie（httpOnly / secure / SameSite；`__Host-` 前缀强制 Secure + Path=/ + 无 Domain，杜绝子域注入）。 浏览器只持此会话 cookie、不持后端 token。会话裁决商户 scope（当前商户从会话取、不信请求体）。 写接口（非安全方法）另需 CSRF 防护（X-CSRF-Token）；商户级读写另挂 MerchantContextGuard 守卫（见下方 parameters）。
  schemas:
    NotificationChannelState:
      type: object
      additionalProperties: false
      required:
        - enabled
      properties:
        enabled:
          type: boolean
          description: 通道总开关（关闭仅停该通道投递、接收方配置保留）
    NotificationSettings:
      type: object
      additionalProperties: false
      required:
        - channels
        - primaryEmail
        - extraEmailRecipients
        - wechatRecipients
      properties:
        channels:
          type: object
          additionalProperties: false
          required:
            - email
            - wechat
          description: 通道总开关（站内信无商户开关、不在此列）
          properties:
            email:
              $ref: '#/components/schemas/NotificationChannelState'
            wechat:
              $ref: '#/components/schemas/NotificationChannelState'
        primaryEmail:
          type: string
          format: email
          readOnly: true
          description: 只读 Primary（= Owner Primary Email；生命周期归注册登录与认证域、变更随之即时反映，本面无修改入口）
        extraEmailRecipients:
          type: array
          description: 已验证 Extra 邮箱接收方（仅含 OTP 验证通过项）
          items:
            $ref: '#/components/schemas/ExtraEmailRecipient'
        wechatRecipients:
          type: array
          description: WeChat 通知接收方（平等绑定、无 Primary/Extra 之分；与微信快捷登录绑定互不同步）
          items:
            $ref: '#/components/schemas/WechatNotifyRecipient'
    ExtraEmailRecipient:
      type: object
      additionalProperties: false
      required:
        - recipientId
        - email
        - verifiedAt
      properties:
        recipientId:
          type: string
          description: Extra 接收方 id
        email:
          type: string
          format: email
          description: 已验证邮箱（规范化后）
        verifiedAt:
          $ref: '#/components/schemas/Timestamp'
    WechatNotifyRecipient:
      type: object
      additionalProperties: false
      required:
        - recipientId
        - nickname
        - boundAt
      properties:
        recipientId:
          type: string
          description: WeChat 通知接收方（绑定）id
        nickname:
          type: string
          description: 微信昵称（绑定时刻快照）
        boundAt:
          $ref: '#/components/schemas/Timestamp'
    ExtraEmailOtpChallenge:
      type: object
      additionalProperties: false
      required:
        - challengeId
        - email
        - cooldownSeconds
        - expiresAt
      properties:
        challengeId:
          type: string
          description: OTP challenge 实例 id
        email:
          type: string
          format: email
          description: 候选邮箱（服务端规范化后回显）
        cooldownSeconds:
          type: integer
          minimum: 0
          description: 重发冷却秒数（默认可配；前端倒计时按此渲染）
        expiresAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: 验证码有效期截止
    WechatBindSession:
      type: object
      additionalProperties: false
      required:
        - sessionId
        - status
        - qrCodeUrl
        - expiresAt
      properties:
        sessionId:
          type: string
          description: 绑定会话 id
        status:
          type: string
          const: pending
          description: 创建即 pending（待扫码）
        qrCodeUrl:
          type: string
          format: uri
          description: 绑定二维码（后端生成；SPA 直接渲染）
        expiresAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: 会话 TTL 截止（超时须重新发起）
    WechatBindSessionStatus:
      description: |
        绑定会话状态（按 status 三态分支；封闭枚举——新增状态属破坏性变更、走并行版本）： pending 待扫码（无接收方）/ completed 绑定完成（**必携 boundRecipient**；同一微信身份重复扫码返回既有接收方、 不重复加入）/ expired **到期派生**（`PENDING 且 now > expiresAt`，非服务端物理状态；用户取消 / 关页只停前端轮询、不改会话）（无接收方，可重新发起）。
      oneOf:
        - $ref: '#/components/schemas/WechatBindSessionPending'
        - $ref: '#/components/schemas/WechatBindSessionCompleted'
        - $ref: '#/components/schemas/WechatBindSessionExpired'
      discriminator:
        propertyName: status
        mapping:
          pending: '#/components/schemas/WechatBindSessionPending'
          completed: '#/components/schemas/WechatBindSessionCompleted'
          expired: '#/components/schemas/WechatBindSessionExpired'
    WechatBindSessionPending:
      type: object
      additionalProperties: false
      required:
        - sessionId
        - status
        - expiresAt
      properties:
        sessionId:
          type: string
        status:
          type: string
          const: pending
        expiresAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
    WechatBindSessionCompleted:
      type: object
      additionalProperties: false
      required:
        - sessionId
        - status
        - expiresAt
        - boundRecipient
      properties:
        sessionId:
          type: string
        status:
          type: string
          const: completed
        expiresAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
        boundRecipient:
          $ref: '#/components/schemas/WechatNotifyRecipient'
    WechatBindSessionExpired:
      type: object
      additionalProperties: false
      required:
        - sessionId
        - status
        - expiresAt
      properties:
        sessionId:
          type: string
        status:
          type: string
          const: expired
        expiresAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
    NoticeStyle:
      type: string
      enum:
        - success
        - failure
        - warning
        - default
      description: 站内信样式（仅视觉语义；来源未提供 → default）。封闭枚举：新增取值属破坏性变更（走并行版本）。
    NoticeStatus:
      type: string
      enum:
        - UNREAD
        - READ
      description: 已读态（商户级共享一份；READ 为终态不回退）。封闭枚举：新增取值属破坏性变更、走并行版本。
    NoticeListItem:
      type: object
      additionalProperties: false
      required:
        - noticeId
        - title
        - style
        - status
        - createdAt
      properties:
        noticeId:
          type: string
        title:
          type: string
        style:
          $ref: '#/components/schemas/NoticeStyle'
        status:
          $ref: '#/components/schemas/NoticeStatus'
        createdAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: 通知时间（列表 / 摘要按此倒序）
    NoticeListPage:
      type: object
      additionalProperties: false
      required:
        - total
        - unreadCount
        - data
      properties:
        total:
          type: integer
          minimum: 0
          description: 保留期内站内信总数（含已读）
        unreadCount:
          type: integer
          minimum: 0
          description: 商户级未读计数（随页返回，铃铛可同步）
        data:
          type: array
          items:
            $ref: '#/components/schemas/NoticeListItem'
    NoticeDetail:
      type: object
      additionalProperties: false
      required:
        - noticeId
        - title
        - style
        - status
        - createdAt
        - body
      properties:
        noticeId:
          type: string
        title:
          type: string
        style:
          $ref: '#/components/schemas/NoticeStyle'
        status:
          $ref: '#/components/schemas/NoticeStatus'
        createdAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          description: 通知时间
        body:
          type: string
          description: 富文本正文（来源已净化；前端渲染另走受限白名单）
        readAt:
          description: 首次转 READ 时间（未读为 null）
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
    NoticeUnreadCount:
      type: object
      additionalProperties: false
      required:
        - unreadCount
      properties:
        unreadCount:
          type: integer
          minimum: 0
          description: 商户级未读计数
    NoticeReadResult:
      type: object
      additionalProperties: false
      required:
        - noticeId
        - status
        - unreadCount
      properties:
        noticeId:
          type: string
        status:
          type: string
          const: READ
          description: 已读回执成功后恒为 READ（READ 为终态、单向不回退）
        unreadCount:
          type: integer
          minimum: 0
          description: 回执后商户级最新未读计数
    Timestamp:
      type: string
      format: date-time
      description: 'RFC 3339 date-time。in/out 非对称:**响应 MUST UTC `Z`**(如 2026-05-19T14:30:00Z); **请求/query 入参 MAY 任意合法 offset**,服务端归一 UTC(format: date-time 同时接受 Z 与 offset, 「出参 Z」是约定、非 schema 可强制)。展示/清算切日按商户 IANA 时区(单独字段,offset ≠ timezone)。'
    ErrorEnvelope:
      type: object
      description: 统一错误返回(错误响应体:结构化整数 code + detail + 可选 links;扩展 traceId/details)。
      required:
        - code
        - detail
      properties:
        code:
          type: integer
          description: 结构化整数错误码(能力域段 + 责任方类别 + 域内末段;可解析责任方+来源域,与 HTTP 状态正交)。
        detail:
          type: string
          description: 错误描述(面向调用方;本地化按 locale)。
        links:
          type: object
          description: 可选:错误说明 / 后续恢复操作链接。
          additionalProperties:
            type: string
        traceId:
          type: string
          description: 可选:关联 id,串联日志 / 分布式 trace(可观测)。
        details:
          type: array
          description: 可选:字段级校验错误。
          items:
            type: object
            required:
              - field
              - issue
            properties:
              field:
                type: string
              issue:
                type: string
    MerchantBffError:
      description: 商户后台 BFF 错误体 = ErrorEnvelope + 可选 context（错误专属结构化上下文，非字段校验 details）。
      allOf:
        - $ref: '#/components/schemas/ErrorEnvelope'
        - type: object
          properties:
            context:
              type: object
              description: 错误专属结构化上下文（非 details 字段校验数组）。MERCHANT_CONTEXT_CHANGED 时携 currentMerchantId 供前端 re-sync。
              properties:
                currentMerchantId:
                  type:
                    - string
                    - 'null'
                  description: 服务端会话当前商户（≠ 请求携带的 expected X-Merchant-Context）；**null = 无当前商户**（前端须重选）。**契约不变量**：code=208001 时本字段必 **present**（值可为 null）。
                attemptsRemaining:
                  type: integer
                  minimum: 0
                  description: OTP / 挑战错误但可重试时的剩余尝试次数（错误可重试 400 携带；**整数类型、走 context 结构化上下文**，非塞进 `details.issue` 字符串——`details` 只做请求字段级校验红框）。
                cooldownSeconds:
                  type: integer
                  minimum: 0
                  description: OTP / 挑战 Resend 冷却剩余秒数（冷却 429 携带；**整数类型、走 context 结构化上下文**——权威值、覆盖刷新 / 跨标签页，前端据此本地倒计时）。
    ResendCooldownError:
      description: 重发冷却错误体（`TooManyRequestsWithCooldown` 用；OTP 挑战 / 邀请链接等重发场景通用）：在 MerchantBffError 上把 `code` 钉死 208013、`context.cooldownSeconds` 强制必带（整数冷却剩余秒数——覆盖刷新 / 跨标签页，首次成功响应的 `cooldownSeconds` 之外的权威剩余值）。
      allOf:
        - $ref: '#/components/schemas/MerchantBffError'
        - type: object
          required:
            - context
          properties:
            code:
              const: 208013
            context:
              type: object
              required:
                - cooldownSeconds
              properties:
                cooldownSeconds:
                  type: integer
                  minimum: 0
    OtpRetryableError:
      description: OTP 可重试错误体（`OtpRetryableBadRequest` 用）：在 MerchantBffError 上把 `code` 钉死 204010、`context.attemptsRemaining` 强制必带（整数剩余尝试次数）。
      allOf:
        - $ref: '#/components/schemas/MerchantBffError'
        - type: object
          required:
            - context
          properties:
            code:
              const: 204010
            context:
              type: object
              required:
                - attemptsRemaining
              properties:
                attemptsRemaining:
                  type: integer
                  minimum: 0
  parameters:
    MerchantContextGuard:
      name: X-Merchant-Context
      in: header
      required: true
      description: |
        stale-tab 一致性守卫（读写统一）：页面预期的当前商户 ID。与会话当前商户比对，一致才执行； **不一致 → 409 `MerchantBffConflict`**（`code` `208001`、`MERCHANT_CONTEXT_CHANGED`）——**读不返回错商户数据、写不执行**，响应 `context.currentMerchantId` 回显服务端当前商户供前端直接 re-sync。 挂在所有依赖当前商户的读 + 写接口；前端统一 interceptor 发送 + 处理 409（提示并刷新当前商户）。 **豁免**：listMerchants（返回 currentMerchantId 的 re-sync 入口）、switchCurrentMerchant（切换当前商户）、withdrawOnboardingApplication（目标由 path 指定、与当前商户无关）、以及不依赖当前商户的接口。
      schema:
        type: string
        minLength: 1
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: CSRF 令牌(double-submit;cookie 会话鉴权的非安全方法[POST/PUT/PATCH/DELETE]必带;缺失/不匹配 → 403 fail-closed)
      schema:
        type: string
        minLength: 1
        pattern: \S
    PageNum:
      name: pageNum
      in: query
      description: 页码(从 1 计;分页)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      description: 每页记录数(上限可配置;分页默认 20)
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
  responses:
    Unauthorized:
      description: 401 未认证 / 凭证无效或已撤销
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: 403 无权限(fail-secure,默认拒绝)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    MerchantBffConflict:
      description: |
        409 冲突。前端据整数 `code` 区分子因——**常见 `208xxx` 商户后台 BFF 业务·资源型**（下列枚举）；**部分 409 另带身份类业务码**（如 `968xxx`：Login ID 占用 / 改邮箱在途等），**具体码以该 op 的 `x-error-codes` 为准**（另有同域 op 专属 `208xxx`，均不在此枚举）： `208001` **stale-tab 守卫 `MERCHANT_CONTEXT_CHANGED`**——**必携 `context.currentMerchantId`** 供前端 re-sync 当前商户； `208002` 资源已有进行中变更请求或已 `PENDING_REVIEW`（重复提交）； `208003` 状态前置不符（非法状态迁移 / 目标已决策）； `208005` 幂等键复用但 payload 不一致。 （`208004` 不适用本 BFF 面、故不在此枚举。） 前端动作：208001 刷新当前商户、208002 提示已存在、208003 重载最新态、208005 排查重复请求。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MerchantBffError'
          examples:
            staleTab:
              summary: stale-tab 守卫命中（code 208001，必携 context.currentMerchantId）
              value:
                code: 208001
                detail: 页面预期商户与会话当前商户不一致，请刷新到当前商户
                context:
                  currentMerchantId: '1000024'
            businessConflict:
              summary: 业务冲突（code 208002，资源已有进行中变更请求 / 已 PENDING_REVIEW；业务·资源型无 context）
              value:
                code: 208002
                detail: 该资源已有进行中的变更请求或已处于待审核状态，请勿重复提交
            idempotencyConflict:
              summary: 幂等键冲突（code 208005，同 Idempotency-Key 复用但请求内容不一致；业务·资源型无 context）
              value:
                code: 208005
                detail: 该幂等键已用于其他请求内容，请核对原请求；如确需发起新的业务操作，再使用新幂等键
    BadRequest:
      description: 400 业务/校验错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequestsWithCooldown:
      description: |
        429 Resend 冷却中：错误体 = `MerchantBffError`，**剩余冷却秒数走 `context.cooldownSeconds`**（整数、权威值——覆盖刷新 / 跨标签页，不依赖首次成功响应的 `cooldownSeconds`）。整数 `code` 见该 op `x-error-codes`。前端据此从收到响应时刻本地倒计时、冷却结束前禁重发。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResendCooldownError'
          example:
            code: 208013
            detail: 请求过于频繁，请稍后重试
            context:
              cooldownSeconds: 42
    BadGateway:
      description: 502 上游通道错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    GatewayTimeout:
      description: 504 上游超时
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    OtpRetryableBadRequest:
      description: |
        400 OTP / 挑战错误但**可重试**（尝试未超限）：错误体 = `MerchantBffError`，**剩余尝试次数走 `context.attemptsRemaining`**（整数类型）； `details` 仍只做请求字段级校验红框、不承载剩余次数。整数 `code` 见该 op `x-error-codes`。 区别于同族其它 OTP 终态：**尝试超限锁定 → 423** / **过期·已消费 → 410** / **Resend 冷却 → 429**（各自响应，不在本响应）。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OtpRetryableError'
          example:
            code: 204010
            detail: 验证码错误，请重试
            context:
              attemptsRemaining: 3
    NotFound:
      description: 404 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Gone:
      description: 410 一次性凭据失效(OTP / 验证链接 过期 / 已使用)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Locked:
      description: 423 登录临时锁定(防爆破)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalServerError:
      description: 500 服务端内部错误(可重试)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
