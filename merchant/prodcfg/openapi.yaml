      description: 解绑（PENDING_ACTIVATION 为 Cancel activation）→ 进 `RELEASED`、移出列表、留档审计。DELETE 天然幂等。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '204':
          description: 已解绑（RELEASED）
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '409':
          - 208001
          - 208003
  /devices/{deviceId}/status:
