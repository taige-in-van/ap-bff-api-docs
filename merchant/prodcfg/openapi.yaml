openapi: 3.1.0
info:
  title: 商户后台 收单配置 (20-04 BFF) — 前端契约面
  version: 0.1.3
  contact:
    name: 商户后台 BFF
  description: |
    收单配置前端契约：Store QR 展示 / 下载、收款页设置（PaymentPageSettings + TipConfiguration）、 账单码（Invoice，列表 / 详情 / 创建 / 作废 / 已支付隐藏）、支付链接（PaymentLink 全部 per-link 配置〔销售内容/生命周期/Policies/Buyer Info〕、创建 / 编辑 / 启停 / 删除 / 卡密池 / Redemptions 只读）、 设备（列表 / 详情 + 绑定/解绑/启停/Regenerate）、设备日志、商户级订单配置（Order Expiry / Customer Service Fee）、POS 小票内容。 字段类型以本 spec 为准。 merchant scope 从会话取、不信请求体；merchant-current-scoped 读写挂 MerchantContextGuard（stale-tab 守卫）。
servers:
  - url: /api/merchant/v1
    description: 商户后台 BFF（浏览器经边缘网关 merchant.* 可达；cookieAuth 会话 + CSRF）
security:
  - cookieAuth: []
tags:
  - name: store-qr
    description: 店铺码展示变体 / 下载。
  - name: payment-page
    description: 收款页设置（PaymentPageSettings + TipConfiguration，仅静态码）。
  - name: invoices
    description: 账单码：列表 / 详情 / 创建 / 作废 / 已支付隐藏。
  - name: payment-links
    description: 支付链接（gift/product/ticket 全部 per-link 配置〔销售内容/生命周期/Policies/Buyer Info〕；giftcard 卡池；Redemptions 只读）。
  - name: devices
    description: 设备：列表 / 详情 + 绑定/解绑/启停/Regenerate。
  - name: device-logs
    description: 设备日志（首期 3 类；支持导出）。
  - name: settings
    description: 商户级订单配置：Order Expiry / Customer Service Fee 总开关 / Checkout 入口。
  - name: receipt
    description: POS 小票内容（供收款终端打印）。
paths:
  /store-qr:
    get:
      tags:
        - store-qr
      operationId: listStoreQrVariants
      summary: 读店铺码展示变体（主 QR + 可用变体）
      description: |
        返回当前商户店铺码可展示变体集（默认主结算币种 Standard 码 + 其余按已开通币种 / QR type / 通道条件显隐； UnionPay QRC 变体需 UPI 通道启用）。 未开通 In-Store Payment Service → 空集。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: 店铺码展示变体集
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreQrVariantList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
      x-error-codes:
        '409':
          - 208001
  /store-qr/{variantId}/image:
    get:
      tags:
        - store-qr
      operationId: downloadStoreQrImage
      summary: 下载店铺码变体 PNG
      description: 下载指定展示变体的二维码 PNG（分辨率 ≥ 512×512）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: variantId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: PNG 图像
          content:
            image/png:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
      x-error-codes:
        '409':
          - 208001
  /payment-page:
    get:
      tags:
        - payment-page
      operationId: getPaymentPageSettings
      summary: 读收款页设置（PaymentPageSettings + TipConfiguration）
      description: 回显当前商户收款页设置（仅静态码作用域）+ merchant 级小费配置；可用支付方式候选为该商户当前可用集（后端返回、前端不写死）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: 收款页设置 + 小费配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPageSettings'
              examples:
                basic:
                  summary: 候选 3 方式、启用 2
                  value:
                    logoRef: logo_abc
                    notes:
                      - title: 门店说明
                    description: 欢迎光临
                    availableMethods:
                      - methodId: instore-wechat
                        family: wechat
                        acceptanceMode: in_store
                        displayName: WeChat Pay
                        iconUrl: null
                      - methodId: instore-alipay
                        family: alipay
                        acceptanceMode: in_store
                        displayName: Alipay
                        iconUrl: null
                      - methodId: instore-credit_card
                        family: credit_card
                        acceptanceMode: in_store
                        displayName: Credit Card
                        iconUrl: null
                    selectedMethodIds:
                      - instore-wechat
                      - instore-alipay
                    tips:
                      enabled: true
                      presets:
                        - 10
                        - 15
                        - 20
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
    put:
      tags:
        - payment-page
      operationId: savePaymentPageSettings
      summary: 保存收款页设置 + 小费配置（两组共同成功 / 失败）
      description: |
        保存 PaymentPageSettings + TipConfiguration（两组同一次提交、共同成功 / 失败，不部分生效）。 支付方式集**保存前经受理校验**（须为该商户当前可受理方式）—— 不通过 → `409 PAYMENT_METHOD_NOT_ACCEPTABLE`；空集 → `400 PAYMENT_METHOD_SELECTION_EMPTY`。Logo 经 uploadPaymentPageLogo 先传得引用。天然幂等 PUT（同 payload 重放一致）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentPageSettingsWrite'
      responses:
        '200':
          description: 已保存（返回生效后设置）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentPageSettings'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '400':
          - 204005
        '409':
          - 208001
          - 208007
  /payment-page/logo:
    post:
      tags:
        - payment-page
      operationId: uploadPaymentPageLogo
      summary: 上传收款页 Logo
      description: 上传 Logo（图片；类型 sniff + 白名单；大小上限部署可配）→ 返回引用供 savePaymentPageSettings。**幂等豁免**：仅返回 blob 引用、无持久副作用（重传得新引用、不改已保存设置），故不挂 Idempotency-Key。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 上传成功（返回 logo 引用）
          content:
            application/json:
              schema:
                type: object
                required:
                  - logoRef
                properties:
                  logoRef:
                    type: string
                    minLength: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
      x-error-codes:
        '409':
          - 208001
  /products/invoices:
    get:
      tags:
        - invoices
      operationId: listInvoices
      summary: 账单列表 + 汇总卡
      description: 账单列表（分页 / 搜索 / status·日期·金额筛选 / 排序）+ 页顶汇总。**金额筛选 amountMin/amountMax 按各 Invoice 标价金额数值独立比较、不跨币种换算**。**汇总 summary 恒统计商户全量 Invoice（排除已隐藏 PAID）、不随列表筛选变化**（筛选只作用于 data 列表）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - name: q
          in: query
          required: false
          description: 按 Invoice ID 子串搜索
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/InvoiceStatus'
        - name: dateFrom
          in: query
          required: false
          description: 创建日期范围起
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          required: false
          description: 创建日期范围止
          schema:
            type: string
            format: date
        - name: amountMin
          in: query
          required: false
          description: 金额范围下限（最小币种单位整数字符串）
          schema:
            type: string
        - name: amountMax
          in: query
          required: false
          description: 金额范围上限
          schema:
            type: string
        - name: sort
          in: query
          required: false
          description: 排序（Newest / Oldest / Amount 高→低 / Amount 低→高）
          schema:
            type: string
            enum:
              - newest
              - oldest
              - amount_desc
              - amount_asc
            default: newest
      responses:
        '200':
          description: 账单列表 + 汇总
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceListPage'
              examples:
                mixedCurrency:
                  summary: 结算币种(CAD) + CNY 标价并存，未收分币种小计
                  value:
                    total: 2
                    data:
                      - invoiceId: inv_1
                        amount:
                          amount: '10500'
                          currency: CAD
                        status: UNPAID
                        dueDate: '2026-08-01'
                        createdAt: '2026-07-10T10:00:00Z'
                      - invoiceId: inv_2
                        amount:
                          amount: '20000'
                          currency: CNY
                        status: OVERDUE
                        dueDate: '2026-07-01'
                        createdAt: '2026-06-10T10:00:00Z'
                    summary:
                      paid:
                        count: 0
                        settlementAmount:
                          amount: '0'
                          currency: CAD
                        cnyAmount: null
                      unpaid:
                        count: 1
                        settlementAmount:
                          amount: '10500'
                          currency: CAD
                        cnyAmount: null
                      overdue:
                        count: 1
                        settlementAmount:
                          amount: '0'
                          currency: CAD
                        cnyAmount:
                          amount: '20000'
                          currency: CNY
                      totalReceivables:
                        settlement:
                          total:
                            amount: '10500'
                            currency: CAD
                          current:
                            amount: '10500'
                            currency: CAD
                          overdue:
                            amount: '0'
                            currency: CAD
                        cny:
                          total:
                            amount: '20000'
                            currency: CNY
                          current:
                            amount: '0'
                            currency: CNY
                          overdue:
                            amount: '20000'
                            currency: CNY
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
    post:
      tags:
        - invoices
      operationId: createInvoice
      summary: 创建账单
      description: |
        创建账单（Order Amount + Due Date + Currency）→ 新建账单（status=UNPAID）、返回付款链接 URL（整串，前端纯呈现）。 金额缺失 / ≤ 0 → `400 INVOICE_AMOUNT_INVALID`；Custom Due Date 缺失 / 早于次日 → `400 INVOICE_DUE_DATE_INVALID`。 幂等：带 `Idempotency-Key`，重放同键返首次结果、payload 冲突 → `409 IDEMPOTENCY_PAYLOAD_CONFLICT (208005)`。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCreateRequest'
            examples:
              basic:
                summary: 指定金额 + 自定义到期日
                value:
                  amount:
                    amount: '10500'
                    currency: CAD
                  dueDate:
                    kind: custom
                    date: '2026-08-01'
                  description: 8 月服务费
      responses:
        '201':
          description: 已创建（返回账单详情 + 付款链接 URL）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDetail'
              examples:
                created:
                  summary: 新建 UNPAID 账单（含付款链接整串）
                  value:
                    invoiceId: inv_1000024_2001
                    amount:
                      amount: '10500'
                      currency: CAD
                    status: UNPAID
                    dueDate: '2026-08-01'
                    createdAt: '2026-07-04T10:00:00Z'
                    description: 8 月服务费
                    paymentUrl: https://cashier.example.com/inv/inv_1000024_2001
                    paidOrderId: null
                    hidden: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '400':
          - 204003
          - 204004
        '409':
          - 208001
          - 208005
  /products/invoices/creation-config:
    get:
      tags:
        - invoices
      operationId: getInvoiceCreateConfig
      summary: 读账单创建候选配置
      description: 创建账单向导所需候选：可选标价币种（结算币种 ∪ CNY-if-通道支持；取值以后端返回为准、前端不 hardcode）。**最终受理〔含金额 / 汇率 / 最小额〕在下单时完成**（创建向导无金额）。无可标价币种 → 空集、前端引导开通。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: 账单创建候选配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceCreateConfig'
              examples:
                basic:
                  summary: 可选 CAD / CNY
                  value:
                    availableCurrencies:
                      - CAD
                      - CNY
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
      x-error-codes:
        '409':
          - 208001
  /products/invoices/{invoiceId}:
    get:
      tags:
        - invoices
      operationId: getInvoice
      summary: 账单详情
      description: 账单详情（UNPAID 不含 Payment Order ID；PAID 含并可跳转交易管理）。跨 scope 统一 404。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: 账单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
    delete:
      tags:
        - invoices
      operationId: deleteInvoice
      summary: 作废（UNPAID/OVERDUE）或隐藏（PAID）
      description: |
        `UNPAID`/`OVERDUE` → 作废（进 `VOIDED`、链接失效；存在未终态支付尝试 → `409 INVOICE_HAS_PENDING_PAYMENT`）； `PAID` → 展示层隐藏（不改 `PAID` 态、不影响已付结果）。DELETE 天然幂等、不挂 Idempotency-Key。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: 已作废 / 已隐藏（返回最新账单态）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '409':
          - 208001
          - 208006
  /products/invoices/{invoiceId}/poster:
    get:
      tags:
        - invoices
      operationId: downloadInvoicePoster
      summary: 下载账单收款海报 PNG（QR + 品牌）
      description: '下载账单收款海报 PNG（付款 QR〔编码 paymentUrl〕+ 品牌行 + 金额 + **当前可用支付方式标识**）。`Content-Disposition: attachment` + filename。跨 scope 统一 404。'
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: PNG 海报
          headers:
            Content-Disposition:
              description: attachment; filename="invoice-{invoiceId}.png"
              schema:
                type: string
          content:
            image/png:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /products/payment-links:
    get:
      tags:
        - payment-links
      operationId: listPaymentLinks
      summary: 支付链接列表
      description: 支付链接列表（分页 / 按 Name·ID 搜索 / 按 type 过滤 / 排序）；三类（giftcard/product/ticket）统一列表、含 Policies。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
        - name: q
          in: query
          required: false
          description: 按 Name / ID 搜索
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PaymentLinkType'
        - name: sort
          in: query
          required: false
          description: 排序（默认 created_desc）
          schema:
            type: string
            enum:
              - created_desc
              - created_asc
              - name_asc
              - name_desc
            default: created_desc
      responses:
        '200':
          description: 支付链接列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentLinkListPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
    post:
      tags:
        - payment-links
      operationId: createPaymentLink
      summary: 创建支付链接（gift/product/ticket）
      description: |
        创建支付链接（type 判别 gift/product/ticket）→ 建销售实例（status=ACTIVE）+ 返回链接 URL 与 QR（整串）；含 Policies / Buyer Info（继承商户级默认快照）。 **currency × methods 组合校验**：校验所选方式均支持该标价币种；未开通 online / 方式不适用或不支持该币种 → `409 PAYMENT_METHOD_NOT_ACCEPTABLE (208007)`；空方式 → `400 PAYMENT_METHOD_SELECTION_EMPTY`。 **内容币种一致**：所有内容价格（denomination / product price / ticket tier price）及 bonus 币种须 = 顶层 `currency`，不一致 → `400 CONTENT_CURRENCY_MISMATCH (204006)`（schema 不强约、服务端校验）。 幂等：带 `Idempotency-Key`，重放同键返首次结果、payload 冲突 → `409 IDEMPOTENCY_PAYLOAD_CONFLICT (208005)`。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentLinkCreateRequest'
            examples:
              giftcard:
                summary: 创建 giftcard 支付链接（type↔content 绑定）
                value:
                  type: giftcard
                  name: 节日礼卡
                  currency: CAD
                  methodIds:
                    - online-wechat
