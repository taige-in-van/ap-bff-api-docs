        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-msession
      description: |
        商户后台 BFF 服务端会话 cookie（httpOnly / secure / SameSite；`__Host-` 前缀强制 Secure + Path=/ + 无 Domain，杜绝子域注入）。 浏览器只持此会话 cookie、不持后端 token。会话裁决商户 scope（当前商户从会话取、不信请求体）。 写接口（非安全方法）另需 CSRF 防护（X-CSRF-Token）；商户级读写另挂 MerchantContextGuard 守卫（见下方 parameters）。
  schemas:
    AcceptanceMode:
      type: string
      description: 受理模式（取值以后端返回为准）。**封闭 enum**：新增取值 = 破坏性变更，须完成契约与代码演进并走新契约版本发布（非配置新增）；消费方仍须 unknown-safe（纵深防御、遇未识别值保守处理不静默丢弃），生产方不得向既有版本下发未声明值。
      enum:
        - in_store
        - online
    PaymentMethodFamily:
      type: string
      description: 支付方式品牌（取值以后端返回为准）。**封闭 enum**：新增取值 = 破坏性变更，须完成契约与代码演进并走新契约版本发布（非配置新增）；消费方仍须 unknown-safe（纵深防御、遇未识别值保守处理不静默丢弃），生产方不得向既有版本下发未声明值。
      enum:
        - wechat
        - alipay
        - unionpay
        - credit_card
    PaymentMethodRef:
      type: object
      description: 支付方式展示引用（响应侧；品牌 × 受理模式）。展示字段 family / acceptanceMode / displayName / iconUrl **恒 present**（iconUrl 可为 null；FE 渲染 + 按 family i18n）；请求侧提交 methodId 集（`methodIds`）、不复用本对象。
      required:
        - methodId
        - family
        - acceptanceMode
        - displayName
        - iconUrl
      properties:
        methodId:
          type: string
          minLength: 1
          examples:
            - instore-wechat
            - online-alipay
        family:
          $ref: '#/components/schemas/PaymentMethodFamily'
        acceptanceMode:
          $ref: '#/components/schemas/AcceptanceMode'
        displayName:
          type: string
          description: canonical 默认展示名（品牌名，如 WeChat Pay）；FE 按 family 用自身 i18n 资源本地化、本字段作兜底
        iconUrl:
          type:
            - string
            - 'null'
          description: 展示图标 URL（**恒 present、可为 null**；缺省语义唯一——null = 消费方按 family 兜底本地资产，不省略本字段）
        enabled:
          type: boolean
          description: 该方式在本收款对象是否启用
    PaymentMethodCandidate:
      description: 创建向导候选方式（= PaymentMethodRef + **可标价币种能力**，供 currency × method 联动筛选）。展示字段 family / acceptanceMode / displayName / iconUrl 由后端填充、对 FE 必填保证（iconUrl 可为 null，null 时按 family 兜底）。
      allOf:
        - $ref: '#/components/schemas/PaymentMethodRef'
        - type: object
          required:
            - family
            - acceptanceMode
            - displayName
            - pricingCurrencies
          properties:
            pricingCurrencies:
              type: array
              minItems: 1
              uniqueItems: true
              description: 该方式可标价的币种能力（FE 据此按选定 currency 过滤可选方式、反之亦然）
              items:
                $ref: '#/components/schemas/Currency'
    InvoiceCreateConfig:
      type: object
      description: 创建账单的候选配置（供 FE 创建向导；不 hardcode）。
      required:
        - availableCurrencies
      properties:
        availableCurrencies:
          type: array
          uniqueItems: true
          description: 可选标价币种（结算币种 ∪ CNY-if-通道支持；取值以后端返回为准；最终受理在下单时完成；无可标价则空集、FE 引导开通）
          items:
            $ref: '#/components/schemas/Currency'
    PaymentLinkCreateConfig:
      type: object
      description: 创建 / 编辑支付链接的候选配置（供 FE 创建向导）；方式候选为该商户当前可用集、后端返回。
      required:
        - availableCurrencies
        - availableMethods
        - buyerInfoCandidates
        - defaultBuyerInfo
      properties:
        availableCurrencies:
          type: array
          uniqueItems: true
          description: 可选标价币种（结算币种 ∪ CNY-if-通道支持；取值以后端返回为准；最终受理在下单时完成；无可标价则空集、FE 引导开通）
          items:
            $ref: '#/components/schemas/Currency'
        availableMethods:
          type: array
          description: online 候选支付方式（该商户当前可受理集；**每方式带 `pricingCurrencies` 供 currency × method 联动筛选**；未开通 online → 空集、FE 展示开通引导）
          items:
            $ref: '#/components/schemas/PaymentMethodCandidate'
        buyerInfoCandidates:
          type: array
          uniqueItems: true
          description: Buyer Information 候选项池（商户可调）
          items:
            type: string
        defaultBuyerInfo:
          type: array
          uniqueItems: true
          description: Buyer Information 默认勾选集（如 Name / Email）
          items:
            type: string
        recipientInfoCandidates:
          type: array
          uniqueItems: true
          description: Recipient Information 候选项池（giftcard 送礼；非 giftcard 可空）
          items:
            type: string
    StoreQrVariantList:
      type: object
      required:
        - primaryVariantId
        - variants
      properties:
        primaryVariantId:
          type:
            - string
            - 'null'
          description: 默认主 QR（主结算币种 Standard），null = 无可用变体
        variants:
          type: array
          items:
            $ref: '#/components/schemas/StoreQrVariant'
    StoreQrVariant:
      type: object
      description: 店铺码展示变体（只读）。
      required:
        - variantId
        - currency
        - qrType
        - hostedPage
      properties:
        variantId:
          type: string
          minLength: 1
          readOnly: true
        currency:
          $ref: '#/components/schemas/Currency'
        qrType:
          type: string
          enum:
            - standard
            - pre_auth
            - unionpay_qrc
          description: Standard / Pre-Auth / UnionPay QRC 变体；封闭 enum：新增取值 = 破坏性变更、走新契约版本发布（非配置新增）；消费方仍须 unknown-safe（纵深防御），生产方不得向既有版本下发未声明值
        hostedPage:
          type: boolean
          description: true = 对应 Platform-hosted 收款页；UnionPay QRC = false（云闪付 App 扫）
        methods:
          type: array
          description: 该变体收款页展示的支付方式（hosted 主 QR 含信用卡；UnionPay QRC 无）
          items:
            $ref: '#/components/schemas/PaymentMethodRef'
    TipConfiguration:
      type: object
      description: merchant 级小费配置（Store QR + 终端收款共用）。
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        presets:
          type: array
          description: 预设小费档（百分比整数）
          items:
            type: integer
            minimum: 0
    NoteField:
      type: object
      description: 收款页自定义备注字段（上限/长度部署可配）。
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
    PaymentPageSettings:
      type: object
      description: 收款页设置（仅静态码作用域）+ 小费配置。方式区分**候选全集**与**已启用子集**，FE 据此可展示未启用但可选择的方式。
      required:
        - availableMethods
        - selectedMethodIds
        - tips
      properties:
        logoRef:
          type:
            - string
            - 'null'
        notes:
          type: array
          items:
            $ref: '#/components/schemas/NoteField'
        description:
          type:
            - string
            - 'null'
          description: 收款页描述（上限部署可配）
        availableMethods:
          type: array
          description: 全部候选支付方式（该商户当前可用集；含未启用但可选择的方式）
          items:
            $ref: '#/components/schemas/PaymentMethodRef'
        selectedMethodIds:
          type: array
          uniqueItems: true
          description: 已启用方式 methodId 子集（⊆ availableMethods 的 methodId）
          items:
            type: string
            minLength: 1
        tips:
          $ref: '#/components/schemas/TipConfiguration'
    PaymentPageSettingsWrite:
      type: object
      description: 收款页设置保存请求（PaymentPageSettings + TipConfiguration 一次提交）。
      required:
        - methodIds
        - tips
      properties:
        logoRef:
          type:
            - string
            - 'null'
        notes:
          type: array
          items:
            $ref: '#/components/schemas/NoteField'
        description:
          type:
            - string
            - 'null'
        methodIds:
          type: array
          minItems: 1
          uniqueItems: true
          description: 启用的方式 methodId 集（保存前经受理校验；至少 1）
          items:
            type: string
            minLength: 1
        tips:
          $ref: '#/components/schemas/TipConfiguration'
    InvoiceStatus:
      type: string
      description: 账单核心态。
      enum:
        - UNPAID
        - PAID
        - OVERDUE
        - VOIDED
    DueDate:
      type: object
      description: 到期日：无到期 / 指定日期二选一。
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - no_due_date
            - custom
        date:
          type:
            - string
            - 'null'
          format: date
          description: kind=custom 必填、须 ≥ 次日
    InvoiceCreateRequest:
      type: object
      required:
        - amount
        - dueDate
      properties:
        amount:
          $ref: '#/components/schemas/PositiveMoney'
        dueDate:
          $ref: '#/components/schemas/DueDate'
        description:
          type:
            - string
            - 'null'
    InvoiceListItem:
      type: object
      required:
        - invoiceId
        - amount
        - status
        - createdAt
      properties:
        invoiceId:
          type: string
          readOnly: true
        amount:
          $ref: '#/components/schemas/Money'
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        dueDate:
          type:
            - string
            - 'null'
          format: date
        createdAt:
          $ref: '#/components/schemas/Timestamp'
    InvoiceDetail:
      allOf:
        - $ref: '#/components/schemas/InvoiceListItem'
        - type: object
          properties:
            description:
              type:
                - string
                - 'null'
            paymentUrl:
              type: string
              description: 付款链接整串（前端纯呈现）
            paidOrderId:
              type:
                - string
                - 'null'
              description: PAID 时的 Payment Order ID（跳转交易管理）
            hidden:
              type: boolean
              description: PAID 展示隐藏标记
    InvoiceSummary:
      type: object
      description: 页顶汇总（已隐藏 PAID 不计入）。**币种口径**：单商户结算币种固定、Invoice 标价 ∈ {结算币种, CNY}； 计数含全部 Invoice（跨标价币种）；Paid 金额按实际结算金额（结算币种）统一合计；CNY 标价的 Unpaid / Overdue 结算额未定 → **CNY 独立小计、不与结算币种混加**。
      required:
        - paid
        - unpaid
        - overdue
        - totalReceivables
      properties:
        paid:
          $ref: '#/components/schemas/InvoiceSummaryCell'
        unpaid:
          $ref: '#/components/schemas/InvoiceSummaryCell'
        overdue:
          $ref: '#/components/schemas/InvoiceSummaryCell'
        totalReceivables:
          $ref: '#/components/schemas/TotalReceivables'
    InvoiceSummaryCell:
      type: object
      description: 单状态汇总：count = 全部 Invoice 计数（跨标价币种）；settlementAmount = 结算币种小计；cnyAmount = CNY 标价小计（Unpaid/Overdue 独立呈现；Paid 已结算并入 settlementAmount，故 Paid 恒 null）。cnyAmount 必现（消除 omitted vs null 歧义）。
      required:
        - count
        - settlementAmount
        - cnyAmount
      properties:
        count:
          type: integer
          minimum: 0
        settlementAmount:
          $ref: '#/components/schemas/Money'
        cnyAmount:
          description: CNY 标价小计（Unpaid / Overdue 未结算金额，独立不混加；Paid 恒 null）
          anyOf:
            - $ref: '#/components/schemas/Money'
            - type: 'null'
    ReceivableBreakdown:
      type: object
      description: 单一币种应收拆分（total = current 未逾期 + overdue 逾期）。Current / Overdue 为固定展示项，**必返**；空值用同币种 `0`（非 null）。
      required:
        - total
        - current
        - overdue
      properties:
        total:
          $ref: '#/components/schemas/Money'
        current:
          $ref: '#/components/schemas/Money'
        overdue:
          $ref: '#/components/schemas/Money'
    TotalReceivables:
      type: object
      description: 应收总额 = Unpaid + Overdue，含 Current vs Overdue 拆分；按结算币种 + CNY 标价分别呈现（不混加）。
      required:
        - settlement
      properties:
        settlement:
          $ref: '#/components/schemas/ReceivableBreakdown'
        cny:
          description: CNY 标价应收（同结构，独立不与 settlement 混加；无 CNY 标价未收时可空）
          anyOf:
            - $ref: '#/components/schemas/ReceivableBreakdown'
            - type: 'null'
    InvoiceListPage:
      type: object
      required:
        - total
        - data
        - summary
      properties:
        total:
          type: integer
          minimum: 0
        data:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceListItem'
        summary:
          $ref: '#/components/schemas/InvoiceSummary'
