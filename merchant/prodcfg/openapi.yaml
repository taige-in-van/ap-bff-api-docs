        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '409':
          - 208001
          - 208003
  /devices/{deviceId}/activation-qr:
    put:
      tags:
        - devices
      operationId: regenerateActivationQr
      summary: 重发激活 QR（PENDING_ACTIVATION）
      description: |
        PENDING_ACTIVATION 下重发 Activation QR、生成新凭据。 **每次执行轮换新凭据、使旧 QR 立即失效 —— 非天然幂等**：挂 `Idempotency-Key`，同键重放返**同一次**新 QR（不再轮换）、异键才再次轮换 （防网络重试使刚返回的 QR 立即失效）。payload 冲突 → `409 IDEMPOTENCY_PAYLOAD_CONFLICT (208005)`；非 `PENDING_ACTIVATION` 态 → `409 STATE_PRECONDITION_MISMATCH (208003)`。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: 已重发（返回新 Activation QR 引用）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '409':
          - 208001
          - 208003
          - 208005
