      operationId: setDeviceStatus
      summary: 启停设备（ACTIVE ↔ DISABLED）
      description: 启停（ACTIVE↔DISABLED）。天然幂等（目标态一致返当前）。恢复后连接健康度由心跳决定。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
