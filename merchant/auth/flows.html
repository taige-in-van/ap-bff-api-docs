# 注册 / 登录 / 认证 —— 调用时序

> 本文是 `openapi.yaml` 的**调用顺序伴档**:OpenAPI 讲清每个接口的入参 / 出参 / 错误码(WHAT),本文讲清**多步流程里先调谁、后调谁、分支怎么走、什么触发邮件 / 轮询**(HOW)。
>
> **视角**:浏览器(SPA)↔ BFF。前端只与 BFF 交互;BFF 内部对身份服务的委派不画(后端面,与前端无关)。外部参与方(邮箱收件箱 / 微信 / Authenticator App)仅在用户可见时出现。
>
> **接口 ID = `operationId`**:下方每个发往 BFF 的调用都标 `[operationId]`,即 OpenAPI 原生 `operationId`——全局唯一,也是生成客户端的**方法名**。**图例表与正文里的 operationId 是可点深链**,直达 ReDoc 接口详情;时序图**内**的 `[operationId]` 受 Mermaid 限制不可点,点同名链接即可。
>
> **通用约定**(每条流程都成立,不在图里重复):浏览器**不持 token**——登录成功 BFF 下发 httpOnly opaque 会话 cookie(`__Host-msession`),服务端持后端 token;非安全方法(POST/PUT/DELETE)一律带 `X-CSRF-Token`;错误体统一 `ErrorEnvelope`(结构 / 状态码 / 责任方→前端策略 / 分页 / 幂等 / CSRF 详见 [API 基础约定](../../conventions.html))。
>
> ⚠️ **design / review 阶段**契约 —— 实现前可能调整,可据此并行开发,勿当冻结契约。

## 密码登录(含 MFA 二次校验分支)

[`login`](index.html#tag/session/operation/login) 一次返回三种走向;只有 `ESTABLISHED` 才下发会话 cookie。已启 MFA 时**不在首调建会话**,需再走 [`completeMfaChallenge`](index.html#tag/session/operation/completeMfaChallenge)。

```mermaid
sequenceDiagram
    participant B as 浏览器(SPA)
    participant A as 商户后台 BFF
    B->>A: [login] POST /sessions { loginId, password, rememberMe }
    alt 未启 MFA(凭据正确)
        A-->>B: 200 LoginResult{ status= ESTABLISHED } + Set-Cookie(__Host-msession)
    else 已启 MFA
        A-->>B: 200 { status= MFA_REQUIRED, mfaChallenge }(不建会话)
        B->>A: [completeMfaChallenge] POST /sessions/mfa { mfaChallenge, code }
        A-->>B: 200 { status= ESTABLISHED } + Set-Cookie(__Host-msession)
    else 待验证 / 待设密
        A-->>B: 200 { status= PENDING_VERIFICATION | INVITED }(中间态，引导去验证 / 设密激活)
    end
    Note over B,A: 凭据错 401<br/>账号锁定 423<br/>商户 suspended 或账号禁用 403<br/>限流 429<br/>防爆破锁定计数在后端(AUTH-FR-04)
```

- 登录成功后,后续受保护请求靠会话 cookie;前端拿不到也不需要 token。
- `rememberMe=true` → 会话不受关浏览器 / idle / absolute 自然过期影响(仍受登出 / 改密 / 禁用等系统侧失效)。

## WeChat 扫码登录(轮询)

[`initiateWechatLogin`](index.html#tag/session/operation/initiateWechatLogin) 拿二维码票据,前端用 [`pollWechatLogin`](index.html#tag/session/operation/pollWechatLogin) **轮询**直到拿到非 `WAITING` 的终态。扫码登录**不追加 MFA**。

```mermaid
sequenceDiagram
    participant B as 浏览器(SPA)
    participant A as 商户后台 BFF
    participant W as 微信 App
    B->>A: [initiateWechatLogin] POST /sessions/wechat
    A-->>B: 200 { qrTicket, qrContent, expiresAt }
    B->>B: 渲染二维码
    par 用户侧
        W->>W: 扫码 → 微信内授权
        W->>W: 用户在微信内显式确认登录(扫码≠认证；微信内不选 client/商户)
    and 前端轮询
        loop 直到非 WAITING
            B->>A: [pollWechatLogin] GET /sessions/wechat/{qrTicket}
            A-->>B: 200 { status, reason? }
        end
    end
    Note over B,A: WAITING：继续轮询<br/>EXPIRED：重新 initiateWechatLogin 换码<br/>ESTABLISHED：已 Set-Cookie(按未勾 Remember Me)<br/>REJECTED：展示 reason(账号禁用 / 商户异常)<br/>CANCELLED：用户微信内取消
```

- `EXPIRED`(二维码默认 5 分钟,可配置)→ 前端重新发起换新码继续等。
- 未绑定 / 未扫 / 未确认对前端表现一致(`WAITING`),不区分以防枚举。
- 微信内须用户**显式确认**才登录(扫码本身不构成认证);确认前对前端仍是 `WAITING`。
- 二维码请求时已带 client(商户后台),微信内**不选 client / 商户**;同一身份跨多 merchant 的切换在门户内完成,不在微信里。
- `REJECTED` / `CANCELLED` 是 40-06 在用户**确认后**的裁决(`REJECTED`=无 active membership / 账号或商户不可用;`CANCELLED`=用户在微信内取消);确认前一律 `WAITING`(反枚举)。

## WeChat 绑定(代成员;异设备扫码 + 轮询)

Owner 在 Users 页给成员(含自己)绑 WeChat:[`initiateMemberWechatBinding`](index.html#tag/team/operation/initiateMemberWechatBinding) 拿二维码,被绑定成员扫码确认,Owner 用 [`pollMemberWechatBinding`](index.html#tag/team/operation/pollMemberWechatBinding) **轮询**取结果。**异设备**(Owner 发起 / 成员扫码)是它比扫码登录更复杂之处。

```mermaid
sequenceDiagram
    participant B as Owner 浏览器(SPA)
    participant A as 商户后台 BFF
    participant W as 成员微信
    B->>A: [initiateMemberWechatBinding] POST /team/members/{operatorId}/wechat-binding
    A-->>B: 200 { qrTicket, qrContent, expiresAt }
    B->>B: 渲染二维码(交被绑定成员扫)
    par 成员侧
        W->>W: 扫码 → 微信内授权 → 显式确认绑定(异设备：成员手机)
    and Owner 轮询
        loop 直到非 PENDING
            B->>A: [pollMemberWechatBinding] GET /team/members/{operatorId}/wechat-binding/{qrTicket}
            A-->>B: 200 { status, reason? }
        end
    end
    Note over B,A: PENDING：继续轮询<br/>BOUND：已绑(team 列表 wechatBound 走事件收敛)<br/>FAILED：粗粒度(占用细节不回泄 Owner，reason 仅 TARGET_GONE)<br/>CANCELLED：成员取消<br/>EXPIRED：换码重发
```

- **异设备是关键**:Owner 在商户后台(PC)发起、被绑定成员在自己微信(手机)扫码确认;无结果腿则 Owner 零回告,故 `pollMemberWechatBinding` 必备。
- **占用冲突不回泄 Owner**(INV-19):成员微信已绑别的账号 → Owner 轮询只得粗粒度 `FAILED`(`reason` 仅 `TARGET_GONE`),精确「已被占用」仅成员微信内可见;杜绝 Owner 借代绑刺探成员微信是否在平台用过。
- **绑定 = 启用本 client 微信登录**:成功即该成员可在商户后台扫码登录;解绑([`unbindMemberWechat`](index.html#tag/team/operation/unbindMemberWechat))只停本 client 启用,不删平台级 WeChat 绑定、不影响其他 client。
- `wechatBound`(team 列表)= 本 client 启用状态,收敛走 40-06 `credential_changed` 事件(D4),非前端轮询兜底。

## 改登录邮箱(严格两步验证,4 调)

仅邮箱格式账号可改(用户名格式 → 403)。**先验身份**([`verifyLoginEmailChangeIdentity`](index.html#tag/my-profile/operation/verifyLoginEmailChangeIdentity):已启 MFA 用 TOTP,未启用旧邮箱 OTP),**再验新邮箱**([`confirmLoginEmailChange`](index.html#tag/my-profile/operation/confirmLoginEmailChange):新邮箱 OTP)。[`initiateLoginEmailChange`](index.html#tag/my-profile/operation/initiateLoginEmailChange) 返回的 `challengeId` 串起全程。

```mermaid
sequenceDiagram
    participant B as 浏览器(SPA)
    participant A as 商户后台 BFF
    participant EO as 旧邮箱
    participant EN as 新邮箱
    B->>A: [initiateLoginEmailChange] POST /account/login-email/change
    A-->>B: 200 { challengeId, identityVerification= MFA_TOTP | OLD_EMAIL_OTP }
    opt identityVerification= OLD_EMAIL_OTP
        A->>EO: 发旧邮箱 OTP
    end
    B->>A: [verifyLoginEmailChangeIdentity] POST .../identity-verification { challengeId, code }
    A-->>B: 204(身份已校验)
    B->>A: [submitNewLoginEmail] POST .../new-email { challengeId, newEmail }
    A->>EN: 发新邮箱 OTP
    A-->>B: 202(新邮箱 OTP 已发；newEmail pending 占用登录域唯一性)
    B->>A: [confirmLoginEmailChange] POST .../confirmation { challengeId, code }
    A->>EO: 旧邮箱安全通知
    A-->>B: 204(登录邮箱已更新；不影响当前会话)
    Note over B,A: 用户名格式账号发起即 403<br/>新邮箱占用 409<br/>challenge 过期 410<br/>身份校验失败 401<br/>Owner 同步商户主联系邮箱(FR-10)，员工仅个人(FR-15)
```

## 找回密码(FR-09 自助重置,3 调)

[`requestPasswordReset`](index.html#tag/password-reset/operation/requestPasswordReset) **恒 202 反枚举**(不暴露账号是否存在 / 因子);[`verifyPasswordResetFactor`](index.html#tag/password-reset/operation/verifyPasswordResetFactor) 按已绑因子(邮箱 OTP / TOTP)验证换 `resetToken`;[`confirmPasswordReset`](index.html#tag/password-reset/operation/confirmPasswordReset) 设新密码。**重置不绕过 MFA**(只改密码、不动 MfaBinding)。

```mermaid
sequenceDiagram
    participant B as 浏览器(登录页/SPA)
    participant A as 商户后台 BFF
    participant E as 邮箱
    participant T as Authenticator
    B->>A: [requestPasswordReset] POST /password-reset/request { loginId }
    A-->>B: 202 { challengeId }(恒态反枚举，不暴露账号存在性/因子)
    alt 未绑 MFA 的邮箱格式(服务端判定)
        A->>E: 发邮箱 OTP
        E-->>B: 用户读取邮箱 OTP
    else 已绑 MFA
        T-->>B: 用户读取 Authenticator TOTP(不发邮箱 OTP，闭合降级)
    end
    B->>A: [verifyPasswordResetFactor] POST .../factor-verification { challengeId, code }
    A-->>B: 200 { resetToken }(高熵单次)
    B->>A: [confirmPasswordReset] POST .../confirmation { resetToken, newPassword }
    A-->>B: 204(密码已重置；全平台会话失效；MfaBinding 不变→下次登录仍验 TOTP；回登录页)
    Note over B,A: 恒 202 反枚举<br/>用户名+无 TOTP→不发(联系 Owner)<br/>因子错/过期/超限 400/410/423/429<br/>challengeId·resetToken 单次
```

- 因子由服务端按账号判定:已绑 MFA→TOTP(不发邮箱 OTP)、未绑 MFA 邮箱格式→邮箱 OTP、用户名+无 TOTP→不发(前端通用提示「联系 Owner」,不依赖账号存在性)。
- **不绕过 MFA**:重置只改密码、不修改 MfaBinding,下次登录仍强制 TOTP(闭合 MFA 降级)。
- 可从登录页(无会话)或 My Profile(FR-15,登录态)发起;成功后全平台会话失效、回登录页。

## Owner 改员工登录邮箱(FR-11,异步确认)

Owner 在 Users 页改 **ACTIVE 邮箱格式员工**的登录邮箱([`updateTeamMember`](index.html#tag/team/operation/updateTeamMember))**不直接生效**——新邮箱发确认链接,员工本人点 [`confirmMemberLoginEmail`](index.html#tag/team/operation/confirmMemberLoginEmail) 确认才切换(任何成为生效凭据的登录邮箱都经控制权验证)。

```mermaid
sequenceDiagram
    participant O as Owner 浏览器(SPA)
    participant A as 商户后台 BFF
    participant EN as 员工新邮箱
    participant M as 员工浏览器
    O->>A: [updateTeamMember] PUT /team/members/{operatorId} { loginId= 新登录邮箱 }
    A->>EN: 发新邮箱确认链接(operator.email_change_pending)
    A-->>O: 204(受理:不直接生效；确认前旧邮箱有效、pending 新邮箱不可登录/Forgot)
    Note over EN,M: 员工点新邮箱确认链接 → 确认页(anti-prefetch GET 只展示)
    M->>A: [confirmMemberLoginEmail] POST /team/login-email-confirmations { token }
    A-->>M: 204(登录邮箱已切换；旧邮箱收安全通知)
    Note over O,A: 仅 ACTIVE 邮箱格式员工<br/>INVITED 员工改→重发邀请<br/>用户名格式员工不可改邮箱<br/>token 单次 anti-prefetch
```

- 确认前旧邮箱仍有效、pending 新邮箱不可登录 / 不可 Forgot;切换后旧邮箱收安全通知。
- 用户名格式员工无登录邮箱凭据(不可改);`INVITED` 员工改邮箱 → 重发邀请。
- 与 §改登录邮箱(员工自助,FR-15)正交:此为 **Owner 代改**、走新邮箱确认链接;自助走身份校验 + 新邮箱 OTP。

## 启用 MFA(两段式:enroll → activate)

[`enrollMfa`](index.html#tag/account-security/operation/enrollMfa) 需当前密码,返回 `otpauthUri` 供 Authenticator 添加;[`activateMfa`](index.html#tag/account-security/operation/activateMfa) 输一次 TOTP 激活。

```mermaid
sequenceDiagram
    participant B as 浏览器(SPA)
    participant A as 商户后台 BFF
    participant T as Authenticator App
    B->>A: [enrollMfa] POST /account/security/mfa { currentPassword }
    A-->>B: 200 { otpauthUri }(MFA_PENDING，未生效)
    B->>B: 渲染 otpauth 二维码
    B->>T: 用户扫码添加条目
    T-->>B: 显示 6 位 TOTP
    B->>A: [activateMfa] POST /account/security/mfa/activation { code }
    A-->>B: 204(MFA_PENDING → ENABLED)
    Note over B,A: 当前密码错 401(不计 AUTH-FR-04 锁定计数)<br/>TOTP 错 401，前端可重输
```

## 自助注册 → 邮箱激活(两步,anti-prefetch)

[`registerOwner`](index.html#tag/registration/operation/registerOwner) 建 `PENDING_VERIFICATION` 账号并发验证邮件;**确认页 GET 只展示、不激活**,用户主动点 Verify 才用 [`verifyRegistrationEmail`](index.html#tag/registration/operation/verifyRegistrationEmail) 激活(防邮件扫描器 prefetch 误激活)。

```mermaid
sequenceDiagram
    participant B as 浏览器(SPA)
    participant A as 商户后台 BFF
    participant E as 邮箱
    B->>A: [registerOwner] POST /registrations { email, password, agreeTerms, ... }
    A->>E: 发验证邮件(含确认链接)
    A-->>B: 201 PENDING_VERIFICATION(前端跳「等待验证」页)
    Note over E,B: 用户点邮件链接 → 打开确认页(GET 只展示，不消费 token)
    B->>A: [verifyRegistrationEmail] POST /registrations/verification { token }(用户在确认页主动点 Verify)
    A-->>B: 200 ACTIVE(→ 进入入驻 ONB 起点)
    Note over B,A: 链接过期 / 已用 410<br/>激活前任一步失败留 PENDING、可重试、不展示成功(AUTH-FR-01)
```

- 重发验证邮件:[`resendVerificationEmail`](index.html#tag/registration/operation/resendVerificationEmail)(`POST /registrations/verification-email`,冷却内 429;新链接生效、旧链接失效)。
- 邮箱邀请员工设密激活(FR-14)同形:确认页主动提交 [`acceptInvitationSetPassword`](index.html#tag/team/operation/acceptInvitationSetPassword)(anti-prefetch GET 不激活),`INVITED → ACTIVE`。

import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
document.getElementById('content').innerHTML = marked.parse(document.getElementById('src').textContent);
document.querySelectorAll('code.language-mermaid').forEach(c=>{const d=document.createElement('div');d.className='mermaid';d.textContent=c.textContent;c.closest('pre').replaceWith(d);});
mermaid.initialize({startOnLoad:false,theme:'neutral',sequence:{useMaxWidth:true}});
mermaid.run({querySelector:'.mermaid'});
</script>
</body></html>
