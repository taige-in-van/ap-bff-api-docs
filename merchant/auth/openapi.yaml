        - AUTH-FR-07
  /team/members/{operatorId}/wechat-binding/{qrTicket}:
    get:
      tags:
        - team
      operationId: pollMemberWechatBinding
      summary: FR-07 WeChat 绑定 — 结果轮询（闭环结果腿；对称 pollWechatLogin）
      description: |
        被绑定本人在微信内确认后回告发起端（异设备:Owner 发起 / 成员扫码,无此腿则 Owner 零回告）。 未扫 / 未确认统一 PENDING；占用冲突(INV-05)只能扫码确认后判定，扫码本人微信内可见具体原因，Owner/BFF 发起方只获得粗粒度 FAILED；二维码过期 → EXPIRED。终态在短时保留期内幂等可查。 **轮询契约：非法 / 过期 / 未知票据亦返回 200 + status（不用 4xx 表达票据态）——有意为之**，避免票据存在性枚举；非法 / 过期票据归一为 EXPIRED。
      parameters:
        - name: operatorId
          in: path
          required: true
          schema:
            type: string
        - name: qrTicket
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 轮询结果
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - PENDING
                      - BOUND
                      - FAILED
                      - CANCELLED
                      - EXPIRED
                    readOnly: true
                    description: 服务端裁决的绑定轮询态（可扩展枚举；消费方按 unknown-safe 处理：遇未知值视同 PENDING 继续轮询、不崩）
                  reason:
                    type: string
                    enum:
                      - TARGET_GONE
                    readOnly: true
                    description: FAILED 时的业务原因；占用冲突不向 Owner/BFF 暴露具体原因。
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-requirement-ids:
        - AUTH-FR-07
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-msession
      description: |
        商户后台 BFF 服务端会话 cookie（httpOnly / secure / SameSite；`__Host-` 前缀强制 Secure + Path=/ + 无 Domain，杜绝子域注入）。 浏览器不见 40-06 token；BFF 映射 cookie → 40-06 access/refresh token。会话裁决商户 scope（merchant 上下文从会话取、不信请求体）。 写接口（非安全方法）另需 CSRF 防护（见 ../../_design/api/components.openapi.yaml#/components/parameters/CsrfToken）。
  schemas:
    RegistrationRequest:
      type: object
      description: FR-01 注册字段（业务约束见 requirements 字段清单）
      required:
        - email
        - password
        - agreeTerms
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          description: 新版 5 规则（≥8 / 大写 / 小写 / 数字 / 特殊字符）
        agreeTerms:
          type: boolean
          description: Services Agreement + Privacy Policy 必勾选
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
          description: 默认区号 +1 / 10 位；白名单与长度规则部署可配（X-07）
        businessTitle:
          type: string
          description: Business Owner / Manager / Employee / Other（Other 可自定义）；仅信息收集
        referredBy:
          type: string
          description: 有来源（Moneris 等）由 Welcome 邮件链接预填且禁改
    RegistrationAccepted:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - PENDING_VERIFICATION
        maskedEmail:
          type: string
          description: 脱敏邮箱，供「等待验证」页展示
    ActivationResult:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ACTIVE
        next:
          type: string
          description: 前端路由目标（新注册 Owner → ONB 5 步入驻起点）
        merchantId:
          type: string
          description: 可展示的 Merchant ID（来自 Merchant Shell）
    LoginRequest:
      type: object
      required:
        - loginId
        - password
      properties:
        loginId:
          type: string
          description: Email or Username（单 input；含 @ 按 email、否则 username）
        password:
          type: string
          format: password
        rememberMe:
          type: boolean
          default: false
          description: 勾选 → 会话不受关浏览器 / idle / absolute 自然过期影响（仍受系统侧失效）
    LoginResult:
      description: 登录结果多态;按 status 判别(discriminator)。ESTABLISHED 时已 set-cookie;PENDING_VERIFICATION/INVITED 不签发(无 active membership)
      oneOf:
        - $ref: '#/components/schemas/EstablishedSession'
        - $ref: '#/components/schemas/MfaRequiredChallenge'
        - $ref: '#/components/schemas/PendingVerificationNotice'
        - $ref: '#/components/schemas/InvitationPendingNotice'
      discriminator:
        propertyName: status
        mapping:
          ESTABLISHED: '#/components/schemas/EstablishedSession'
          MFA_REQUIRED: '#/components/schemas/MfaRequiredChallenge'
          PENDING_VERIFICATION: '#/components/schemas/PendingVerificationNotice'
          INVITED: '#/components/schemas/InvitationPendingNotice'
    EstablishedSession:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ESTABLISHED
    MfaRequiredChallenge:
      type: object
      required:
        - status
        - mfaChallenge
      properties:
        status:
          type: string
          enum:
            - MFA_REQUIRED
        mfaChallenge:
          type: string
          description: 提交到 /sessions/mfa
    PendingVerificationNotice:
      type: object
      required:
        - status
        - maskedEmail
      properties:
        status:
          type: string
          enum:
            - PENDING_VERIFICATION
        maskedEmail:
          type: string
          description: 供「等待验证」页展示
    InvitationPendingNotice:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - INVITED
        message:
          type: string
          description: FR-02-AC-09:邮箱邀请员工待设密,前端提示「请用邀请邮件设密激活」
    PasswordResetChallenge:
      type: object
      required:
        - challengeId
      properties:
        challengeId:
          type: string
          description: 反枚举 opaque challenge；后续提交到 /password-reset/factor-verification
    PasswordResetFactorVerified:
      type: object
      required:
        - resetToken
      properties:
        resetToken:
          type: string
          description: 高熵单次 token；提交到 /password-reset/confirmation
    SessionContext:
      type: object
      description: FR-05 会话上下文 = 40-06 /me（身份 + 可见菜单树 + 落地页）+ 本地 Operator 展示字段（BFF 聚合）
      required:
        - operatorId
        - menus
      properties:
        operatorId:
          type: string
        displayName:
          type: string
        isOwner:
          type: boolean
        merchantId:
          type: string
        roles:
          type: array
          items:
            type: string
        landingPage:
          type: string
          description: 角色主项决定的默认落地页（未配置默认 Dashboard）
        menus:
          type: array
          description: 过滤后的可见菜单树（前端只渲染所返回项；来自 40-06 RBAC 求值）
          items:
            $ref: '#/components/schemas/MenuNode'
    MenuNode:
      type: object
      required:
        - resourceId
        - type
      properties:
        resourceId:
          type: string
        type:
          type: string
          enum:
            - menu
            - button
        label:
          type: string
        path:
          type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/MenuNode'
    ContactProfile:
      type: object
      description: FR-13 Owner 联系人资料（语义对齐 FR-01 Sign Up）
      required:
        - firstName
        - lastName
      properties:
        firstName:
          type: string
        lastName:
          type: string
        businessTitle:
          type: string
        phone:
          type: string
          description: 默认区号 +1 / 10 位；白名单与长度规则部署可配（X-07）
    TeamMember:
      type: object
      description: FR-11 列表行（合并本地 Operator 展示字段 + 40-06 membership 权威字段）
      required:
        - operatorId
        - displayName
        - loginId
        - status
        - isOwner
      properties:
        operatorId:
          type: string
        displayName:
          type: string
          description: Nick Name（本地 Operator）
        loginId:
          type: string
          description: 登录 ID / 邮箱（40-06 identity）
        role:
          type: string
          description: 角色（40-06 membership_role）
        status:
          type: string
          enum:
            - INVITED
            - ACTIVE
            - DISABLED
          description: 账号态:INVITED(邮箱邀请待设密,附 Resend)= 本地 Operator;ACTIVE/DISABLED 权威 = 40-06 membership state(active→ACTIVE/disabled→DISABLED);removed 不呈现
        pendingLoginEmail:
          oneOf:
            - type: string
              format: email
            - type: 'null'
          description: ACTIVE 邮箱员工被 Owner 改邮箱、待新邮箱确认时的 pending 新邮箱（确认前旧邮箱仍有效）;无则 null
        isOwner:
          type: boolean
        wechatBound:
          type: boolean
          description: 该商户用户在 merchant client 的 WeChat login enrollment 是否 enabled（FR-07）；不代表平台级 WeChat 外部账号凭据是否存在
        lastLoginAt:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
          description: 最近登录（40-06）；从未登录为 null，前端显示「从未登录」
        createdAt:
          $ref: '#/components/schemas/Timestamp'
    CreateTeamMemberRequest:
      type: object
      required:
        - loginId
        - nickName
        - role
      properties:
        loginId:
          type: string
          description: Email or Username（含 @ = 邮箱格式 → 发邀请设密 INVITED;不含 @ = 用户名格式 → 需填 password、ACTIVE;登录域内唯一）
        nickName:
          type: string
        password:
          type: string
          format: password
          description: '**用户名格式必填**（新版 5 规则）;**邮箱格式不填**（员工经邀请链接自设,FR-14）'
        role:
          type: string
          description: 管理后台预定义可分配角色（不可选 Owner）
    UpdateTeamMemberRequest:
      type: object
      description: 编辑员工;字段按归属拆写(见 updateTeamMember 描述)。loginId 改用户名直接生效;改 ACTIVE 邮箱员工登录邮箱 → 新邮箱确认链接流程(不直接生效)。Password 留空保持、填值即重置
      properties:
        loginId:
          type: string
          description: 改登录 ID;用户名直接生效,ACTIVE 邮箱员工改邮箱走确认链接
        nickName:
          type: string
        role:
          type: string
        newPassword:
          type: string
          format: password
          description: 填写即重置该员工密码 + 失效其全部会话；留空保持原密码（INVITED 员工不可由 Owner 直接设密）
    ErrorEnvelope:
      type: object
      description: 统一错误返回(骨干07 错误响应体:结构化整数 code + detail + 可选 links;扩展 traceId/details)。
      required:
        - code
        - detail
      properties:
        code:
          type: integer
          description: 结构化整数错误码(骨干07:能力域段 + 责任方类别 + 域内末段;可解析责任方+来源域,与 HTTP 状态正交)。
        detail:
          type: string
          description: 错误描述(面向调用方;本地化按 locale,X-06)。
        links:
          type: object
          description: 可选:错误说明 / 后续恢复操作链接(骨干07)。
          additionalProperties:
            type: string
        traceId:
          type: string
          description: 可选:关联 id,串联日志 / 分布式 trace(可观测)。
        details:
          type: array
          description: 可选:字段级校验错误(骨干07)。
          items:
            type: object
            required:
              - field
              - issue
            properties:
              field:
                type: string
              issue:
                type: string
    Timestamp:
      type: string
      format: date-time
      description: 'RFC 3339 date-time。in/out 非对称(骨干07):**响应 MUST UTC `Z`**(如 2026-05-19T14:30:00Z); **请求/query 入参 MAY 任意合法 offset**,服务端归一 UTC(format: date-time 同时接受 Z 与 offset, 「出参 Z」是约定、非 schema 可强制)。展示/清算切日按商户 IANA 时区(单独字段,offset ≠ timezone)。'
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: 幂等键(写接口;骨干07 三段命中语义)
      schema:
        type: string
        minLength: 1
        pattern: \S
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: CSRF 令牌(double-submit;cookie 会话鉴权的非安全方法[POST/PUT/PATCH/DELETE]必带;缺失/不匹配 → 403 fail-closed)
      schema:
        type: string
        minLength: 1
        pattern: \S
    PageNum:
      name: pageNum
      in: query
      description: 页码(从 1 计;骨干07 分页)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      description: 每页记录数(上限可配置;骨干07 分页默认 20)
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
  responses:
    BadRequest:
      description: 400 业务/校验错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: 409 冲突(幂等键冲突 / 状态冲突 / 标识已占用)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Gone:
      description: 410 一次性凭据失效(OTP / 验证链接 过期 / 已使用)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: 429 限流 / 冷却中 / 请求过频(临时锁定走 423 Locked)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: 401 未认证 / 凭证无效或已撤销
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: 403 无权限(fail-secure,默认拒绝)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Locked:
      description: 423 登录临时锁定(防爆破)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
