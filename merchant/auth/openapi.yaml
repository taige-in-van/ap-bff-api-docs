openapi: 3.1.0
info:
  title: 商户后台 注册登录与认证 (20-01 BFF) — 前端契约面
  version: 0.4.25
  contact:
    name: 商户后台 BFF
  description: |
    商户后台 React SPA 消费的注册 / 登录 / 会话 / 账户安全 / 团队成员 契约。 浏览器持 httpOnly 会话 cookie（登录后 set-cookie），字段类型与校验规则以本 spec 各字段为准。 幂等/CSRF 口径:① **创建类**(注册/建成员)与**非天然幂等 / 有副作用的写**(如改密〔失效会话〕、改成员)挂 Idempotency-Key;**真正天然幂等的纯 PUT/DELETE 可不挂**;**认证类(登录/登出/MFA/扫码)与多步 OTP 挑战类(改邮箱/找回)按流程语义不挂幂等键**(每次都应重新认证/校验);**例外**:找回流程的 `factor-verification` 步骤挂 Idempotency-Key(该步幂等、重放同键返回同一 resetToken,杜绝网络重试因 OTP 已消费假失败)。 ② cookieAuth 的非安全方法(POST/PUT/DELETE)一律挂 X-CSRF-Token(double-submit,fail-closed);公开端点(security:[])无会话故无 CSRF。
servers:
  - url: /api/merchant/v1
    description: 商户后台 BFF（经边缘网关；浏览器 ↔ BFF 用会话 cookie）
security:
  - cookieAuth: []
tags:
  - name: registration
    description: 自助注册与邮箱激活：提交注册建 PENDING_VERIFICATION 账号并发验证邮件，确认页主动点击激活；含重发验证邮件。
  - name: session
    description: 登录与会话生命周期：密码登录（MFA 联动）、WeChat 扫码登录、会话校验 / 身份摘要 / 可见菜单、登出。浏览器持 httpOnly 会话 cookie，非安全方法带 X-CSRF-Token。
  - name: account-security
    description: 账户安全自助：启用 / 禁用 MFA（TOTP）、登录态改密。
  - name: my-profile
    description: 个人账号自助（全员）：昵称、改**自己**登录邮箱（身份校验 → 新邮箱 OTP；Owner 改自己同步商户主邮箱）。
  - name: owner-contact
    description: Owner business profile 写面：联系人 First/Last/Title/Phone（GET=Profile 读权限 / PUT=编辑权限默认 Owner）+ Primary Email 严格两步（该 Owner 因子 + 新邮箱 OTP）。ME /account/profile 只聚合读展示。
  - name: password-reset
    description: 忘记密码自助重置：按已绑因子（TOTP / 邮箱 OTP）校验后重置，恒态反枚举，重置不绕过 MFA。
  - name: team
    description: 团队成员管理：成员新增 / 编辑 / 启停 / 删除、邮箱邀请设密与重发、登录邮箱确认、WeChat 绑定。
paths:
  /registrations:
    post:
      tags:
        - registration
      operationId: registerOwner
      summary: Owner 自助注册（创建 PENDING_VERIFICATION 账号 + 发验证邮件）
      description: |
        提交注册：校验邮箱唯一（已占用 → 409）、创建 PENDING_VERIFICATION 账号，并发起 Verify Email 邮件的异步发送（邮件投递失败不阻塞注册、账号仍建成）。 幂等：同 Idempotency-Key 重放返回同一受理结果。
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
            example:
              email: jane@example.com
              password: Str0ng!Pass
              agreeTerms: true
              firstName: Jane
              lastName: Merchant
              phone: '6045550123'
              businessTitle: Manager
      responses:
        '201':
          description: 已受理；账号 PENDING_VERIFICATION，验证邮件发送已发起（投递失败不阻塞注册）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationAccepted'
              example:
                status: PENDING_VERIFICATION
                maskedEmail: j***@example.com
                resendCooldownSeconds: 60
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
      x-error-codes:
        '409':
          - 208005
          - 968001
  /registrations/verification:
    post:
      tags:
        - registration
      operationId: verifyRegistrationEmail
      summary: 邮箱激活（确认页主动点击触发的 POST；防扫描器 prefetch）
      description: |
        校验一次性验证 token（**仅在激活成功时消费;之前失败不消费、可用同 token 重试**,避免卡在待验证但 token 已失效）→ 激活账号 → ACTIVE。 **token 单次有效、消费后绝不再签发会话**（防旧验证链接泄露后被换取会话）。**已使用 token 重试 → `410`,按 `ErrorEnvelope.code` 细分**:已激活 → `AUTH_REGISTRATION_ALREADY_ACTIVATED`（FE 跳登录页、用户仍须**密码登录**）/ token 无效·过期 → `AUTH_VERIFICATION_TOKEN_INVALID_OR_EXPIRED`（FE 引导重发或重新注册）。**两种 410 都不换会话**。验证链接的 GET 确认页是前端路由、不激活账号，故不在本 API。 **激活成立后按会话建立结果分流**：**`sessionEstablished=true` → 已 set-cookie、前端走应用启动链路**（merchantId / 落地页 / 入驻路由经 getCurrentSession + getOnboardingStatus 取，**不在本响应返回**）；**`sessionEstablished=false` → 激活已成立但本次未建会话、前端跳登录页首次密码登录**。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: 一次性邮箱验证 token（单次消费，anti-prefetch）
            example:
              token: vtok_a1b2c3d4e5
      responses:
        '200':
          description: 激活成功（**仅首次消费 token 时**）；账号 ACTIVE。`sessionEstablished=true` → 已 set-cookie、走启动链路（getCurrentSession → getOnboardingStatus.routeTo）分流；`sessionEstablished=false` → 激活已成立、跳登录页首次密码登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationResult'
              example:
                status: ACTIVE
                sessionEstablished: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          description: token 已使用 / 无效 / 过期——**均不换会话**；FE 按 `ErrorEnvelope.code`（整数）分流：`206002` = `AUTH_REGISTRATION_ALREADY_ACTIVATED`（已激活 → 跳登录、密码登录）/ `206001` = `AUTH_VERIFICATION_TOKEN_INVALID_OR_EXPIRED`（无效过期 → 重发或重注册）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      x-error-codes:
        '410':
          - 206001
          - 206002
  /registrations/verification-email:
    post:
      tags:
        - registration
      operationId: resendVerificationEmail
      summary: 重发验证邮件（恒 202 反枚举；新链接生效旧链接失效）
      description: '**恒返 202、存在 / 不存在账号同一外观、不回显账号存在性**（反枚举，对齐密码重置）。**账号级冷却（默认 60s 可配）/ 账号不存在均服务端静默、响应恒 202**（不以账号级信号暴露「账号存在且在冷却」）；**冷却剩余秒数由前端本地计时**、非 API 回显。**端点级 / IP 级防刷限流 → `429`（仅按调用频率、不区分账号存在性,enum-safe；FE 据此退避、防邮件轰炸）**。Resend 仅刷新链接，不重置 24h 清理计时器（计时从注册时刻起算）。'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
            example:
              email: jane@example.com
      responses:
        '202':
          description: 已受理（恒 202；账号存在且冷却外才实际发新邮件，否则静默——不回显账号存在性）
          content:
            application/json:
              schema:
                type: object
                required:
                  - resendCooldownSeconds
                properties:
                  resendCooldownSeconds:
                    type: integer
                    description: 重发验证邮件的账号级冷却秒数（默认 60、部署可配）；FE 据此从收到响应时刻本地倒计时。反枚举：恒返同一默认值、不泄露账号存在性
              example:
                resendCooldownSeconds: 60
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-error-codes: {}
  /invitations/password:
    post:
      tags:
        - team
      operationId: acceptInvitationSetPassword
      summary: 邮箱邀请员工设密激活（确认页主动提交;INVITED→ACTIVE,邮箱即验证为安全凭据）
      description: |
        员工点邀请链接 → 确认页设密提交：校验邀请 token + 密码规则通过 → 账号 `INVITED→ACTIVE`（邮箱同时验证为安全凭据）→ 204，前端跳登录页。 幂等：失败 / 响应丢失时 token 未消费,可用同 token 重试；token 已消费（激活已完成）后重试 → `410`（前端跳登录、非卡死）。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
                - confirmPassword
              properties:
                token:
                  type: string
                  description: 一次性邀请 token(anti-prefetch)
                newPassword:
                  type: string
                  format: password
                  description: 新版 5 规则
                confirmPassword:
                  type: string
                  format: password
            example:
              token: itok_5d4e1f2a3b
              newPassword: Str0ng!Pass
              confirmPassword: Str0ng!Pass
      responses:
        '204':
          description: 已激活;账号 ACTIVE,前端跳登录页
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          $ref: '#/components/responses/Gone'
      x-error-codes: {}
  /team/login-email-confirmations:
    post:
      tags:
        - team
      operationId: confirmMemberLoginEmail
      summary: 员工确认 Owner 改的新登录邮箱（点新邮箱确认链接 → 切换生效）
      description: Owner 改 ACTIVE 邮箱格式员工登录邮箱后,新邮箱收确认链接;员工主动确认 → 切换新邮箱 + 旧邮箱收安全通知;确认前旧邮箱有效。token 单次,anti-prefetch。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: 一次性新邮箱确认 token(anti-prefetch)
            example:
              token: etok_7c2d9e4f1a
      responses:
        '204':
          description: 登录邮箱已切换为新邮箱
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          $ref: '#/components/responses/Gone'
      x-error-codes: {}
  /sessions:
    post:
      tags:
        - session
      operationId: login
      summary: 密码登录（邮箱或用户名 + 密码；MFA 联动；签发 BFF 会话）
      description: |
        邮箱 / 用户名 + 密码认证（clientId 由服务端注入、前端不传）。未启 MFA → 建 BFF 会话（set-cookie）。已启 MFA → 返回 MFA_REQUIRED + 短时 mfaChallenge（不建会话）。 PENDING_VERIFICATION（自助注册待验）/ INVITED（邮箱员工待设密,前端提示「请用邀请邮件设密激活」）→ 未激活不签发会话;锁定 423;商户 suspended / 账号禁用 403。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              loginId: jane@example.com
              password: Str0ng!Pass
              rememberMe: false
      responses:
        '200':
          description: 登录结果（ESTABLISHED 时已 set-cookie；MFA_REQUIRED / PENDING_VERIFICATION 为中间态）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'
              examples:
                established:
                  summary: 成功（无 MFA，已 set-cookie）
                  value:
                    status: ESTABLISHED
                mfaRequired:
                  summary: 需 MFA（返回挑战句柄，未建会话）
                  value:
                    status: MFA_REQUIRED
                    mfaChallenge: chl_9f2a4c7e1b
                pendingVerification:
                  summary: 失败（账号待验证，无 active membership 不签发）
                  value:
                    status: PENDING_VERIFICATION
                    maskedEmail: j***@example.com
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-error-codes: {}
  /sessions/mfa:
    post:
      tags:
        - session
      operationId: completeMfaChallenge
      summary: 登录二次校验（提交 TOTP，通过则签发 BFF 会话）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mfaChallenge
                - code
              properties:
                mfaChallenge:
                  type: string
                  description: login 返回的短时挑战句柄（绑定待认证 identity）
                code:
                  type: string
            example:
              mfaChallenge: chl_9f2a4c7e1b
              code: '123456'
      responses:
        '200':
          description: 校验通过，已 set-cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'
              example:
                status: ESTABLISHED
        '401':
          $ref: '#/components/responses/Unauthorized'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-error-codes: {}
  /sessions/wechat:
    post:
      tags:
        - session
      operationId: initiateWechatLogin
      summary: WeChat 扫码登录 — 发起（返回二维码票据；轮询见 GET）
      description: 二维码默认 5 分钟有效（可配置），超时前端轮询拿到过期态后自动刷新继续等待。
      security: []
      responses:
        '200':
          description: 二维码票据
          content:
            application/json:
              schema:
                type: object
                required:
                  - qrTicket
                  - expiresAt
                properties:
                  qrTicket:
                    type: string
                  qrContent:
                    type: string
                    description: 二维码内容 / 图片 URL（前端渲染）
                  expiresAt:
                    $ref: '#/components/schemas/Timestamp'
              example:
                qrTicket: wxq_3f8a1c0d92
                qrContent: https://login.example.com/wxqr/wxq_3f8a1c0d92.png
                expiresAt: '2026-06-22T14:10:00Z'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-error-codes: {}
  /sessions/wechat/{qrTicket}:
    get:
      tags:
        - session
      operationId: pollWechatLogin
      summary: WeChat 扫码登录 — 轮询（确认成功则签发 BFF 会话）
      description: |
        被动等待「已绑定用户在微信内确认」。未绑定 / 未扫 / 未确认对前端表现一致（WAITING）。 ESTABLISHED 时已 set-cookie（会话有效期按未勾 Remember Me）；账号禁用 / 商户 suspended → REJECTED + reason。扫码登录不追加 MFA。 **轮询契约：非法 / 过期 / 未知票据亦返回 200 + status（不用 4xx 表达票据态）——有意为之**，避免票据存在性枚举；非法 / 过期票据归一为 EXPIRED，与「未扫」WAITING 反枚举一致。
      security: []
      parameters:
        - name: qrTicket
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 轮询结果
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - WAITING
                      - EXPIRED
                      - ESTABLISHED
                      - REJECTED
                      - CANCELLED
                    readOnly: true
                    description: 服务端裁决的轮询态（可扩展枚举；消费方按 unknown-safe 处理：遇未知值视同 WAITING 继续轮询、不崩）
                  reason:
                    type: string
                    readOnly: true
                    description: REJECTED 时的业务原因（账号已禁用 / 商户状态异常）
              example:
                status: WAITING
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-error-codes: {}
  /sessions/current:
    get:
      tags:
        - session
      operationId: getCurrentSession
      summary: 会话校验 + 身份摘要 + 可见菜单树 + 落地页
      description: 受保护请求的会话校验入口；返回身份摘要 + 可见菜单树 + 落地页。无效 → 401 前端跳登录页。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContext'
              example:
                operatorId: op_7a1c9
                displayName: Jane Merchant
                isOwner: true
                merchantId: '1000023'
                roles:
                  - OWNER
                landingPage: /dashboard
                menus:
                  - resourceId: dashboard
                    type: menu
                    label: Dashboard
                    path: /dashboard
                  - resourceId: settings
                    type: menu
                    label: Settings
                    path: /settings
                    children:
                      - resourceId: settings.users
                        type: menu
                        label: Users
                        path: /settings/users
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-error-codes: {}
    delete:
      tags:
        - session
      operationId: logout
      summary: 登出（撤销当前会话）
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: 已登出（cookie 已清除）
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-error-codes: {}
  /me/security:
    get:
      tags:
        - account-security
      operationId: getAccountSecurity
      summary: 账户安全状态（Security Level + MFA 状态，派生展示）
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - securityLevel
                  - mfaStatus
                properties:
                  securityLevel:
                    type: string
                    enum:
                      - Low
                      - Medium
                      - Strong
                    description: 派生：密码合规 + MFA 状态（不引入独立账号状态、不决定权限）
                  mfaStatus:
                    type: string
                    enum:
                      - DISABLED
                      - MFA_PENDING
                      - ENABLED
              example:
                securityLevel: Strong
                mfaStatus: ENABLED
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-error-codes: {}
  /me/security/mfa:
    post:
      tags:
        - account-security
      operationId: enrollMfa
      summary: 启用 MFA — 发起（输当前密码 → 返回 provisioning，待 activation）
      description: 输当前密码换取 TOTP provisioning（otpauth URI），待 activation 激活；当前密码错 → 401（不计入登录锁定）。
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
              properties:
                currentPassword:
                  type: string
                  format: password
            example:
              currentPassword: Str0ng!Pass
      responses:
        '200':
          description: provisioning（otpauth URI），待 activation
          content:
            application/json:
              schema:
                type: object
                properties:
                  otpauthUri:
                    type: string
              example:
                otpauthUri: otpauth://totp/MerchantPortal:jane@example.com?secret=JBSWY3DPEHPK3PXP&issuer=MerchantPortal
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-error-codes: {}
  /me/security/mfa/activation:
    post:
      tags:
        - account-security
      operationId: activateMfa
      summary: 启用 MFA — 确认（输 TOTP 激活，状态 → ENABLED）
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
            example:
              code: '123456'
      responses:
        '204':
          description: 已激活（MFA_PENDING → ENABLED）
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-error-codes: {}
  /me/security/mfa/deactivation:
    post:
      tags:
        - account-security
