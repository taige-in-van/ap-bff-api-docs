  /team/members/{operatorId}:
    put:
      tags:
        - team
      operationId: updateTeamMember
      summary: 编辑员工（Nick Name / Role / 用户名直接改 / 填 newPassword 重置 / ACTIVE 邮箱改走确认链接）
      description: |
        一次原子更新成员字段（Role + 用户名 loginId〔不含 @〕+ newPassword + Nick Name）:**要么全成功、要么全失败**（无部分成功、无字段级结果体）。副作用逐字段:`newPassword`→失效该员工全会话 / `loginId`(用户名)→登录域内唯一、直接生效 / `Role`→重算该商户权限。**启停走独立端点**（setMemberEnablement、非本端点）。同步字段生效后若显示名(Nick Name)仍在后台补齐 → `202`(处理中、status=PROCESSING),**同 `Idempotency-Key` 重试返当前结果、完成后收敛 `204`**——不返回整体失败。 **ACTIVE 邮箱格式员工改登录邮箱**:Owner 无需额外自证,但**不直接生效**——校验新邮箱格式/唯一(含 pending 占用)后向**新邮箱发确认链接**,确认前旧邮箱仍有效、pending 新邮箱不可登录/不可 Forgot;员工经 `/team/login-email-confirmations` 确认后切换。`INVITED` 员工改邮箱 → 重发邀请。 Owner row：仅 Nick Name 可改、Role 不可改、不经此重置 Owner 密码(改密走 changeOwnPassword、改邮箱走 owner-contact primary-email)。改 loginId/Role 不失效会话；填 newPassword → 该员工全会话失效。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: operatorId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamMemberRequest'
            example:
              nickName: Sam Clerk
              role: Operator
      responses:
        '202':
          description: 受理为处理中——同步字段已原子生效,显示名(Nick Name)后台补齐;同 `Idempotency-Key` 重试返当前结果、完成后收敛 204
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateTeamMemberProcessing'
        '204':
          description: 已更新（同步字段全部生效；ACTIVE 邮箱改邮箱为受理:确认链接已发新邮箱,待员工确认）
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
          - 208005
          - 968001
          - 968010
    delete:
      tags:
        - team
      operationId: deleteTeamMember
      summary: 删除员工（软删 status→DELETED + 全会话失效；Owner 不可删 → 403；INVITED/ACTIVE/DISABLED 均经此删成员本体）
      parameters:
