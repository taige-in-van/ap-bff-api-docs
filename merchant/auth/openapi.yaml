  /password-resets:
    post:
      tags:
        - password-reset
      operationId: requestPasswordReset
      summary: 商户用户自助重置 — 发起（**恒 202 反枚举**;因子由服务端判定,不在响应泄露）
      description: |
        前端只传 loginId。**恒返 202、不在响应体暴露因子/账号存在性**。服务端按可用因子处理:已绑 MFA → 后续要 TOTP(不发邮箱 OTP,闭合 MFA 降级);未绑 MFA 的邮箱格式 → 发邮箱 OTP;用户名格式+无 TOTP → 不发(联系 Owner)。**重发 = 重复调用本端点**:冷却后重复调用产生**新 challenge + 新 OTP**、**同一账号的旧 challenge / 旧 OTP 立即失效**(单一在途、避免多 OTP 并存)。 可从无会话(登录页)或登录态(My Profile)发起;用户名格式「联系 Owner」提示由前端按 loginId 格式通用展示(不依赖账号存在性)。**`429` = 端点级 / IP 级防刷限流(仅按调用频率、不区分账号存在性,enum-safe;FE 据此退避);账号级冷却服务端静默、响应恒 202、剩余秒数前端本地计时(绝不以账号级 429 暴露存在性)**。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - loginId
              properties:
                loginId:
                  type: string
            example:
              loginId: jane@example.com
      responses:
        '202':
          description: 已受理(反枚举,不暴露账号是否存在 / 因子)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetChallenge'
              example:
                challengeId: pwr_4e1a8c9b2d
                resendCooldownSeconds: 60
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-error-codes: {}
  /password-resets/{challengeId}/factor-verification:
    post:
      tags:
        - password-reset
      operationId: verifyPasswordResetFactor
      summary: 自助重置 — 因子验证（邮箱 OTP / TOTP → resetToken）
      description: |
        因子验证（**该步强制挂 Idempotency-Key**：重放同键返回同一 resetToken——杜绝网络重试因 OTP 已消费而假失败）。challengeId 不泄露账号存在性；因子错误 / 过期 → `410`、锁定 → `423`、限流 → `429`（共享错误模型）。`400` = 入参校验失败（如缺字段）。验证成功才签发单次 resetToken,供 confirmation 步骤设置新密码。
      security: []
      parameters:
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
          description: password-reset challenge 实例 id
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: 邮箱 OTP 或 TOTP code
            example:
              code: '123456'
      responses:
        '200':
          description: 因子验证通过，返回单次 resetToken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetFactorVerified'
              example:
                resetToken: rst_8f3c1a9e6b2d4f7a0c5e
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          $ref: '#/components/responses/Gone'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-error-codes: {}
  /password-resets/{challengeId}/confirmation:
    post:
      tags:
        - password-reset
      operationId: confirmPasswordReset
      summary: 自助重置 — 确认（因子 + 新密码 → 全会话失效;**MFA 绑定不变、不绕过 MFA**;不签发新会话）
      description: '**重置只改密码、不改 MFA 绑定**——下次登录仍强制 TOTP(闭合 MFA 降级)。'
      security: []
      parameters:
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
          description: password-reset challenge 实例 id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resetToken
                - newPassword
              properties:
                resetToken:
                  type: string
                  minLength: 20
                  description: 邮箱 OTP / TOTP 因子验证后的高熵单次 token
                newPassword:
                  type: string
                  format: password
            example:
              resetToken: rst_8f3c1a9e6b2d4f7a0c5e
              newPassword: N3w!Str0ngPass
      responses:
        '204':
          description: 重置成功（该用户全平台会话已失效;MFA 绑定不变;前端回登录页）
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          $ref: '#/components/responses/Gone'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-error-codes: {}
  /team/members:
