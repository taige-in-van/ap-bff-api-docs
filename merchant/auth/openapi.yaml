  /team/members/{operatorId}/wechat-binding:
    post:
      tags:
        - team
      operationId: initiateMemberWechatBinding
      summary: Owner 给成员（含自己）绑 WeChat — 发起（返回二维码，被绑定本人扫码）
      description: 为该成员发起 WeChat 登录绑定（返回二维码，被绑定本人扫码确认）。已绑定 → 409『请先解绑』；占用冲突只能扫码确认后判定，扫码本人微信内可见具体原因，发起方轮询只返回粗粒度 FAILED。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: operatorId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: 绑定二维码
          content:
            application/json:
              schema:
                type: object
                required:
                  - qrTicket
                  - expiresAt
                properties:
                  qrTicket:
                    type: string
                  qrContent:
                    type: string
                  expiresAt:
                    $ref: '#/components/schemas/Timestamp'
              example:
                qrTicket: wxb_2a7f9c1e04
                qrContent: https://login.example.com/wxbind/wxb_2a7f9c1e04.png
                expiresAt: '2026-06-22T14:10:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
