      description: |
        按登录 ID 格式分两支:**含 @（邮箱格式)** → 不填密码,① 40-06 建无凭据 unverified identity → ② AUTH 本地建 `Operator(INVITED)` + `Invitation` token + 发邀请链接邮件(员工自设密激活,FR-14),**不建 membership**(membership-last,设密时建);**不含 @（用户名格式)** → Owner 填临时密码,三相继单写者(① 40-06 建 identity+credential → ② AUTH 本地 Operator → ③ 40-06 provisionMember active membership)→ `ACTIVE`。 membership 之前 Operator 已就绪 → 无「可登录但无 profile」孤儿;前置步失败留良性态、幂等重试。不可选 Owner 角色。
