          - 208003
    delete:
      tags:
        - team
      operationId: unbindMemberWechat
      summary: Owner 给成员解绑 WeChat（不影响其当前会话）
      description: 只停用该成员的商户后台 WeChat 登录绑定；不影响其平台级 WeChat 账号、不影响其他登录方式。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: operatorId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: 已解绑
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /team/members/{operatorId}/wechat-binding/{qrTicket}:
    get:
      tags:
        - team
      operationId: pollMemberWechatBinding
      summary: WeChat 绑定 — 结果轮询（闭环结果腿；对称 pollWechatLogin）
      description: |
        被绑定本人在微信内确认后回告发起端（异设备:Owner 发起 / 成员扫码,无此腿则 Owner 零回告）。 未扫 / 未确认统一 PENDING；占用冲突只能扫码确认后判定，扫码本人微信内可见具体原因，发起方只获得粗粒度 FAILED；二维码过期 → EXPIRED。终态在短时保留期内幂等可查。 **轮询契约：非法 / 过期 / 未知票据亦返回 200 + status（不用 4xx 表达票据态）——有意为之**，避免票据存在性枚举；非法 / 过期票据归一为 EXPIRED。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: operatorId
          in: path
          required: true
          schema:
            type: string
        - name: qrTicket
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 轮询结果
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - PENDING
                      - BOUND
                      - FAILED
                      - CANCELLED
                      - EXPIRED
                    readOnly: true
                    description: 服务端裁决的绑定轮询态（可扩展枚举；消费方按 unknown-safe 处理：遇未知值视同 PENDING 继续轮询、不崩）
                  reason:
                    type: string
                    enum:
                      - TARGET_GONE
                    readOnly: true
                    description: FAILED 时的业务原因；占用冲突不向 Owner/BFF 暴露具体原因。
              example:
                status: PENDING
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-msession
      description: |
        商户后台 BFF 服务端会话 cookie（httpOnly / secure / SameSite；`__Host-` 前缀强制 Secure + Path=/ + 无 Domain，杜绝子域注入）。 浏览器只持此会话 cookie、不持后端 token。会话裁决商户 scope（当前商户从会话取、不信请求体）。 写接口（非安全方法）另需 CSRF 防护（X-CSRF-Token）；商户级读写另挂 MerchantContextGuard 守卫（见下方 parameters）。
  schemas:
    RegistrationRequest:
      type: object
      description: 注册字段（各字段校验见 schema）
      additionalProperties: false
      required:
        - email
        - password
        - agreeTerms
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          description: 新版 5 规则（≥8 / 大写 / 小写 / 数字 / 特殊字符）
        agreeTerms:
          type: boolean
          const: true
          description: Services Agreement + Privacy Policy 必勾选（const true — 未勾选即 400）
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
          description: 默认区号 +1 / 10 位；白名单与长度规则部署可配
        businessTitle:
          type: string
          description: Business Owner / Manager / Employee / Other（Other 可自定义）；仅信息收集
        referredBy:
          type: string
          description: 推荐来源。**无 token 时**客户端自由填；**带 registrationContextToken（有来源注册）时服务端以 token 内 referredBy 为准、覆盖此字段**（有来源则禁改）
        registrationContextToken:
          type: string
          description: 有来源注册（Welcome 邮件链接）携带的签名 token；服务端解析出可信 referredBy 等注册上下文。无来源注册可空
    RegistrationAccepted:
      type: object
      required:
        - status
        - resendCooldownSeconds
      properties:
        status:
          type: string
          enum:
            - PENDING_VERIFICATION
          readOnly: true
        maskedEmail:
          type: string
          readOnly: true
          description: 脱敏邮箱，供「等待验证」页展示
        resendCooldownSeconds:
          type: integer
          readOnly: true
          description: 重发验证邮件的账号级冷却秒数（默认 60、部署可配）；FE 据此从收到响应时刻本地倒计时、冷却内不重复请求
    ActivationResult:
      type: object
      required:
        - status
        - sessionEstablished
      properties:
        status:
          type: string
          enum:
            - ACTIVE
          readOnly: true
        sessionEstablished:
          type: boolean
          readOnly: true
          description: 是否已建会话：**true → 已 set-cookie、前端走启动链路**（getCurrentSession → getOnboardingStatus）；**false → 激活已成立但本次未建会话、前端跳登录页首次密码登录**。两种情况**账号均已激活成立**。
    LoginRequest:
      type: object
      required:
        - loginId
        - password
      properties:
        loginId:
          type: string
          description: Email or Username（单 input；含 @ 按 email、否则 username）
        password:
          type: string
          format: password
        rememberMe:
          type: boolean
          default: false
          description: 勾选 → 会话不受关浏览器 / idle / absolute 自然过期影响（仍受系统侧失效）
    LoginResult:
      description: 登录结果多态;按 status 判别(discriminator)。ESTABLISHED 时已 set-cookie;PENDING_VERIFICATION/INVITED 不签发(无 active membership)
      oneOf:
        - $ref: '#/components/schemas/EstablishedSession'
        - $ref: '#/components/schemas/MfaRequiredChallenge'
        - $ref: '#/components/schemas/PendingVerificationNotice'
        - $ref: '#/components/schemas/InvitationPendingNotice'
      discriminator:
        propertyName: status
        mapping:
          ESTABLISHED: '#/components/schemas/EstablishedSession'
          MFA_REQUIRED: '#/components/schemas/MfaRequiredChallenge'
          PENDING_VERIFICATION: '#/components/schemas/PendingVerificationNotice'
          INVITED: '#/components/schemas/InvitationPendingNotice'
    EstablishedSession:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ESTABLISHED
    MfaRequiredChallenge:
      type: object
      required:
        - status
        - mfaChallenge
      properties:
        status:
          type: string
          enum:
            - MFA_REQUIRED
        mfaChallenge:
          type: string
          description: 提交到 /sessions/mfa
    PendingVerificationNotice:
      type: object
      required:
        - status
        - maskedEmail
      properties:
        status:
          type: string
          enum:
            - PENDING_VERIFICATION
        maskedEmail:
          type: string
          description: 供「等待验证」页展示
    InvitationPendingNotice:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - INVITED
        message:
          type: string
          description: 邮箱邀请员工待设密,前端提示「请用邀请邮件设密激活」
    PasswordResetChallenge:
      type: object
      required:
        - challengeId
        - resendCooldownSeconds
      properties:
        challengeId:
          type: string
          description: 反枚举 opaque challenge；后续提交到 /password-resets/{challengeId}/factor-verification
        resendCooldownSeconds:
          type: integer
          description: 重发 OTP 的账号级冷却秒数（默认 60、部署可配）；FE 据此从收到响应时刻本地倒计时。反枚举：存在 / 不存在账号均返同一默认值、不泄露存在性
    PasswordResetFactorVerified:
      type: object
      required:
        - resetToken
      properties:
        resetToken:
          type: string
          description: 高熵单次 token；提交到 /password-resets/{challengeId}/confirmation
    SessionContext:
      type: object
      description: 会话上下文：身份摘要 + 可见菜单树 + 落地页 + 展示字段
      required:
        - operatorId
        - merchantId
        - landingPage
        - menus
      properties:
        operatorId:
          type: string
          readOnly: true
        displayName:
          type: string
          readOnly: true
        isOwner:
          type: boolean
          readOnly: true
        merchantId:
          type:
            - string
            - 'null'
          readOnly: true
          description: 当前商户内部 id；**可为 null = 无当前商户**（撤回 / 无可访问商户，FE 走 listMerchants 选择或进入无可用商户态）；非 null 时据此初始化 X-Merchant-Context（见启动链路）
        roles:
          type: array
          readOnly: true
          items:
            type: string
        landingPage:
          type:
            - string
            - 'null'
          readOnly: true
          description: 角色主项决定的默认落地页（未配置默认 Dashboard；无当前商户时为 null）；**仅 routeTo=MERCHANT_HOME 时采用**——入驻 / 审核 / 拒绝区域由 getOnboardingStatus.routeTo 决定
        menus:
          type: array
          readOnly: true
          description: 过滤后的可见菜单树（前端只渲染所返回项；已按角色权限过滤）
          items:
            $ref: '#/components/schemas/MenuNode'
    MenuNode:
      type: object
      required:
        - resourceId
        - type
      properties:
        resourceId:
          type: string
        type:
          type: string
          enum:
            - menu
            - button
        label:
          type: string
        path:
          type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/MenuNode'
    OwnerContactView:
      type: object
      description: Owner 联系人 GET 视图（Owner 全局单一、名下多商户共享）；含只读 primaryEmail。语义对齐 Sign Up
      required:
        - firstName
        - lastName
        - primaryEmail
      properties:
        firstName:
          type: string
        lastName:
          type: string
        businessTitle:
          type: string
        phone:
          type: string
          description: 默认区号 +1 / 10 位；白名单与长度规则部署可配
        primaryEmail:
          type: string
          format: email
          description: 当前 Primary Email（= Owner 登录邮箱 = Contact email；只读展示，编辑面读此 authoritative 值；变更走 /owner-contact/primary-email/change-requests/*）
    UpdateOwnerContactRequest:
      type: object
      description: Owner 联系人 PUT 请求体（仅联系人字段；Primary Email 改走 change-requests、本请求体**结构上不接受**）
      additionalProperties: false
      required:
        - firstName
        - lastName
      properties:
        firstName:
          type: string
        lastName:
          type: string
        businessTitle:
          type: string
        phone:
          type: string
          description: 默认区号 +1 / 10 位；白名单与长度规则部署可配
    TeamMember:
      type: object
      description: 团队成员列表行
      required:
        - operatorId
        - displayName
        - loginId
        - status
        - isOwner
      properties:
        operatorId:
          type: string
          readOnly: true
        displayName:
          type: string
          description: Nick Name（本地 Operator）
        loginId:
          type: string
          description: 登录 ID / 邮箱
        role:
          type: string
          description: 角色
        status:
          type: string
          enum:
            - INVITED
            - ACTIVE
            - DISABLED
          readOnly: true
          description: 账号态:INVITED(邮箱邀请待设密,附 Resend);ACTIVE / DISABLED;removed 不呈现
        pendingLoginEmail:
          oneOf:
            - type: string
              format: email
            - type: 'null'
          description: ACTIVE 邮箱员工被 Owner 改邮箱、待新邮箱确认时的 pending 新邮箱（确认前旧邮箱仍有效）;无则 null
        isOwner:
          type: boolean
        wechatBound:
          type: boolean
          description: 该成员的商户后台 WeChat 登录是否已绑定；不代表其平台级 WeChat 账号是否存在
        lastLoginAt:
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
          readOnly: true
          description: 最近登录；从未登录为 null，前端显示「从未登录」
        createdAt:
          $ref: '#/components/schemas/Timestamp'
          readOnly: true
    CreateTeamMemberRequest:
      description: 按 loginId 格式分支：邮箱格式发邀请设密并进入 INVITED；用户名格式由 Owner 设初始密码并进入 ACTIVE。
      oneOf:
        - title: InviteEmailMember
          type: object
          additionalProperties: false
          required:
            - loginId
            - nickName
            - role
          properties:
            loginId:
              type: string
              pattern: '@'
              description: 邮箱格式登录 ID（含 @）；发邀请链接，由员工自设密码
            nickName:
              type: string
            role:
              type: string
              description: 管理后台预定义可分配角色（不可选 Owner）
        - title: CreateUsernameMember
          type: object
          additionalProperties: false
          required:
            - loginId
            - nickName
            - password
            - role
          properties:
            loginId:
              type: string
              pattern: ^[^@]+$
              description: 用户名格式登录 ID（不含 @）
            nickName:
              type: string
            password:
              type: string
              format: password
              description: Owner 设置的初始密码（新版 5 规则）
            role:
              type: string
              description: 管理后台预定义可分配角色（不可选 Owner）
    UpdateTeamMemberRequest:
      type: object
      description: 编辑员工;一次原子更新 Role / 用户名 loginId / password / Nick Name(见 updateTeamMember 描述)。loginId 改用户名直接生效;改 ACTIVE 邮箱员工登录邮箱 → 新邮箱确认链接流程(独立、不经本端点)。Password 留空保持、填值即重置
      additionalProperties: false
      minProperties: 1
      properties:
        loginId:
          type: string
          description: 改登录 ID;用户名直接生效,ACTIVE 邮箱员工改邮箱走确认链接
        nickName:
          type: string
        role:
          type: string
        newPassword:
          type: string
          format: password
          description: 填写即重置该员工密码 + 失效其全部会话；留空保持原密码（INVITED 员工不可由 Owner 直接设密）
    UpdateTeamMemberProcessing:
      type: object
      description: 编辑受理为处理中——同步字段已生效、展示字段（Nick Name）后台补齐；收敛靠同 Idempotency-Key 重试返当前结果、完成后 204
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - PROCESSING
          description: 处理中——展示字段最终一致后收敛为成功（同 Idempotency-Key 重试查进度）
    ErrorEnvelope:
      type: object
      description: 统一错误返回(错误响应体:结构化整数 code + detail + 可选 links;扩展 traceId/details)。
      required:
        - code
        - detail
      properties:
        code:
          type: integer
          description: 结构化整数错误码(能力域段 + 责任方类别 + 域内末段;可解析责任方+来源域,与 HTTP 状态正交)。
        detail:
          type: string
          description: 错误描述(面向调用方;本地化按 locale)。
        links:
          type: object
          description: 可选:错误说明 / 后续恢复操作链接。
          additionalProperties:
            type: string
        traceId:
          type: string
          description: 可选:关联 id,串联日志 / 分布式 trace(可观测)。
        details:
          type: array
          description: 可选:字段级校验错误。
          items:
            type: object
            required:
              - field
              - issue
            properties:
              field:
                type: string
              issue:
                type: string
    Timestamp:
      type: string
      format: date-time
      description: 'RFC 3339 date-time。in/out 非对称:**响应 MUST UTC `Z`**(如 2026-05-19T14:30:00Z); **请求/query 入参 MAY 任意合法 offset**,服务端归一 UTC(format: date-time 同时接受 Z 与 offset, 「出参 Z」是约定、非 schema 可强制)。展示/清算切日按商户 IANA 时区(单独字段,offset ≠ timezone)。'
    MerchantBffError:
      description: 商户后台 BFF 错误体 = ErrorEnvelope + 可选 context（错误专属结构化上下文，非字段校验 details）。
      allOf:
        - $ref: '#/components/schemas/ErrorEnvelope'
        - type: object
          properties:
            context:
              type: object
              description: 错误专属结构化上下文（非 details 字段校验数组）。MERCHANT_CONTEXT_CHANGED 时携 currentMerchantId 供前端 re-sync。
              properties:
                currentMerchantId:
                  type:
                    - string
                    - 'null'
                  description: 服务端会话当前商户（≠ 请求携带的 expected X-Merchant-Context）；**null = 无当前商户**（前端须重选）。**契约不变量**：code=208001 时本字段必 **present**（值可为 null）。
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: 幂等键(写接口;三段命中语义)
      schema:
        type: string
        minLength: 1
        pattern: \S
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: CSRF 令牌(double-submit;cookie 会话鉴权的非安全方法[POST/PUT/PATCH/DELETE]必带;缺失/不匹配 → 403 fail-closed)
      schema:
        type: string
        minLength: 1
        pattern: \S
    MerchantContextGuard:
      name: X-Merchant-Context
      in: header
      required: true
      description: |
        stale-tab 一致性守卫（读写统一）：页面预期的当前商户 ID。与会话当前商户比对，一致才执行； **不一致 → 409 `MerchantBffConflict`**（`code` `208001`、`MERCHANT_CONTEXT_CHANGED`）——**读不返回错商户数据、写不执行**，响应 `context.currentMerchantId` 回显服务端当前商户供前端直接 re-sync。 挂在所有依赖当前商户的读 + 写接口；前端统一 interceptor 发送 + 处理 409（提示并刷新当前商户）。 **豁免**：listMerchants（返回 currentMerchantId 的 re-sync 入口）、switchCurrentMerchant（切换当前商户）、withdrawOnboardingApplication（目标由 path 指定、与当前商户无关）、以及不依赖当前商户的接口。
      schema:
        type: string
        minLength: 1
    PageNum:
      name: pageNum
      in: query
      description: 页码(从 1 计;分页)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      description: 每页记录数(上限可配置;分页默认 20)
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
  responses:
    BadRequest:
      description: 400 业务/校验错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: 409 冲突(幂等键冲突 / 状态冲突 / 标识已占用)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    TooManyRequests:
      description: 429 限流 / 冷却中 / 请求过频(临时锁定走 423 Locked)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Gone:
      description: 410 一次性凭据失效(OTP / 验证链接 过期 / 已使用)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: 401 未认证 / 凭证无效或已撤销
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: 403 无权限(fail-secure,默认拒绝)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Locked:
      description: 423 登录临时锁定(防爆破)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    MerchantBffConflict:
      description: |
        409 冲突。前端据整数 `code` 区分子因——**常见 `208xxx` 商户后台 BFF 业务·资源型**（下列枚举）；**部分 409 另带身份类业务码**（如 `968xxx`：Login ID 占用 / 改邮箱在途等），**具体码以该 op 的 `x-error-codes` 为准**（另有同域 op 专属 `208xxx`，均不在此枚举）： `208001` **stale-tab 守卫 `MERCHANT_CONTEXT_CHANGED`**——**必携 `context.currentMerchantId`** 供前端 re-sync 当前商户； `208002` 资源已有进行中变更请求或已 `PENDING_REVIEW`（重复提交）； `208003` 状态前置不符（非法状态迁移 / 目标已决策）； `208005` 幂等键复用但 payload 不一致。 （`208004` 不适用本 BFF 面、故不在此枚举。） 前端动作：208001 刷新当前商户、208002 提示已存在、208003 重载最新态、208005 排查重复请求。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MerchantBffError'
          examples:
            staleTab:
              summary: stale-tab 守卫命中（code 208001，必携 context.currentMerchantId）
              value:
                code: 208001
                detail: 页面预期商户与会话当前商户不一致，请刷新到当前商户
                context:
                  currentMerchantId: '1000024'
            businessConflict:
              summary: 业务冲突（code 208002，资源已有进行中变更请求 / 已 PENDING_REVIEW；业务·资源型无 context）
              value:
                code: 208002
                detail: 该资源已有进行中的变更请求或已处于待审核状态，请勿重复提交
            idempotencyConflict:
              summary: 幂等键冲突（code 208005，同 Idempotency-Key 复用但请求内容不一致；业务·资源型无 context）
              value:
                code: 208005
                detail: 该幂等键已用于其他请求内容，请核对原请求；如确需发起新的业务操作，再使用新幂等键
