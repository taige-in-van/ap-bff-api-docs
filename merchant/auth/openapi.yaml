openapi: 3.1.0
info:
  title: 商户后台 注册登录与认证 (20-01 / D-MERCH BFF) — 前端契约面
  version: 0.4.8
  contact:
    name: Merchant Portal BFF (D-MERCH owner)
  description: |
    商户后台 React SPA 消费的注册 / 登录 / 会话 / 账户安全 / 团队成员 契约。 本服务是 OAuth2 client：认证 / 凭据 / RBAC / 撤销 经 REST 调 40-06 身份服务， 本服务 OWNS Operator 商户成员 profile + BFF 会话 + 注册校验物。字段类型以本 spec 为准，业务规则见 requirements。 幂等/CSRF 口径:① **创建类**(注册/建成员)与**非天然幂等 / 跨单写者 / 有副作用的写**(如改密〔失效会话〕、改成员〔本地 Operator + 转发 40-06 跨写〕)挂 Idempotency-Key;**真正天然幂等的纯 PUT/DELETE 可不挂**;**认证类(登录/登出/MFA/扫码)与多步 OTP 挑战类(改邮箱/找回)按流程语义不挂幂等键**(每次都应重新认证/校验)。 ② cookieAuth 的非安全方法(POST/PUT/DELETE)一律挂 X-CSRF-Token(double-submit,fail-closed);公开端点(security:[])无会话故无 CSRF。
servers:
  - url: /api/merchant/v1
    description: 商户后台 BFF（经边缘网关；浏览器 ↔ BFF 用会话 cookie）
security:
  - cookieAuth: []
tags:
  - name: registration
    description: 自助注册与邮箱激活：提交注册建 PENDING_VERIFICATION 账号并发验证邮件，确认页主动点击激活；含重发验证邮件。(FR-01)
  - name: session
    description: 登录与会话生命周期：密码登录（MFA 联动）、WeChat 扫码登录、会话校验 / 身份摘要 / 可见菜单、登出。浏览器持 httpOnly 会话 cookie，非安全方法带 X-CSRF-Token。(FR-02/03/05)
  - name: account-security
    description: 账户安全自助：启用 / 禁用 MFA（TOTP）、登录态改密。(FR-06/08)
  - name: my-profile
    description: 个人账号自助（全员）：昵称、登录邮箱变更（身份校验 → 新邮箱 OTP）。(FR-10/15)
  - name: business-profile
    description: 商户联系人资料（Business Profile）：联系人姓名 / 头衔 / 电话，直接生效，owner-only。(FR-13)
  - name: password-reset
    description: 忘记密码自助重置：按已绑因子（TOTP / 邮箱 OTP）校验后重置，恒态反枚举，重置不绕过 MFA。(FR-09)
  - name: team
    description: 团队成员管理：成员新增 / 编辑 / 启停 / 删除、邮箱邀请设密与重发、登录邮箱确认、WeChat 绑定。(FR-07/11/14)
paths:
  /registrations:
    post:
      tags:
        - registration
      operationId: registerOwner
      summary: FR-01 Owner 自助注册（创建 PENDING_VERIFICATION 账号 + 发验证邮件）
      description: |
        BFF 编排：调 40-06 建 unverified identity+credential（409 若 email 被占用），本地建 Operator(PENDING_VERIFICATION)+ 邮件校验物，发 Verify Email 邮件。 两单写者相继、良性中间态、幂等（见 design.md §跨部署服务交互路由 注册标红）。
      security: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
            example:
              email: jane@example.com
              password: Str0ng!Pass
              agreeTerms: true
              firstName: Jane
              lastName: Merchant
              phone: '6045550123'
              businessTitle: Manager
      responses:
        '201':
          description: 已受理；账号 PENDING_VERIFICATION，验证邮件已发
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationAccepted'
              example:
                status: PENDING_VERIFICATION
                maskedEmail: j***@example.com
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
      x-requirement-ids:
        - AUTH-FR-01
  /registrations/verification:
    post:
      tags:
        - registration
      operationId: verifyRegistrationEmail
      summary: FR-01 邮箱激活（确认页主动点击触发的 POST；防扫描器 prefetch）
      description: |
        校验一次性验证 token（**仅在 membership 成功提交时消费;之前各步失败 token 不消费、可用同 token 重试**,避免卡在 PENDING 但 token 已失效）→ 编排激活,**membership 最后提交**:**先**本地事务备 ONB Application(DRAFT) + Merchant Shell + Operator 就绪（此刻仍无 membership → 登录仍 gate）,**成功后**才调 40-06 provisionMember 建 active membership（= 启用登录的提交点 + 消费 token）。 membership 之前任一步失败 → 不返回成功、Operator 仍 PENDING、可重试（AC-11）;membership 成功后才返回 ACTIVE。验证链接的 GET 确认页是前端路由、不激活账号，故不在本 API。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: 一次性邮箱验证 token（单次消费，anti-prefetch）
      responses:
        '200':
          description: 激活成功；账号 ACTIVE，前端按入驻状态路由到 ONB 起点
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          $ref: '#/components/responses/Gone'
      x-requirement-ids:
        - AUTH-FR-01
  /registrations/verification-email:
    post:
      tags:
        - registration
      operationId: resendVerificationEmail
      summary: FR-01 重发验证邮件（冷却内 429；新链接生效旧链接失效）
      description: Resend 仅刷新链接，不重置 24h 清理计时器（计时从注册时刻起算）。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '202':
          description: 已重发（或冷却结束后发新邮件）
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-requirement-ids:
        - AUTH-FR-01
  /invitations/password:
    post:
      tags:
        - team
      operationId: acceptInvitationSetPassword
      summary: FR-14 邮箱邀请员工设密激活（确认页主动提交;INVITED→ACTIVE,邮箱即验证为安全凭据）
      description: |
        员工点邀请链接 → 确认页设密提交。BFF 校验邀请 token + 密码规则 → 本地 Operator `INVITED→ACTIVE`、邮箱标记已验证 → 经 40-06 建凭据(password)+ 建 active membership(membership-last 提交点)+ 发 `operator.activated`。token 单次,设密成功即失效。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
                - confirmPassword
              properties:
                token:
                  type: string
                  description: 一次性邀请 token(anti-prefetch)
                newPassword:
                  type: string
                  format: password
                  description: 新版 5 规则
                confirmPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: 已激活;账号 ACTIVE,前端跳登录页
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          $ref: '#/components/responses/Gone'
      x-requirement-ids:
        - AUTH-FR-14
  /team/login-email-confirmations:
    post:
      tags:
        - team
      operationId: confirmMemberLoginEmail
      summary: FR-11 员工确认 Owner 改的新登录邮箱（点新邮箱确认链接 → 切换生效）
      description: Owner 改 ACTIVE 邮箱格式员工登录邮箱后,新邮箱收确认链接;员工主动确认 → 切换新邮箱 + 旧邮箱收安全通知 + 发 `operator.email_changed`;确认前旧邮箱有效。token 单次,anti-prefetch。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: 一次性新邮箱确认 token(anti-prefetch)
      responses:
        '204':
          description: 登录邮箱已切换为新邮箱
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          $ref: '#/components/responses/Gone'
      x-requirement-ids:
        - AUTH-FR-11
  /sessions:
    post:
      tags:
        - session
      operationId: login
      summary: FR-02 密码登录（邮箱或用户名 + 密码；MFA 联动；签发 BFF 会话）
      description: |
        BFF 调 40-06 认证（clientId = merchant portal,由 BFF 注入、前端不传）。未启 MFA → 建 BFF 会话（set-cookie）。已启 MFA → 返回 MFA_REQUIRED + 短时 mfaChallenge（不建会话）。 PENDING_VERIFICATION（自助注册待验）/ INVITED（邮箱员工待设密,前端提示「请用邀请邮件设密激活」）→ 无 active membership 不签发会话;锁定 423;商户 suspended / 账号禁用 403。防爆破计数归 40-06（FR-04 / INV-14）。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              loginId: jane@example.com
              password: Str0ng!Pass
              rememberMe: false
      responses:
        '200':
          description: 登录结果（ESTABLISHED 时已 set-cookie；MFA_REQUIRED / PENDING_VERIFICATION 为中间态）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'
              examples:
                established:
                  summary: 成功（无 MFA，已 set-cookie）
                  value:
                    status: ESTABLISHED
                mfaRequired:
                  summary: 需 MFA（返回挑战句柄，未建会话）
                  value:
                    status: MFA_REQUIRED
                    mfaChallenge: chl_9f2a4c7e1b
                pendingVerification:
                  summary: 失败（账号待验证，无 active membership 不签发）
                  value:
                    status: PENDING_VERIFICATION
                    maskedEmail: j***@example.com
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-requirement-ids:
        - AUTH-FR-02
        - AUTH-FR-04
  /sessions/mfa:
    post:
      tags:
        - session
      operationId: completeMfaChallenge
      summary: FR-02/06 登录二次校验（提交 TOTP，通过则签发 BFF 会话）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mfaChallenge
                - code
              properties:
                mfaChallenge:
                  type: string
                  description: login 返回的短时挑战句柄（绑定待认证 identity）
                code:
                  type: string
      responses:
        '200':
          description: 校验通过，已 set-cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-requirement-ids:
        - AUTH-FR-02
        - AUTH-FR-04
        - AUTH-FR-06
  /sessions/wechat:
    post:
      tags:
        - session
      operationId: initiateWechatLogin
      summary: FR-03 WeChat 扫码登录 — 发起（返回二维码票据；轮询见 GET）
      description: 二维码默认 5 分钟有效（可配置），超时前端轮询拿到过期态后自动刷新继续等待。
      security: []
      responses:
        '200':
          description: 二维码票据
          content:
            application/json:
              schema:
                type: object
                required:
                  - qrTicket
                  - expiresAt
                properties:
                  qrTicket:
                    type: string
                  qrContent:
                    type: string
                    description: 二维码内容 / 图片 URL（前端渲染）
                  expiresAt:
                    $ref: '#/components/schemas/Timestamp'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-requirement-ids:
        - AUTH-FR-03
  /sessions/wechat/{qrTicket}:
    get:
      tags:
        - session
      operationId: pollWechatLogin
      summary: FR-03 WeChat 扫码登录 — 轮询（确认成功则签发 BFF 会话）
      description: |
        被动等待「已绑定用户在微信内确认」。未绑定 / 未扫 / 未确认对前端表现一致（WAITING）。 ESTABLISHED 时已 set-cookie（会话有效期按未勾 Remember Me）；账号禁用 / 商户 suspended → REJECTED + reason。扫码登录不追加 MFA。 **轮询契约：非法 / 过期 / 未知票据亦返回 200 + status（不用 4xx 表达票据态）——有意为之**，避免票据存在性枚举；非法 / 过期票据归一为 EXPIRED，与「未扫」WAITING 反枚举一致。
      security: []
      parameters:
        - name: qrTicket
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 轮询结果
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - WAITING
                      - EXPIRED
                      - ESTABLISHED
                      - REJECTED
                      - CANCELLED
                    readOnly: true
                    description: 服务端裁决的轮询态（可扩展枚举；消费方按 unknown-safe 处理：遇未知值视同 WAITING 继续轮询、不崩）
                  reason:
                    type: string
                    readOnly: true
                    description: REJECTED 时的业务原因（账号已禁用 / 商户状态异常）
      x-requirement-ids:
        - AUTH-FR-03
  /sessions/current:
    get:
      tags:
        - session
      operationId: getCurrentSession
      summary: FR-05 会话校验 + 身份摘要 + 可见菜单树 + 落地页（BFF 聚合 40-06 /me）
      description: 受保护请求的会话校验入口；BFF 聚合 40-06 CON-03 /me（撤销感知）+ 本地 Operator 展示字段。无效 → 401 前端跳登录页。
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionContext'
              example:
                operatorId: op_7a1c9
                displayName: Jane Merchant
                isOwner: true
                merchantId: M10023
                roles:
                  - OWNER
                landingPage: /dashboard
                menus:
                  - resourceId: dashboard
                    type: menu
                    label: Dashboard
                    path: /dashboard
                  - resourceId: settings
                    type: menu
                    label: Settings
                    path: /settings
                    children:
                      - resourceId: settings.users
                        type: menu
                        label: Users
                        path: /settings/users
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-requirement-ids:
        - AUTH-FR-05
    delete:
      tags:
        - session
      operationId: logout
      summary: FR-05 登出（撤销当前 BFF 会话 + 触发 40-06 撤销当前会话）
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: 已登出（cookie 已清除）
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-requirement-ids:
        - AUTH-FR-05
  /account/security:
    get:
      tags:
        - account-security
      operationId: getAccountSecurity
      summary: FR-06 账户安全状态（Security Level + MFA 状态，派生展示）
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - securityLevel
                  - mfaStatus
                properties:
                  securityLevel:
                    type: string
                    enum:
                      - Low
                      - Medium
                      - Strong
                    description: 派生：密码合规 + MFA 状态（不引入独立账号状态、不决定权限）
                  mfaStatus:
                    type: string
                    enum:
                      - DISABLED
                      - MFA_PENDING
                      - ENABLED
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-requirement-ids:
        - AUTH-FR-06
  /account/security/mfa:
    post:
      tags:
        - account-security
      operationId: enrollMfa
      summary: FR-06 启用 MFA — 发起（输当前密码 → 返回 provisioning，待 activation）
      description: BFF 转发 40-06 enrollMfa（凭据写单写者 = 40-06）；当前密码错 → 401，不计 FR-04。
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
              properties:
                currentPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: provisioning（otpauth URI），待 activation
          content:
            application/json:
              schema:
                type: object
                properties:
                  otpauthUri:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-requirement-ids:
        - AUTH-FR-06
  /account/security/mfa/activation:
    post:
      tags:
        - account-security
      operationId: activateMfa
      summary: FR-06 启用 MFA — 确认（输 TOTP 激活，状态 → ENABLED）
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '204':
          description: 已激活（MFA_PENDING → ENABLED）
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-requirement-ids:
        - AUTH-FR-06
  /account/security/mfa/deactivation:
    post:
      tags:
        - account-security
      operationId: disableMfa
      summary: FR-06 禁用 MFA（输 TOTP 验证，状态 → DISABLED）
      description: BFF 转发 40-06 resetMfa；`code` 作为 `currentTotpCode` step-up 凭据（关 MFA = 降级，须 step-up）；TOTP 错保持 ENABLED、不计 FR-04。
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '204':
          description: 已禁用（ENABLED → DISABLED）
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-requirement-ids:
        - AUTH-FR-06
  /account/security/password:
    put:
      tags:
        - account-security
      operationId: changeOwnPassword
      summary: FR-08 登录态改密（Owner + 员工统一用旧密码；其他会话失效、当前保留）
      description: BFF 转发 40-06 changePassword（单写者 = 40-06）。**统一用旧密码校验,不接受 TOTP / 邮箱 OTP 替代**（v0.45）;旧密码错 → 401,不计 FR-04;忘记旧密码 → 前端「Forgot your password?」路由 FR-09 自助重置。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
                - confirmPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                confirmPassword:
                  type: string
                  format: password
      responses:
        '204':
          description: 改密成功（其他会话已失效，当前会话保留）
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-requirement-ids:
        - AUTH-FR-08
  /account/login-email/change:
    post:
      tags:
        - my-profile
      operationId: initiateLoginEmailChange
      summary: FR-10/FR-15 自助改登录邮箱 — 发起（返回身份校验方式：MFA→TOTP / 无 MFA→旧邮箱 OTP）
      description: |
        邮箱格式账号自助改登录邮箱。严格两步验证:MFA 已启 → TOTP;未启 → 旧邮箱 OTP;通过后再发新邮箱 OTP。 **Owner = FR-10**(同步商户主联系邮箱 + FR-12 非本人救济),**员工 = FR-15**(仅个人登录邮箱、不同步);用户名格式 → 403。返回 challengeId 串起后续步骤。
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: 改邮箱挑战
          content:
            application/json:
              schema:
                type: object
                required:
                  - challengeId
                  - identityVerification
                properties:
                  challengeId:
                    type: string
                  identityVerification:
                    type: string
                    enum:
                      - MFA_TOTP
