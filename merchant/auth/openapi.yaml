  /password-reset/request:
    post:
      tags:
        - password-reset
      operationId: requestPasswordReset
      summary: FR-09 商户用户自助重置 — 发起（**恒 202 反枚举**;因子由服务端判定,不在响应泄露）
      description: |
        BFF 透传 40-06（clientId = merchant portal,由 BFF 注入,前端只传 loginId）。**恒返 202、不在响应体暴露因子/账号存在性**(FR-09-AC-01)。服务端按可用因子处理:已绑 MFA → 后续要 TOTP(不发邮箱 OTP,闭合 MFA 降级);未绑 MFA 的邮箱格式 → 发邮箱 OTP;用户名格式+无 TOTP → 不发(联系 Owner)。 可从无会话(登录页)或登录态(My Profile,FR-15)发起;用户名格式「联系 Owner」提示由前端按 loginId 格式通用展示(不依赖账号存在性)。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - loginId
              properties:
                loginId:
                  type: string
            example:
              loginId: jane@example.com
      responses:
        '202':
          description: 已受理(反枚举,不暴露账号是否存在 / 因子)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetChallenge'
              example:
                challengeId: pwr_4e1a8c9b2d
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-requirement-ids:
        - AUTH-FR-09
        - AUTH-FR-11
  /password-reset/factor-verification:
    post:
      tags:
        - password-reset
      operationId: verifyPasswordResetFactor
      summary: FR-09 自助重置 — 因子验证（邮箱 OTP / TOTP → resetToken）
      description: |
        BFF 透传 40-06 factor-verification。challengeId 不泄露账号存在性；因子错误 / 过期 → `410`、锁定 → `423`、限流 → `429`（共享错误模型）。`400` = BFF 入参校验失败（如缺字段），非 40-06 透传。验证成功才签发单次 resetToken,供 /password-reset/confirmation 设置新密码。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - challengeId
                - code
              properties:
                challengeId:
                  type: string
                code:
                  type: string
                  description: 邮箱 OTP 或 TOTP code
      responses:
        '200':
          description: 因子验证通过，返回单次 resetToken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetFactorVerified'
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          $ref: '#/components/responses/Gone'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-requirement-ids:
        - AUTH-FR-09
  /password-reset/confirmation:
    post:
      tags:
        - password-reset
      operationId: confirmPasswordReset
      summary: FR-09 自助重置 — 确认（因子 + 新密码 → 全会话失效;**MfaBinding 不变、不绕过 MFA**;不签发新会话）
      description: '**重置只改密码、不修改 MfaBinding**——下次登录仍强制 TOTP(闭合 MFA 降级)。'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - resetToken
                - newPassword
              properties:
                resetToken:
                  type: string
                  minLength: 20
                  description: 邮箱 OTP / TOTP 因子验证后的高熵单次 token
                newPassword:
                  type: string
                  format: password
      responses:
        '204':
          description: 重置成功（该用户全平台会话已失效;MfaBinding 不变;前端回登录页）
        '400':
          $ref: '#/components/responses/BadRequest'
        '410':
          $ref: '#/components/responses/Gone'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      x-requirement-ids:
        - AUTH-FR-09
