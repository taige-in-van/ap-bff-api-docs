      description: |
        BFF 按字段归属拆单写者:**Nick Name → AUTH 本地 Operator**;**Role → 40-06 setMembershipRoles**;**newPassword → 40-06 adminResetMemberPassword**(失效该员工全部会话);**用户名(loginId 不含 @) → 40-06 changeMemberLoginId 直接生效**(非安全凭据,无需控制权验证)。 **ACTIVE 邮箱格式员工改登录邮箱**:Owner 无需额外自证,但**不直接生效**——校验新邮箱格式/唯一(含 pending 占用)后向**新邮箱发确认链接**(`operator.email_change_pending`),确认前旧邮箱仍有效、pending 新邮箱不可登录/不可 Forgot;员工经 `/team/login-email-confirmations` 确认后切换(任何成为生效凭据的登录邮箱都经控制权验证)。`INVITED` 员工改邮箱 → 重发邀请。 Owner row：仅 Nick Name 可改、Role 不可改、不经此重置 Owner 密码(改密 FR-08、改邮箱 FR-10)。改 loginId/Role 不失效会话(session 绑 identity)；填 newPassword → 该员工全会话失效。
