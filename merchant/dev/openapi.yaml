openapi: 3.1.0
info:
  title: 商户后台 开发者 (20-09 BFF) — 前端契约面
  version: 0.1.1
  contact:
    name: 商户后台 BFF
  description: |
    开发者前端契约：API 凭据区（Merchant Code 明文 + Gateway Credential 默认脱敏 / 按需授权 reveal 完整值 / 复制）+ 集成参数区（Gateway URL + Verification Type=RSA2 只读）+ 签名密钥区（商户 RSA2 公钥登记 / 替换 / 查看 / 复制 + 平台公钥查看 / 复制）。 merchant scope 从会话取、不信请求体；全部 op merchant-current-scoped，均挂 MerchantContextGuard（stale-tab 守卫，无豁免）。 **全部端点前置 `Merchant.status = ACTIVE` 门禁**（非 ACTIVE → 403；开发者页 = Settings 下仅已激活商户可达，API 凭据在激活后签发）。 字段类型以本 spec 为准。
servers:
  - url: /api/merchant/v1
    description: 商户后台 BFF（浏览器经边缘网关 merchant.* 可达；cookieAuth 会话 + CSRF）
security:
  - cookieAuth: []
tags:
  - name: credentials
    description: API 凭据：Merchant Code + Gateway Credential（默认脱敏 / 授权 reveal 完整值）+ 集成参数（Gateway URL + Verification Type）。
  - name: signing-keys
    description: 签名密钥：商户 RSA2 公钥登记 / 替换（触发轮换宽限期）+ 平台公钥（只读）。
paths:
  /developer/overview:
    get:
      tags:
        - credentials
      operationId: getDeveloperOverview
      summary: 读开发者页聚合（凭据 + 集成参数 + 签名密钥态 + 平台公钥）
      description: |
        返回当前商户开发者页聚合：Merchant Code（明文公开标识）、Gateway Credential **默认脱敏** （末 4 位；展示**不触发**访问审计；未签发 / 已吊销 → status=unavailable）、 Gateway URL + Verification Type=RSA2（只读集成参数）、商户签名公钥态（registered 携公钥 PEM + keyVersion，或 unset）、 平台公钥（current PEM + keyVersion；未发布 → null）。 **完整 Gateway Credential 不在本聚合返回**——按需走 revealGatewayCredential（受审计）。 Merchant Code / 平台公钥 / 已登记的商户公钥均非秘密、直接明文返回供 Copy。 **聚合任一来源加载失败 → 整体 500、绝不返回部分凭据**（前端据此走占位 / 错误态）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: 开发者页聚合
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeveloperOverview'
              example:
                merchantCode: ZZZ1
                gatewayCredential:
                  status: available
                  masked: ••••4821
                gatewayUrl: https://gateway.example.com/api
                verificationType: RSA2
                merchantSigningKey:
                  status: registered
                  keyVersion: 2
                  publicKeyPem: |-
                    -----BEGIN PUBLIC KEY-----
                    MIIBIjANBg...
                    -----END PUBLIC KEY-----
                platformPublicKey:
                  keyVersion: 1
                  publicKeyPem: |-
                    -----BEGIN PUBLIC KEY-----
                    MFwwDQYJ...
                    -----END PUBLIC KEY-----
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
      x-error-codes:
        '409':
          - 208001
  /developer/gateway-credential/disclosures:
    post:
      tags:
        - credentials
      operationId: revealGatewayCredential
      summary: 授权披露 Gateway Credential 完整值（reveal / copy；受审计）
      description: |
        按需返回当前商户 Gateway Credential **完整明文**（仅当前有效值；历史 / 上一版本值不返回）——**受审计**。 **每次披露均记录访问审计**（accessType=reveal|copy）——**copy 亦经本端点**（避免「已显示明文后再在客户端 copy」的审计盲区）。 **先记录访问审计、成功才返完整值**；审计写入失败 → **500 不披露**（fail-closed）。 响应 `Cache-Control: no-store`；完整值全链路禁记录（不进日志 / trace / 缓存）。 credential 未签发 / 已吊销 → 409 208014（无明文；overview 已标 unavailable，此为竞态兜底）； 凭据服务暂不可用 → 502/504（fail-closed，不返回部分值）。 非幂等（每次披露刻意各自留痕），不挂幂等键。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - accessType
              properties:
                accessType:
                  type: string
                  enum:
                    - reveal
                    - copy
                  description: 访问意图（查看完整值 / 复制完整值）——仅供审计区分，二者均返回完整明文
            example:
              accessType: reveal
      responses:
        '200':
          description: 完整 Gateway Credential（已审计；no-store）
          headers:
            Cache-Control:
              description: 恒 no-store（秘密不缓存）
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GatewayCredentialDisclosure'
              example:
                gatewayCredential: gw_live_8f2a1c9e4821
                accessType: reveal
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '409':
          - 208001
          - 208014
  /developer/signing-key:
    put:
      tags:
        - signing-keys
      operationId: replaceMerchantSigningKey
      summary: 登记 / 替换商户签名公钥（RSA2 PEM；替换即触发轮换宽限期）
      description: |
        登记或替换当前商户的 RSA2 签名公钥（PEM）——供开放 API 验证商户**入站**请求签名。**登记 = 替换** （覆盖当前唯一一把公钥）。**并发 / 幂等（判定顺序）**：① 提交的公钥**与当前公钥相同** → **幂等 no-op 成功**（不新 `keyVersion` / 不重启轮换宽限期 / 不重复审计，与 `expectedKeyVersion` 无关）；② **与当前公钥不同** → 按 `expectedKeyVersion` 版本校验：与当前版本一致才替换（生成新公钥），不一致（旧页 / 他人已改）→ **409 208004**、前端重载重试。**相同公钥重复提交在效果上幂等；不同公钥替换对提交顺序敏感。** 服务端先校验可解析为 RSA2 公钥（空 / 非 PEM / 非 RSA2 → 400 204011， 直接拒绝、不产生任何变更）；合法 → 替换生效并 **触发轮换宽限期**（新旧公钥并验、宽限期后仅新钥），并留密钥变更审计。 **活跃轮换宽限期内不接受再次替换**（上次替换的旧钥仍在宽限期内 → **409 208015**、须待宽限结束；当前公钥与宽限期不受影响；应急强制轮换由平台侧处理、不在本端点）。 **判定顺序**：与当前公钥相同 → no-op；不同 → 先版本校验（不一致 → 208004）→ 通过后再判活跃宽限期（活跃 → 208015，否则替换）。 本端点只管商户自有公钥（非秘密、可回显）；不提供清除 / 解绑。 **不挂幂等键、客户端不应盲目自动重试**：对较旧的不同公钥盲目重试会覆盖较新公钥，由 `expectedKeyVersion` 版本前置校验拦截（不一致 → **409 208004**），失败应由用户重新发起。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - publicKeyPem
                - expectedKeyVersion
              properties:
                publicKeyPem:
                  type: string
                  minLength: 1
                  description: 商户 RSA2 公钥（PEM；服务端校验可解析）
                expectedKeyVersion:
                  type:
                    - integer
                    - 'null'
                  minimum: 1
                  description: |
                    乐观并发前置（防旧页 / 多操作员覆盖）：用户提交时所见基线——**null = 首次登记（期望当前未登记）**、 **N = 替换（期望当前 keyVersion = N）**。与当前公钥版本不符（已被他人登记 / 替换）→ 409 208004、 前端重载最新公钥态后再试。
            example:
              publicKeyPem: |-
                -----BEGIN PUBLIC KEY-----
                MIIBIjANBg...
                -----END PUBLIC KEY-----
              expectedKeyVersion: 2
      responses:
        '200':
          description: 已登记 / 替换（返回当前公钥态）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantSigningKeyRegistered'
              example:
                status: registered
                keyVersion: 3
                publicKeyPem: |-
                  -----BEGIN PUBLIC KEY-----
                  MIIBIjANBg...
                  -----END PUBLIC KEY-----
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '400':
          - 204011
        '409':
          - 208001
          - 208004
          - 208015
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-msession
      description: |
        商户后台 BFF 服务端会话 cookie（httpOnly / secure / SameSite；`__Host-` 前缀强制 Secure + Path=/ + 无 Domain，杜绝子域注入）。 浏览器只持此会话 cookie、不持后端 token。会话裁决商户 scope（当前商户从会话取、不信请求体）。 写接口（非安全方法）另需 CSRF 防护（X-CSRF-Token）；商户级读写另挂 MerchantContextGuard 守卫（见下方 parameters）。
  schemas:
    DeveloperOverview:
      type: object
      additionalProperties: false
      required:
        - merchantCode
        - gatewayCredential
        - gatewayUrl
        - verificationType
        - merchantSigningKey
        - platformPublicKey
      properties:
        merchantCode:
          type: string
          minLength: 1
          description: 商户公开身份标识（Merchant Code；明文、可 Copy）
        gatewayCredential:
          $ref: '#/components/schemas/GatewayCredentialMasked'
        gatewayUrl:
          type:
            - string
            - 'null'
          format: uri
          description: 适用当前商户接入环境的网关基址（平台配置、只读；未配置 → null，前端占位态）
        verificationType:
          type: string
          const: RSA2
          description: 签名验证类型（只读；封闭常量，变更属破坏性、走并行版本）
        merchantSigningKey:
          $ref: '#/components/schemas/MerchantSigningKeyState'
        platformPublicKey:
          description: 平台公钥（current；供商户验出站回调 / 响应签名；未发布 → null）
          oneOf:
            - $ref: '#/components/schemas/PlatformPublicKey'
            - type: 'null'
    GatewayCredentialMasked:
      description: |
        Gateway Credential 脱敏态（默认展示；完整值走 revealGatewayCredential）。按 status 判别机器约束： **available 必携 masked、unavailable 无 masked**（封闭枚举；新增取值属破坏性、走并行版本）。
      oneOf:
        - $ref: '#/components/schemas/GatewayCredentialAvailable'
        - $ref: '#/components/schemas/GatewayCredentialUnavailable'
      discriminator:
        propertyName: status
        mapping:
          available: '#/components/schemas/GatewayCredentialAvailable'
          unavailable: '#/components/schemas/GatewayCredentialUnavailable'
    GatewayCredentialAvailable:
      type: object
      additionalProperties: false
      required:
        - status
        - masked
      properties:
        status:
          type: string
          const: available
        masked:
          type: string
          minLength: 1
          description: 脱敏串（如 `••••4821`、末 4 位）——非秘密显示提示、展示不触发审计（available 必非空）
    GatewayCredentialUnavailable:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          const: unavailable
          description: 未签发 / 已吊销（无脱敏值、reveal 不可用）
    GatewayCredentialDisclosure:
      type: object
      additionalProperties: false
      required:
        - gatewayCredential
        - accessType
      properties:
        gatewayCredential:
          type: string
          minLength: 1
          description: Gateway Credential 完整明文（current；受审计返回、no-store、全链路禁记录）
        accessType:
          type: string
          enum:
            - reveal
            - copy
          description: 本次披露意图（回显请求值）
    MerchantSigningKeyState:
      description: 商户签名公钥态（registered 携公钥 PEM + keyVersion；unset 未登记）。
      oneOf:
        - $ref: '#/components/schemas/MerchantSigningKeyRegistered'
        - $ref: '#/components/schemas/MerchantSigningKeyUnset'
      discriminator:
        propertyName: status
        mapping:
          registered: '#/components/schemas/MerchantSigningKeyRegistered'
          unset: '#/components/schemas/MerchantSigningKeyUnset'
    MerchantSigningKeyRegistered:
      type: object
      additionalProperties: false
      required:
        - status
        - keyVersion
        - publicKeyPem
      properties:
        status:
          type: string
          const: registered
        keyVersion:
          type: integer
          minimum: 1
          description: 当前公钥版本（每次替换递增；轮换宽限期语义见 replaceMerchantSigningKey）
        publicKeyPem:
          type: string
          minLength: 1
          description: 商户当前 RSA2 公钥 PEM（非秘密、可查看 / 复制）
    MerchantSigningKeyUnset:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          const: unset
          description: 未登记（引导登记；无回到未登记的转换——不提供清除 / 解绑）
    PlatformPublicKey:
      type: object
      additionalProperties: false
      required:
        - keyVersion
        - publicKeyPem
      properties:
        keyVersion:
          type: integer
          minimum: 1
          description: 当前 平台公钥版本
        publicKeyPem:
          type: string
          minLength: 1
          description: 平台公钥 PEM（只读、可复制）
    ErrorEnvelope:
      type: object
      description: 统一错误返回(错误响应体:结构化整数 code + detail + 可选 links;扩展 traceId/details)。
      required:
        - code
        - detail
      properties:
        code:
          type: integer
          description: 结构化整数错误码(能力域段 + 责任方类别 + 域内末段;可解析责任方+来源域,与 HTTP 状态正交)。
        detail:
          type: string
          description: 错误描述(面向调用方;本地化按 locale)。
        links:
          type: object
          description: 可选:错误说明 / 后续恢复操作链接。
          additionalProperties:
            type: string
        traceId:
          type: string
          description: 可选:关联 id,串联日志 / 分布式 trace(可观测)。
        details:
          type: array
          description: 可选:字段级校验错误。
          items:
            type: object
            required:
              - field
              - issue
            properties:
              field:
                type: string
              issue:
                type: string
    MerchantBffError:
      description: 商户后台 BFF 错误体 = ErrorEnvelope + 可选 context（错误专属结构化上下文，非字段校验 details）。
      allOf:
        - $ref: '#/components/schemas/ErrorEnvelope'
        - type: object
          properties:
            context:
              type: object
              description: 错误专属结构化上下文（非 details 字段校验数组）。MERCHANT_CONTEXT_CHANGED 时携 currentMerchantId 供前端 re-sync。
              properties:
                currentMerchantId:
                  type:
                    - string
                    - 'null'
                  description: 服务端会话当前商户（≠ 请求携带的 expected X-Merchant-Context）；**null = 无当前商户**（前端须重选）。**契约不变量**：code=208001 时本字段必 **present**（值可为 null）。
                attemptsRemaining:
                  type: integer
                  minimum: 0
                  description: OTP / 挑战错误但可重试时的剩余尝试次数（错误可重试 400 携带；**整数类型、走 context 结构化上下文**，非塞进 `details.issue` 字符串——`details` 只做请求字段级校验红框）。
                cooldownSeconds:
                  type: integer
                  minimum: 0
                  description: OTP / 挑战 Resend 冷却剩余秒数（冷却 429 携带；**整数类型、走 context 结构化上下文**——权威值、覆盖刷新 / 跨标签页，前端据此本地倒计时）。
  parameters:
    MerchantContextGuard:
      name: X-Merchant-Context
      in: header
      required: true
      description: |
        stale-tab 一致性守卫（读写统一）：页面预期的当前商户 ID。与会话当前商户比对，一致才执行； **不一致 → 409 `MerchantBffConflict`**（`code` `208001`、`MERCHANT_CONTEXT_CHANGED`）——**读不返回错商户数据、写不执行**，响应 `context.currentMerchantId` 回显服务端当前商户供前端直接 re-sync。 挂在所有依赖当前商户的读 + 写接口；前端统一 interceptor 发送 + 处理 409（提示并刷新当前商户）。 **豁免**：listMerchants（返回 currentMerchantId 的 re-sync 入口）、switchCurrentMerchant（切换当前商户）、withdrawOnboardingApplication（目标由 path 指定、与当前商户无关）、以及不依赖当前商户的接口。
      schema:
        type: string
        minLength: 1
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: CSRF 令牌(double-submit;cookie 会话鉴权的非安全方法[POST/PUT/PATCH/DELETE]必带;缺失/不匹配 → 403 fail-closed)
      schema:
        type: string
        minLength: 1
        pattern: \S
  responses:
    Unauthorized:
      description: 401 未认证 / 凭证无效或已撤销
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: 403 无权限(fail-secure,默认拒绝)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    MerchantBffConflict:
      description: |
        409 冲突。前端据整数 `code` 区分子因——**常见 `208xxx` 商户后台 BFF 业务·资源型**（下列枚举）；**部分 409 另带身份类业务码**（如 `968xxx`：Login ID 占用 / 改邮箱在途等），**具体码以该 op 的 `x-error-codes` 为准**（另有同域 op 专属 `208xxx`，均不在此枚举）： `208001` **stale-tab 守卫 `MERCHANT_CONTEXT_CHANGED`**——**必携 `context.currentMerchantId`** 供前端 re-sync 当前商户； `208002` 资源已有进行中变更请求或已 `PENDING_REVIEW`（重复提交）； `208003` 状态前置不符（非法状态迁移 / 目标已决策）； `208005` 幂等键复用但 payload 不一致。 （`208004` 乐观锁基线漂移为 op 专属〔如签名公钥 `expectedKeyVersion` 版本校验〕，见该 op `x-error-codes`、不在此通用枚举。） 前端动作：208001 刷新当前商户、208002 提示已存在、208003 重载最新态、208005 排查重复请求。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MerchantBffError'
          examples:
            staleTab:
              summary: stale-tab 守卫命中（code 208001，必携 context.currentMerchantId）
              value:
                code: 208001
                detail: 页面预期商户与会话当前商户不一致，请刷新到当前商户
                context:
                  currentMerchantId: '1000024'
            businessConflict:
              summary: 业务冲突（code 208002，资源已有进行中变更请求 / 已 PENDING_REVIEW；业务·资源型无 context）
              value:
                code: 208002
                detail: 该资源已有进行中的变更请求或已处于待审核状态，请勿重复提交
            idempotencyConflict:
              summary: 幂等键冲突（code 208005，同 Idempotency-Key 复用但请求内容不一致；业务·资源型无 context）
              value:
                code: 208005
                detail: 该幂等键已用于其他请求内容，请核对原请求；如确需发起新的业务操作，再使用新幂等键
    InternalServerError:
      description: 500 服务端内部错误(可重试)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    BadRequest:
