openapi: 3.1.0
info:
  title: 商户后台 商户实体 (20-03 BFF) — 前端契约面
  version: 0.4.16
  contact:
    name: 商户后台 BFF
  description: |
    商户后台 React SPA 消费的商户主体资料 / 结算 / Refund PIN / 多商户 / Service Page / 集成 契约。 覆盖 Merchant 主体资料 + BusinessProfile + Refund PIN 凭据 + 结算事前审批 + Service Page 2 层模型（AcceptanceMode / PaymentMethod）。 字段类型以本 spec 为准。 幂等/CSRF 口径:① **创建类 + 非天然幂等写**（Add Merchant / Connect AcceptanceMode / Connect Ecommerce / 创建结算变更请求 / 改 Refund PIN / Forgot PIN 重置 / 改 URL 触发重审）挂 Idempotency-Key——无自然业务单号，或重放不自洽（当前 PIN 已消费、撞待审核请求 → 409），retry 用同键返**首次结果**;
      **天然幂等的纯 PUT/DELETE**（改 Business Information / 切当前商户 / 启停 PaymentMethod / Terminal 连接·停用 / Logo）可不挂幂等键;
      **OTP 多步挑战**按流程语义每次重新校验。
    ② 非安全方法（POST/PUT/PATCH/DELETE）一律挂 X-CSRF-Token（double-submit，fail-closed）。 ③ **当前商户上下文守卫（读写统一）**：会话当前商户 = 数据可见范围**唯一权威**、不信请求体（`switchCurrentMerchant` 切换更新会话）；目标商户不在可访问集 → 404 反枚举。**所有当前商户相关读 + 写**携带页面预期 `X-Merchant-Context`（`MerchantContextGuard` header param；expected 商户 ID，**仅与会话当前商户比对、非选择器**）——一致才执行；**≠ 会话当前商户 → 409 `MerchantBffConflict`**（语义名 `MERCHANT_CONTEXT_CHANGED`、整数 code；读不返回错商户、写不执行；`context.currentMerchantId` 回显）。前端统一 interceptor 发送 + 处理 409（提示 + 刷新当前商户）。**豁免** listMerchants / switchCurrentMerchant / withdrawOnboardingApplication（按 path 选目标、target≠current）/ 全局接口。 ④ **Idempotency-Key 语义**：retry 用同一 key 返回**首次结果**（retry-safe），区别于 OTP token 的一次性消费（消费后不可重取首次结果）。 ⑤ **OTP 错误分类**（OTP verify 端点 verifySettlementOtp；共享 `OtpRetryableBadRequest`）：错误但可重试 → 400 `204010`（剩余尝试数走 **`context.attemptsRemaining`** 整数类型，`details` 只做请求字段校验红框、不承载剩余次数）;尝试超限锁定 → 423;过期 / 已消费 → 410;Resend 冷却 → 429。
servers:
  - url: /api/merchant/v1
    description: 商户后台 BFF（经边缘网关；浏览器 ↔ BFF 用会话 cookie）
security:
  - cookieAuth: []
tags:
  - name: profile
    description: BusinessProfile 概览与编辑：Profile 聚合（Header card + 4 section + 资金只读 + Locked 标识）、Business Information 7 可编辑字段直接生效、Logo 上传/移除。Locked 字段服务端强制（绕过 → 403）。
  - name: settlement
    description: 结算字段事前审批：当前结算（account_number 掩码 + PENDING_REVIEW 标识）、Void cheque 上传、Owner email OTP（发/校验）、创建变更请求（创建 PENDING_REVIEW、旧值生效、单 Merchant 至多 1 个并发护栏）。
  - name: refund-pin
    description: Refund PIN 凭据：登录态改 PIN（current + new + confirm，不需 OTP）、Forgot PIN 自助重置（OTP 邮件单步）。OTP 一次性（过期/已用 → 410），Resend 冷却（→ 429）。
  - name: merchants
    description: 多商户 lifecycle 与切换：switcher 列表（仅 ACTIVE/INCOMPLETE/PENDING_REVIEW）、Add 关联商户（branch / new_legal_entity，2 层上限）、撤回未激活商户在途入驻、切换当前上下文。
  - name: service-page
    description: Service Page 浏览与管理：AcceptanceMode/PaymentMethod 2 层 + Integrations 摘要（凭据掩码）、PaymentMethod 启停、AcceptanceMode 自助申请（Connect）、online website URL 改（触发重审）。
  - name: integrations
    description: 第三方集成：TerminalIntegration（Moneris/Clover 互斥，即时生效 + 自助停用）、EcommerceIntegration（Shopify/Allvalue review-gated，URL 改重审 / 方式配置改不重审）。凭据掩码摘要。
  - name: documents
    description: Documents 只读展示：入驻上传的文档（5 必传 + 2 可选）；未上传必传项显示缺失占位；无自助上传/替换/删除入口。
paths:
  /account/profile:
    get:
      tags:
        - profile
      operationId: getAccountProfile
      summary: 查看 Profile 概览（Header card + 4 section；聚合 BusinessProfile + Merchant + Contact + 资金）
      description: |
        聚合当前选中 ACTIVE 商户的 Profile 概览：Header card（Logo / Trade Name (DBA) / Legal Business Name / Industry • MCC / Merchant ID） + 4 section（Business Information / Settlement / Contact Information / Documents 摘要）。Locked 字段附 `locked: true` 标识; account_number 掩码仅末 4 位（`•••• 5678`）;资金字段（Account Balance / Refund Reserved）为只读展示（能力归 06）; Contact Information 为只读聚合展示、编辑走 owner-contact 端点。当前商户非 ACTIVE → 409、不返回 Profile（前端按 Merchant 状态分流到入驻向导 / 审核状态页）； 404 仅表示资源不存在 / 不可见，不承载商户状态前置失败。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: OK（5 展示区块聚合）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfile'
              example:
                merchantId: '1000023'
                status: ACTIVE
                header:
                  merchantCode: C3BM68
                  logoUrl: https://cdn.example.com/logo/m10023.png
                  tradeName: Jane's Coffee
                  legalBusinessName: Jane Coffee Inc.
                  industryCategory: Food & Beverage
                  mcc: '5812'
                businessInformation:
                  legalBusinessName:
                    value: Jane Coffee Inc.
                    locked: true
                  tradeName:
                    value: Jane's Coffee
                    locked: true
                  ownershipType:
                    value: Corporation
                    locked: true
                  registrationNumber:
                    value: BC1234567
                    locked: true
                  referredBy:
                    value: Moneris
                    locked: true
                  industryCategory:
                    value: Food & Beverage
                    locked: true
                  mcc:
                    value: '5812'
                    locked: true
                  address: 123 Main St
                  city: Vancouver
                  province: BC
                  postalCode: V6B1A1
                  country: CA
                  timeZone: America/Vancouver
                  businessPhone: '6045550123'
                settlement:
                  legalBusinessName: Jane Coffee Inc.
                  bankName: RBC
                  transitNumber: '12345'
                  institutionNumber: '003'
                  accountNumberMasked: •••• 5678
                  settlementSchedule: T+2 Business Days
                  storeId: STORE-01
                  pendingReview: false
                contactInformation:
                  contactName: Jane Merchant
                  contactTitle: Manager
                  phone: '6045550123'
                  email: jane@example.com
                funds:
                  available: true
                  accountBalance:
                    amount: '1250000'
                    currency: CAD
                  refundReserved:
                    amount: '50000'
                    currency: CAD
                documentsSummary:
                  total: 5
                  missing: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
          - 208003
  /account/profile/business-information:
    put:
      tags:
        - profile
      operationId: updateBusinessInformation
      summary: 编辑 Business Information（7 可编辑字段直接生效；Locked 字段 enforce 403）
      description: |
        编辑 ACTIVE 商户 Business Information section 的 7 项可编辑字段（Address / City / Province / Postal Code / Country / Time Zone / Business Phone）， 保存直接生效（无审核）+ 记录审计事件。**任何 7 项 Locked 字段 （Legal Business Name / Trade Name (DBA) / Ownership Type / Registration Number / Referred By / Industry Category / MCC） 出现在请求体即服务端拒绝（403），不持久化、不依赖前端隐藏**。 当前商户非 ACTIVE → 409、不持久化。幂等：纯 PUT、天然幂等（同字段集重复提交结果一致），不挂 Idempotency-Key。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BusinessInformationUpdate'
            example:
              address: 456 Market St
              city: Vancouver
              province: BC
              postalCode: V6B1A1
              country: CA
              timeZone: America/Toronto
              businessPhone: '6045550199'
      responses:
        '204':
          description: 已保存（新值直接生效）
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
          - 208003
  /account/profile/logo:
    post:
      tags:
        - profile
      operationId: uploadLogo
      summary: 上传 / 更换 Logo（multipart；即时生效，无审核）
      description: |
        上传或更换 BusinessProfile Logo（PNG / JPEG，默认 ≤ 512KB 可配置；按文件实际内容判定、拒 SVG）；即时生效 + 记录审计事件。 幂等：纯写资源覆盖、天然幂等，不挂 Idempotency-Key。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Logo 图片（PNG / JPEG，默认 ≤ 512KB 可配置）
      responses:
        '200':
          description: 已上传（返回新 Logo 引用）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoRef'
              example:
                logoUrl: https://cdn.example.com/logo/m10023.png
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
      x-error-codes:
        '409':
          - 208001
    delete:
      tags:
        - profile
      operationId: removeLogo
      summary: 移除 Logo（回退默认首字母标识；即时生效）
      description: 移除 BusinessProfile Logo，Profile 回退展示默认首字母标识 + 记录审计事件。幂等：DELETE 天然幂等（已无 Logo 时仍 204）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: 已移除（回退默认首字母标识）
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /account/settlement:
    get:
      tags:
        - settlement
      operationId: getSettlement
      summary: 查看当前结算字段（account_number 掩码 + PENDING_REVIEW 标识）
      description: |
        返回当前生效结算字段；account_number 仅末 4 位掩码（`•••• 5678`，明文不返回）。 `pendingReview: true` 时表示存在 PENDING_REVIEW 变更请求 → 前端隐藏 Edit 入口、展示审核中提示（同 Merchant 至多 1 个 PENDING_REVIEW）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: OK（当前生效结算字段）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementView'
              example:
                legalBusinessName: Jane Coffee Inc.
                bankName: RBC
                transitNumber: '12345'
                institutionNumber: '003'
                accountNumberMasked: •••• 5678
                settlementSchedule: T+2 Business Days
                storeId: STORE-01
                pendingReview: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /account/settlement/void-cheque:
    post:
      tags:
        - settlement
      operationId: uploadSettlementVoidCheque
      summary: 上传 Void cheque（bank-related 变更第 1 步前置；返回 FileRef）
      description: |
        bank-related 结算字段变更的 Step 1 前置：上传 Void cheque 作银行账户身份证明（PNG / JPEG / PDF，默认 ≤ 2MB 可配置；按文件实际内容判定）。 返回 `voidChequeRef` 供后续创建变更请求引用；上传失败 / 格式不支持 → 400（不进入 Step 2 OTP）。 幂等：每次上传返回独立 ref，按流程语义不挂幂等键。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Void cheque（PNG / JPEG / PDF，默认 ≤ 2MB 可配置）
      responses:
        '200':
          description: 已上传（返回 voidChequeRef）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileRef'
              example:
                fileRef: vc_3f9a2c7e1b
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
      x-error-codes:
        '409':
          - 208001
  /account/settlement/change-requests/otp-challenges:
    post:
      tags:
        - settlement
      operationId: requestSettlementOtp
      summary: 发送结算变更 OTP 到 Owner email（bank 第 2 步 / 非 bank 唯一前置；绑定变更意图）
      description: |
        发送 Owner email OTP（= AUTH Primary Email）作结算变更身份验证， **并把本次变更内容（changes）+ voidChequeRef 绑定到该 OTP 挑战**—— verifySettlementOtp 签发的 otpToken 锚定这次变更意图，createSettlementChangeRequest 提交的 changes 须与之一致（防"用普通变更 OTP 授权银行账户变更"）。 bank-related 变更为 Step 2（Void cheque 之后）、非 bank-related 变更为唯一前置。Resend 冷却中 → 429。 按多步挑战流程语义不挂幂等键（每次发新 OTP，旧 OTP 失效并重新绑定）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - changes
              description: OTP 绑定的变更意图：服务端把 changes 锚定到本次挑战
              properties:
                changes:
                  $ref: '#/components/schemas/SettlementChanges'
                voidChequeRef:
                  type: string
                  description: bank-related 变更：绑定的 Void cheque 引用（须与最终 create 一致）
            example:
              changes:
                bankName: TD
                transitNumber: '54321'
                institutionNumber: '004'
                accountNumber: '12345678'
              voidChequeRef: vc_3f9a2c7e1b
      responses:
        '202':
          description: OTP 已发送（展示脱敏 Owner email）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpChallenge'
              example:
                challengeId: stl_4e1a8c9b2d
                deliveredTo: o***@e***.com
                cooldownSeconds: 60
                expiresAt: '2026-06-22T15:05:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '429':
          $ref: '#/components/responses/TooManyRequestsWithCooldown'
      x-error-codes:
        '409':
          - 208001
        '429':
          - 208013
  /account/settlement/change-requests/otp-challenges/{challengeId}/verification:
    post:
      tags:
        - settlement
      operationId: verifySettlementOtp
      summary: 校验结算变更 OTP（通过则签发锚定变更意图的单次凭据）
      description: |
        校验 Owner email OTP（匹配 + 未过期 + 未消费 + 未超尝试上限）;通过则返回 `otpToken`——**锚定 requestSettlementOtp 绑定的变更内容 + voidChequeRef**。 OTP 错误分类：**错误但可重试 → 400 `204010`（剩余尝试数 `context.attemptsRemaining`、整数类型）;尝试超限锁定 → 423;过期 / 已消费 → 410**（均不签发 otpToken）。OTP 一次性消费。
      parameters:
        - name: challengeId
          in: path
          required: true
          schema:
            type: string
          description: settlement OTP challenge 实例 id
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - code
              properties:
                code:
                  type: string
                  description: Owner email OTP code
            example:
              code: '493028'
      responses:
        '200':
          description: OTP 校验通过（返回单次 otpToken）
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - otpToken
                properties:
                  otpToken:
                    type: string
                    description: 单次 token，提交到 POST /account/settlement/change-requests
              example:
                otpToken: otk_9b3f7a21c8
        '400':
          $ref: '#/components/responses/OtpRetryableBadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '410':
          $ref: '#/components/responses/Gone'
        '423':
          $ref: '#/components/responses/Locked'
      x-error-codes:
        '400':
          - 204010
        '409':
          - 208001
  /account/settlement/change-requests:
    post:
      tags:
        - settlement
      operationId: createSettlementChangeRequest
      summary: 创建结算变更请求（前置全通过 → PENDING_REVIEW；旧值生效；409 若已有 PENDING_REVIEW；403 若意图不符）
      description: |
        前置步骤（bank-related: Void cheque + OTP / 非 bank: OTP）全通过后创建 `SettlementChangeRequest{PENDING_REVIEW}`（含本次变更 + bank-related 时 voidChequeRef）+ 发送结算变更审核中通知 + 旧值仍生效（结算字段不立即变更）。 资损红线：同 Merchant 至多 1 个 PENDING_REVIEW → 已存在则 409（不创建新请求）; **提交 changes ≠ otpToken 绑定的变更内容 → 403**（意图不符，OTP 防串改）; 直接提交绕过前置（缺有效 otpToken / bank 缺 voidChequeRef）→ 400。审核 approve/reject 结果异步更新（不在本 BFF）。 幂等：otpToken 单次消费不可重取首次结果 → 故挂 `Idempotency-Key`：retry 同键返回**首次创建的请求**（响应丢失可安全重试，不重复建请求 / 不要求重走 OTP）。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementChangeRequestInput'
            examples:
              bankRelated:
                summary: bank-related 变更（含 voidChequeRef）
                value:
                  otpToken: otk_9b3f7a21c8
                  voidChequeRef: vc_3f9a2c7e1b
                  changes:
                    bankName: TD
                    transitNumber: '54321'
                    institutionNumber: '004'
                    accountNumber: '12345678'
              nonBank:
                summary: 非 bank-related 变更（仅 storeId / schedule）
                value:
                  otpToken: otk_9b3f7a21c8
                  changes:
                    storeId: STORE-02
                    settlementSchedule: T+1 Business Days
      responses:
        '201':
          description: 已创建 PENDING_REVIEW（旧值仍生效，Edit 入口隐藏）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementChangeRequestCreated'
              example:
                changeRequestId: scr_7a1c9
                status: PENDING_REVIEW
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
          - 208002
          - 208005
  /account/refund-pin:
    put:
      tags:
        - refund-pin
      operationId: setRefundPin
      summary: 设置 Refund PIN（oneOf 授权：旧 PIN 改 / Forgot PIN reset-challenge OTP）
      description: |
        两种授权方式设新 PIN（oneOf 二选一），共同：new == confirm + 记录审计 + 触发 PIN-changed 通知邮件 + 旧 PIN 失效。 ① **改（currentPin 授权）**：校验 current PIN → 写 new PIN（new ≠ current）。current 不匹配 / new == current / 格式非法 → 400。成功后未完成的 Forgot PIN reset challenge 失效。 ② **Forgot 重置（reset-challenge OTP 授权）**：先 POST /account/refund-pin/reset-challenges 发 Owner email OTP，再凭 challengeId + code 授权 → 写 new PIN。OTP 错误可重试 400 / 超限锁定 423 / 过期已消费 410（均不持久化）。本 op 为 PIN 设置端点、OTP 校验内联，400 走通用 `BadRequest`（不承诺结构化剩余次数——区别于纯 OTP verify 端点的 `OtpRetryableBadRequest`）。OTP 一次性消费。 幂等：非天然幂等（授权凭据单次消费、校验后即失效）→ 挂 `Idempotency-Key`、retry 同键返首次结果（204）。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: ChangeByCurrentPin
                  type: object
                  additionalProperties: false
                  required:
                    - currentPin
                    - newPin
                    - confirmPin
                  properties:
                    currentPin:
                      type: string
                      description: 当前 Refund PIN（须匹配）
                    newPin:
                      type: string
                      description: 新 PIN（默认 6 位 0-9 可配；不可与 current 相同）
                    confirmPin:
                      type: string
                      description: 须与 newPin 一致
                - title: ResetByChallenge
                  type: object
                  additionalProperties: false
                  required:
                    - challengeId
                    - code
                    - newPin
                    - confirmPin
                  properties:
                    challengeId:
                      type: string
                      description: reset-challenge 实例 id
                    code:
                      type: string
                      description: Owner email 重置 OTP
                    newPin:
                      type: string
                      description: 新 PIN（默认 6 位 0-9 可配）
                    confirmPin:
                      type: string
                      description: 须与 newPin 一致
            examples:
              change:
                summary: 旧 PIN 授权改
                value:
                  currentPin: '123456'
                  newPin: '654321'
                  confirmPin: '654321'
              reset:
                summary: Forgot PIN reset-challenge OTP 授权
                value:
                  challengeId: rpr_8c4e1d
                  code: '112233'
                  newPin: '654321'
                  confirmPin: '654321'
      responses:
        '204':
          description: 已设置（旧 PIN 失效；currentPin 授权改成功后未完成 reset challenge 失效）
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '410':
          $ref: '#/components/responses/Gone'
        '423':
          $ref: '#/components/responses/Locked'
      x-error-codes:
        '409':
          - 208001
  /account/refund-pin/reset-challenges:
    post:
      tags:
        - refund-pin
      operationId: requestRefundPinResetOtp
      summary: Forgot PIN — 发送重置 OTP 到 Owner email（展示脱敏邮箱 + 启动冷却）
      description: |
        生成 OTP（默认 6 位）发到 Owner email（= AUTH Primary Email；复用通知模块 verification 模板）+ 启动 Resend 冷却（默认 60s 可配）+ 返回脱敏邮箱。 Resend 冷却中 → 429（不发新 OTP）。Forgot PIN 不需 current PIN。按多步挑战流程语义不挂幂等键（每次发新 OTP，旧 OTP 失效）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '202':
          description: 重置 OTP 已发送（展示脱敏 Owner email + 冷却启动）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpChallenge'
              example:
                challengeId: rpr_8c4e1d
                deliveredTo: o***@e***.com
                cooldownSeconds: 60
                expiresAt: '2026-06-24T09:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '429':
          $ref: '#/components/responses/TooManyRequestsWithCooldown'
      x-error-codes:
        '409':
          - 208001
        '429':
          - 208013
  /merchants:
