                    tradeName: Jane's Coffee Downtown
                    status: INCOMPLETE
                    relationType: branch
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-error-codes: {}
    post:
      tags:
        - merchants
      operationId: addMerchant
      summary: 添加关联商户（branch / new_legal_entity；创建 INCOMPLETE + 交 ONB；2 层上限）
      description: |
        **原子创建关联商户（单 D-MERCH 本地事务，Q1）**：Merchant{INCOMPLETE} + MerchantParentLink（branch / new_legal_entity）+ **Application{DRAFT}** 一起建（ONB 与 ME 同服务）→ 杜绝"有 Merchant 无 Application"窗口、保证 `Merchant.status` 自创建即由 `Application.status` 派生 + 返回 merchantId。 **仅创建、不切会话**（单一职责）：前端拿到 merchantId 后**显式调 switchCurrentMerchant 切上下文**（幂等），再 GET /onboarding/application **加载**（非"准备"）已建 DRAFT 续走向导。 字段预填 / 5 步规则归 ONB-FR-07（本域不重复维护）。 2 层上限：当前商户已是 child（depth=2）→ 409（不创建，FR-10-AC-04）;Country × Currency 组合非法 → 400（FR-10 边界）。 幂等：创建类、挂 Idempotency-Key（无自然业务单号，防重复点击重复建商户）。
      parameters:
