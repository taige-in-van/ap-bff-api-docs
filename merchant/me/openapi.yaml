  /merchants/{merchantId}/application:
    delete:
      tags:
        - merchants
      operationId: withdrawOnboardingApplication
      summary: 撤回未激活商户的在途入驻申请（INCOMPLETE / PENDING_REVIEW；409 若 ACTIVE / REJECTED）
      description: |
        撤回该关联商户**在途的入驻申请**——委托 ONB 撤回在途申请能力（单 D-MERCH 本地事务原子）：CAS Application `DRAFT`/`UNDER_REVIEW`/`MORE_INFO_REQUIRED` → 终态 `WITHDRAWN` + 清 `missingFields` + 销毁 `initialRefundPin` + 冻结草稿 step 数据 + 同事务投影 `Merchant.status=WITHDRAWN` + 写**唯一** `application.withdrawn` outbox。被撤回的是 application 不是 merchant；merchant 1:1 壳 status 由 Application 派生（M4、**单一真相源**，不另盖 merchant 级标记）、派生隐藏不再于 switcher 展示。 审核侧据 `application.withdrawn` 从可审批队列剔除（防 ghost approve）；`MerchantParentLink` 作**不可变历史保留**（不发删除事件）；Application / 审核 / 审计记录留存不物理删（DELETE = 撤回软删、非物理删）。 **会话闭环（200 body）**：若撤回的是**当前选中商户** → 服务端 commit 后 reconcile 会话：优先切**可访问 parent**、否则 `currentMerchantId=null`（前端重选）；响应回 `{contextChanged, currentMerchantId}` 让该副作用可观测。会话更新是 commit 后写、**不与 D-MERCH 事务跨介质 2PC**；写失败由 `listMerchants` / stale-tab 守卫兜底，会话**绝不保留指向 WITHDRAWN 商户的有效 current**。 资损红线：ACTIVE / REJECTED 不可撤回 → 409（FR-10-AC-10）;**root merchant（无 parent_link）不可撤回 → 409（仅关联 child 可撤回，M3）**;目标不在可访问集（out-of-scope）→ 404 反枚举;in-scope 但 RBAC 拒 → 403。 幂等：DELETE 天然幂等——已 `WITHDRAWN` 授权重放 = 成功 no-op（返当前会话上下文、**不重复发事件**），不挂 Idempotency-Key。
      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: 已撤回（Application → WITHDRAWN；该商户不再于 switcher 展示）；回 reconcile 后的会话当前商户
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - contextChanged
                  - currentMerchantId
                properties:
                  contextChanged:
                    type: boolean
                    description: 本次撤回是否改变了会话当前商户（撤回的是当前商户时为 true）
                  currentMerchantId:
                    type:
                      - string
                      - 'null'
                    description: reconcile 后会话当前商户：撤回当前商户→可访问 parent 或 null（无可用则前端重选）；撤回非当前商户→不变
              example:
                contextChanged: true
                currentMerchantId: '1000001'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208003
  /merchants/current:
