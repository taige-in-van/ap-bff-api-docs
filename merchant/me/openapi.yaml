  /merchants/{merchantId}/application:
    delete:
      tags:
        - merchants
      operationId: withdrawOnboardingApplication
      summary: 撤回未激活商户的在途入驻申请（INCOMPLETE / PENDING_REVIEW；409 若 ACTIVE / REJECTED）
      description: |
        撤回该关联商户**在途的入驻申请**：在途申请（`DRAFT`/`UNDER_REVIEW`/`MORE_INFO_REQUIRED`）迁终态 `WITHDRAWN` + 冻结草稿数据。被撤回的是入驻申请、不是商户；撤回后该商户不再于 switcher 展示。 **会话闭环（200 body）**：若撤回的是**当前选中商户** → 服务端优先切**可访问的上级商户**、否则 `currentMerchantId=null`（前端重选）；响应回 `{contextChanged, currentMerchantId}` 让该副作用可观测。会话绝不保留指向 WITHDRAWN 商户的有效 current；若会话更新失败由 `listMerchants` / 上下文守卫兜底。 资损红线：ACTIVE / REJECTED 不可撤回 → 409;**无上级关联关系的商户不可撤回 → 409（仅关联子商户可撤回）**;目标不在可访问集 → 404 反枚举;在可访问集内但 RBAC 拒 → 403。 幂等：DELETE 天然幂等——已 `WITHDRAWN` 授权重放 = 成功 no-op（返当前会话上下文），不挂 Idempotency-Key。
      parameters:
        - name: merchantId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: 已撤回（Application → WITHDRAWN；该商户不再于 switcher 展示）；回更新后的会话当前商户
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - contextChanged
                  - currentMerchantId
                properties:
                  contextChanged:
                    type: boolean
                    description: 本次撤回是否改变了会话当前商户（撤回的是当前商户时为 true）
                  currentMerchantId:
                    type:
                      - string
                      - 'null'
                    description: 更新后会话当前商户：撤回当前商户→可访问的上级商户或 null（无可用则前端重选）；撤回非当前商户→不变
              example:
                contextChanged: true
                currentMerchantId: '1000001'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208003
