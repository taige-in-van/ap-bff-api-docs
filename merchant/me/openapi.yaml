        storeId:
          type: string
        settlementSchedule:
          type: string
    BankSettlementChanges:
      type: object
      additionalProperties: false
      minProperties: 1
      description: bank 变更：含 bank 字段（可同时改 storeId / schedule）；触发 voidChequeRef 必填
      properties:
        bankName:
          type: string
        transitNumber:
          type: string
          pattern: ^[0-9]{5}$
          description: 5 位数字
        institutionNumber:
          type: string
          pattern: ^[0-9]{3}$
          description: 3 位数字
        accountNumber:
          type: string
          pattern: ^[0-9]{6,12}$
          description: 6-12 位数字（明文输入，read 视图掩码）
        storeId:
          type: string
        settlementSchedule:
          type: string
    SettlementChanges:
      type: object
      additionalProperties: false
      minProperties: 1
      description: 本次变更的 Settlement 字段（仅含改动字段；`minProperties:1` 拒空变更 no-op）
      properties:
        storeId:
          type: string
          description: 非 bank-related
        settlementSchedule:
          type: string
          description: 非 bank-related
        bankName:
          type: string
          description: bank-related
        transitNumber:
          type: string
          pattern: ^[0-9]{5}$
          description: bank-related；5 位数字
        institutionNumber:
          type: string
          pattern: ^[0-9]{3}$
          description: bank-related；3 位数字
        accountNumber:
          type: string
          pattern: ^[0-9]{6,12}$
          description: bank-related；6-12 位数字（明文输入，read 视图掩码）
    SettlementChangeRequestCreated:
