                properties:
                  currentMerchantId:
                    type:
                      - string
                      - 'null'
                    description: 会话当前商户；**null = 无当前商户**（如撤回当前商户后无可访问 parent，前端须重选）。每次解析时服务端校验该商户仍 ∈ 可访问集且非 WITHDRAWN，无效则视为 null
                  data:
