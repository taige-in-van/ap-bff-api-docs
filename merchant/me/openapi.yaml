      summary: 切换当前商户上下文（更新会话 merchant context；直接生效无二次确认）
      description: |
        将会话当前 merchant context 切到目标商户（须在该用户可访问集内）;切换后所有 merchant 级页面 / 操作按新上下文裁决数据与权限。 切换直接生效（不修改业务数据）;目标不在可访问集（out-of-scope）→ 404 反枚举（不泄存在性）;在集内但 RBAC 拒 / REJECTED 不可切 → 403。 merchant 上下文从会话取、不信请求体 —— 切换即更新会话当前商户，这是 anti-IDOR chokepoint 的会话源（**单会话单当前商户**：另一标签页切换后，本标签页下次操作前弹窗提示 → 确认后同步切到当前商户）。 幂等：纯 PUT、天然幂等（重放切到同商户结果一致），不挂 Idempotency-Key。
      parameters:
