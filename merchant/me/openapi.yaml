      summary: 上传店铺照（in_store Connect 凭证；返回 storePhotoFileId）
      description: |
        in_store AcceptanceMode Connect 的凭证前置：上传店铺照（PNG / JPEG，默认 ≤ 2MB 可配置；按文件实际内容判定、拒 SVG）， 返回 `storePhotoFileId` 供 connectAcceptanceMode（in_store）引用;上传失败 / 格式不支持 → 400。 幂等：每次上传返回独立 fileId，按流程语义不挂幂等键。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: 店铺照（PNG / JPEG，默认 ≤ 2MB 可配置）
      responses:
        '200':
          description: 已上传（返回 storePhotoFileId）
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - storePhotoFileId
                properties:
                  storePhotoFileId:
                    type: string
                    readOnly: true
                    description: 店铺照文件 id（供 connectAcceptanceMode in_store 引用）
              example:
                storePhotoFileId: sp_1a2b3c
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
      x-error-codes:
        '409':
          - 208001
  /integrations/terminal:
    put:
      tags:
        - integrations
      operationId: connectTerminalIntegration
      summary: 连接 / 切换 TerminalIntegration（Moneris / Clover 互斥；即时生效）
      description: |
        连接或切换 POS provider（Moneris / Clover），即时生效无审核;互斥 —— 同 Merchant 至多 1 个 active provider，切换时旧 provider 凭据保留但不生效。 可设 3DS 开关（默认关闭，用于线上交易 3DS 验证）。凭据保存后仅掩码回显、明文不二次回显;凭据校验失败 → 400。 幂等：纯 PUT 覆盖当前生效 provider、天然幂等（重放同 provider+凭据结果一致），不挂 Idempotency-Key。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalIntegrationInput'
            examples:
              moneris:
                summary: Moneris（Store ID + API Token）
                value:
                  provider: moneris
                  storeId: monstore01
                  apiToken: mtok_secret_xxxxxxxx
                  threedsEnabled: false
              clover:
                summary: Clover（Public + Private Token）
                value:
                  provider: clover
                  publicToken: clpub_xxxxxxxx
                  privateToken: clpriv_secret_xxxxxxxx
                  threedsEnabled: true
      responses:
        '200':
          description: 已连接（返回掩码凭据摘要 + 当前生效 provider）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalIntegrationView'
              example:
                activeProvider: moneris
                threedsEnabled: false
                credentialSummary: Store ID ••• 4321
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
    delete:
      tags:
        - integrations
      operationId: disableTerminalIntegration
      summary: 停用 TerminalIntegration（清当前生效 provider；凭据保留以便再连）
      description: |
        商户后台自助停用：清除当前生效 TerminalIntegration（activeProvider 置空）+ 凭据保留以便再次连接 + 记录审计事件;即时生效无审核。 停用后该 Merchant 无生效 provider（彻底清除已存凭据走客服 / 运营）。幂等：DELETE 天然幂等（已无 active 时仍 204）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: 已停用（无生效 provider，凭据保留）
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
  /integrations/ecommerce:
    post:
      tags:
        - integrations
      operationId: connectEcommerceIntegration
      summary: 连接 EcommerceIntegration（Shopify / Allvalue review-gated；不互斥 → PENDING_REVIEW）
      description: |
        连接电商平台（Shopify / Allvalue），提交 website URL + 关联 PaymentMethod 配置，创建 `EcommerceIntegration{PENDING_REVIEW}`（不互斥，可各自 ACTIVE）+ 记录审计事件; 审核结果异步生效（不在本 BFF）。同平台审核中重复提交 → 409;URL / 配置校验失败 → 400。 Integration 连接不要求对应 online AcceptanceMode 已 ACTIVE、也不自动开通 mode。 幂等：创建类、挂 Idempotency-Key（防重复点击重复建 integration）。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EcommerceIntegrationInput'
            example:
              provider: shopify
              websiteUrl: https://shop.example.com
              paymentMethodConfig:
                - online-wechat
                - online-alipay
      responses:
        '201':
          description: 已创建 EcommerceIntegration{PENDING_REVIEW}（待审核）
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - integrationId
                  - provider
                  - status
                properties:
                  integrationId:
                    type: string
                  provider:
                    $ref: '#/components/schemas/EcommerceProvider'
                  status:
                    type: string
                    enum:
                      - PENDING_REVIEW
              example:
                integrationId: eint_7c3a91f0
                provider: shopify
                status: PENDING_REVIEW
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
      x-error-codes:
        '409':
          - 208001
          - 208002
  /integrations/ecommerce/{integrationId}:
    put:
      tags:
        - integrations
      operationId: manageEcommerceIntegration
      summary: 管理 EcommerceIntegration（改 URL 触发重审 / 仅改方式配置不重审）
      description: |
        管理 ACTIVE EcommerceIntegration：**仅改 PaymentMethod 配置（URL 未变）→ 保存生效、status 仍 ACTIVE、不重审**; **改 URL → 创建待审核变更、原 URL/原配置继续生效、status 仍 ACTIVE**（审核结果异步生效）。 已有待审核 URL 变更时再改 URL → 409（不允许再次提交）;校验失败 → 400。不提供 Ecommerce 自助断开入口（走客服 / 运营）。 幂等：改方式配置天然幂等;**改 URL 非天然幂等**（重放撞 pending → 409）→ 挂 `Idempotency-Key`、retry 同键返**首次**结果。
      parameters:
        - name: integrationId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EcommerceIntegrationManage'
            examples:
              methodConfigOnly:
                summary: 仅改方式配置（不重审）
                value:
                  paymentMethodConfig:
                    - online-wechat
              urlChange:
                summary: 改 URL（触发重审）
                value:
                  websiteUrl: https://newshop.example.com
      responses:
        '200':
          description: 已处理（仅改方式 = 立即生效;改 URL = 待审核变更受理、原配置生效）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EcommerceIntegrationView'
              example:
                integrationId: ec_1
                provider: shopify
                status: ACTIVE
                websiteUrl: https://shop.example.com
                pendingUrlChange: true
                urlChangeRequestId: eurc_9f2a
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
      x-error-codes:
        '409':
          - 208001
          - 208002
  /account/documents:
    get:
      tags:
        - documents
      operationId: getDocuments
      summary: Documents 只读展示（5 必传 + 2 可选；未上传必传项显示缺失占位）
      description: |
        只读返回入驻上传的文档：5 必传（Void Cheque / Owner ID / Certificate of Incorporation / Store Inside / Store Outside） + 2 可选 Other（仅已上传时返回）。已上传项含预览 / 下载引用 + 文件类型;未上传必传项 `present: false`（缺失占位）。 无自助上传 / 替换 / 删除入口（续期 / 替换走客服 / 管理后台）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
      responses:
        '200':
          description: OK（只读文档列表）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentsView'
              example:
                required:
                  - docType: VOID_CHEQUE
                    present: true
                    fileName: void-cheque.pdf
                    fileType: application/pdf
                    downloadUrl: https://cdn.example.com/doc/vc.pdf
                  - docType: OWNER_ID
                    present: false
                  - docType: CERTIFICATE_OF_INCORPORATION
                    present: true
                    fileName: coi.pdf
                    fileType: application/pdf
                    downloadUrl: https://cdn.example.com/doc/coi.pdf
                  - docType: STORE_INSIDE
                    present: true
                    fileName: inside.jpg
                    fileType: image/jpeg
                    downloadUrl: https://cdn.example.com/doc/in.jpg
                  - docType: STORE_OUTSIDE
                    present: true
                    fileName: outside.jpg
                    fileType: image/jpeg
                    downloadUrl: https://cdn.example.com/doc/out.jpg
                optional: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
      x-error-codes:
        '409':
          - 208001
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-msession
      description: |
        商户后台 BFF 服务端会话 cookie（httpOnly / secure / SameSite；`__Host-` 前缀强制 Secure + Path=/ + 无 Domain，杜绝子域注入）。 浏览器只持此会话 cookie、不持后端 token。会话裁决商户 scope（当前商户从会话取、不信请求体）。 写接口（非安全方法）另需 CSRF 防护（X-CSRF-Token）；商户级读写另挂 MerchantContextGuard 守卫（见下方 parameters）。
  schemas:
    RelationType:
      type: string
      enum:
        - branch
        - new_legal_entity
      description: 关联商户关系类型（创建即定，不再变动）
    AcceptanceModeType:
      type: string
      enum:
        - in_store
        - online
      description: 商户业务模式（in_store / online）。**封闭 enum**：新增取值 = 破坏性变更、走新契约版本发布（非配置新增）；前端须 unknown-safe（遇未识别值保守处理、不静默丢弃）。
    AcceptanceModeStatus:
      type: string
      enum:
        - NOT_ENROLLED
        - PENDING_REVIEW
        - ACTIVE
        - REJECTED
      description: |
        AcceptanceEnrollment 开通态（状态流转见 flows）。 **NOT_ENROLLED** = 该 mode 可开通但尚未发起 Connect（Service Page 据此区分「未开通」与「开通中 / 已开通」），无 enrollment 行。
    TerminalProvider:
      type: string
      enum:
        - moneris
        - clover
      description: POS 终端 provider（互斥）
    EcommerceProvider:
      type: string
      enum:
        - shopify
        - allvalue
      description: 电商平台 provider（不互斥）
    TimeZone:
      type: string
      enum:
        - America/Vancouver
        - America/Edmonton
        - America/Winnipeg
        - America/Toronto
        - America/Halifax
      description: |
        时区取 IANA tz database 标识（5 选项：America/Vancouver / America/Edmonton / America/Winnipeg / America/Toronto / America/Halifax， 对应北美 PT / MT / CT / ET / AT）；**不用 PT/ET 等缩写**（缩写无法表达夏令时 DST）。被 06 / 08 跨日 / 切月消费。
    LockedField:
      type: object
      additionalProperties: false
      description: Locked 字段展示项：值 + locked 标识（服务端强制，展示 + 救济提示在前端）
      required:
        - value
        - locked
      properties:
        value:
          oneOf:
            - type: string
            - type: 'null'
          description: 字段当前值（底层无值时 null，仍按 Locked 展示）
        locked:
          type: boolean
          description: 恒 true（Business Information 内 7 项 Locked 字段）
    BusinessInformationView:
      type: object
      additionalProperties: false
      description: Business Information section 展示（7 Locked 字段含 locked 标识 + 7 可编辑字段当前值）
      properties:
        legalBusinessName:
          $ref: '#/components/schemas/LockedField'
        tradeName:
          $ref: '#/components/schemas/LockedField'
        ownershipType:
          $ref: '#/components/schemas/LockedField'
        registrationNumber:
          $ref: '#/components/schemas/LockedField'
        referredBy:
          $ref: '#/components/schemas/LockedField'
        industryCategory:
          $ref: '#/components/schemas/LockedField'
        mcc:
          $ref: '#/components/schemas/LockedField'
        address:
          type: string
        city:
          type: string
        province:
          type: string
        postalCode:
          type: string
        country:
          type: string
        timeZone:
          $ref: '#/components/schemas/TimeZone'
        businessPhone:
          type: string
    ProfileHeader:
      type: object
      additionalProperties: false
      description: Header card（identity 概览；不是第五 section）
      required:
        - merchantCode
        - tradeName
        - legalBusinessName
      properties:
        merchantCode:
          type: string
          readOnly: true
          description: Merchant ID（创建时分配、对外展示；Header card 展示项）
        logoUrl:
          oneOf:
            - type: string
              format: uri
            - type: 'null'
          description: Logo URL；无 Logo 为 null（前端回退默认首字母标识）
        tradeName:
          type: string
        legalBusinessName:
          type: string
        industryCategory:
          type: string
        mcc:
          type: string
    ContactInformationView:
      type: object
      additionalProperties: false
      description: Contact Information section 展示（只读聚合；编辑走 owner-contact 端点）
      properties:
        contactName:
          type: string
          description: contactFirstName + contactLastName 组合展示
        contactTitle:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
          description: '= Owner Primary Email = 登录邮箱（三合一）'
    ProfileFunds:
      description: |
        资金字段（只读展示，能力归 06）。Profile 固定展示区块。 **降级**：资金数据不可用时 `available=false` + 金额省略（区块仍在、标注暂不可用），不阻断 Profile 其余区块。
      oneOf:
        - title: FundsAvailable
          type: object
          additionalProperties: false
          required:
            - available
            - accountBalance
            - refundReserved
          properties:
            available:
              type: boolean
              const: true
              description: 资金数据可用
            accountBalance:
              $ref: '#/components/schemas/Money'
            refundReserved:
              $ref: '#/components/schemas/Money'
        - title: FundsUnavailable
          type: object
          additionalProperties: false
          required:
            - available
          properties:
            available:
              type: boolean
              const: false
              description: 资金数据不可用；金额省略
    DocumentsSummary:
      type: object
      additionalProperties: false
      description: Documents section 摘要（明细见 GET /account/documents）
      properties:
        total:
          type: integer
          description: 已上传文档数
        missing:
          type: integer
          description: 缺失必传文档数
    AccountProfile:
      type: object
      additionalProperties: false
      description: Profile 概览聚合（Header card + 4 section + 资金只读）
      required:
        - merchantId
        - status
        - header
        - businessInformation
        - settlement
        - contactInformation
        - funds
        - documentsSummary
      properties:
        merchantId:
          type: string
          readOnly: true
        status:
          type: string
          const: ACTIVE
          readOnly: true
          description: Profile 仅 ACTIVE 商户可访问（INCOMPLETE / PENDING_REVIEW / REJECTED / WITHDRAWN 均不返回 Profile，前端按 Merchant 状态分流）
        header:
          $ref: '#/components/schemas/ProfileHeader'
        businessInformation:
          $ref: '#/components/schemas/BusinessInformationView'
        settlement:
          $ref: '#/components/schemas/SettlementView'
        contactInformation:
          $ref: '#/components/schemas/ContactInformationView'
        funds:
          $ref: '#/components/schemas/ProfileFunds'
        documentsSummary:
          $ref: '#/components/schemas/DocumentsSummary'
    BusinessInformationUpdate:
      type: object
      additionalProperties: false
      minProperties: 1
      description: |
        编辑请求：7 项可编辑字段 + 7 项 Locked 字段（Locked 字段为合法槽位以便服务端兑现 403）。 Locked 字段是合法属性（不作未知属性打成 400）；任一 Locked 字段出现在请求体 → 服务端拒绝 → **403 + 审计**； 真正未知属性 → 400；空提交（no-op）→ 400。 校验：postalCode 按国家格式、phone 默认 +1 / 10 位、Province × Country 联动（可选项后端配置驱动）。
      properties:
        address:
          type: string
        city:
          type: string
        province:
          type: string
        postalCode:
          type: string
        country:
          type: string
          description: ISO 3166-1 alpha-2（CA / US）；展示名可本地化
        timeZone:
          $ref: '#/components/schemas/TimeZone'
        businessPhone:
          type: string
        legalBusinessName:
          type: string
          description: Locked：出现即 403 + 审计
        tradeName:
          type: string
          description: Locked：出现即 403 + 审计
        ownershipType:
          type: string
          description: Locked：出现即 403 + 审计
        registrationNumber:
          type: string
          description: Locked：出现即 403 + 审计
        referredBy:
          type: string
          description: Locked：出现即 403 + 审计
        industryCategory:
          type: string
          description: Locked：出现即 403 + 审计
        mcc:
          type: string
          description: Locked：出现即 403 + 审计
    LogoRef:
      type: object
      additionalProperties: false
      required:
        - logoUrl
      properties:
        logoUrl:
          type: string
          format: uri
          readOnly: true
          description: 新 Logo 引用
    SettlementView:
      type: object
      additionalProperties: false
      description: 结算字段展示（account_number 掩码仅末 4 位；Legal Business Name 只读同步 Locked）
      required:
        - accountNumberMasked
        - settlementSchedule
        - pendingReview
      properties:
        legalBusinessName:
          type: string
          readOnly: true
          description: 本 section 只读展示，同步 Locked
        bankName:
          type: string
        transitNumber:
          type: string
          description: 5 位数字
        institutionNumber:
          type: string
          description: 3 位数字
        accountNumberMasked:
          type: string
          readOnly: true
          description: account_number 仅末 4 位（`•••• 5678`；明文不返回）
        settlementSchedule:
          type: string
          description: 默认 T+2 Business Days（可配置）
        storeId:
          oneOf:
            - type: string
            - type: 'null'
          description: 可选；无则 null
        pendingReview:
          type: boolean
          readOnly: true
          description: 存在 PENDING_REVIEW 变更请求 → true（前端隐 Edit 入口 + 审核中提示）
    FileRef:
      type: object
      additionalProperties: false
      required:
        - fileRef
      properties:
        fileRef:
          type: string
          readOnly: true
          description: 上传文件引用（供创建变更请求引用）
    OtpChallenge:
      type: object
      additionalProperties: false
      description: Owner email OTP 挑战句柄（结算变更 / Forgot PIN；一次性凭据，过期 / 已用 → 410、冷却中 → 429）。FE 用 cooldownSeconds 启动重发倒计时、用 expiresAt 判断挑战是否仍有效。
      required:
        - challengeId
        - deliveredTo
        - cooldownSeconds
        - expiresAt
      properties:
        challengeId:
          type: string
          readOnly: true
        deliveredTo:
          type: string
          readOnly: true
          description: 脱敏投递目标（Owner email，如 o***@e***.com）。
        cooldownSeconds:
          type: integer
          readOnly: true
          description: 重发冷却秒数（业务参数）。
        expiresAt:
          allOf:
            - $ref: '#/components/schemas/Timestamp'
          readOnly: true
    SettlementChangeRequestInput:
      description: |
        创建结算变更（多态二选一）：NonBank（仅 storeId / settlementSchedule、无 voidChequeRef）或 Bank（含 bank 字段 → voidChequeRef **必填**）。 otpToken 绑定本次变更内容 + voidChequeRef；提交 changes ≠ 绑定内容 → 403（意图不符）。**含 bank 字段但缺 voidChequeRef → 400**。
      oneOf:
        - $ref: '#/components/schemas/NonBankSettlementChange'
        - $ref: '#/components/schemas/BankSettlementChange'
    NonBankSettlementChange:
      type: object
      additionalProperties: false
      required:
        - otpToken
        - changes
      properties:
        otpToken:
          type: string
          description: verifySettlementOtp 签发的单次 token
        changes:
          $ref: '#/components/schemas/NonBankSettlementChanges'
    BankSettlementChange:
      type: object
      additionalProperties: false
      required:
        - otpToken
        - voidChequeRef
        - changes
      properties:
        otpToken:
          type: string
          description: verifySettlementOtp 签发的单次 token
        voidChequeRef:
          type: string
