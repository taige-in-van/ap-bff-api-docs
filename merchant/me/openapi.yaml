      x-error-codes: {}
    post:
      tags:
        - merchants
      operationId: addMerchant
      summary: 添加关联商户（branch / new_legal_entity；创建 INCOMPLETE + 交入驻流程；2 层上限）
      description: |
        **原子创建关联商户**：一次创建一个 `INCOMPLETE` 关联商户（branch / new_legal_entity）+ 对应的入驻申请草稿（`DRAFT`），返回 merchantId。 **仅创建、不切会话**：前端拿到 merchantId 后**显式调 switchCurrentMerchant 切上下文**（幂等），再 GET /onboarding/application **加载**已建 DRAFT 续走向导。 字段预填及 5 步规则由入驻向导接口返回。 2 层上限：当前商户已是二级关联商户 → 409（不创建）;Country × Currency 组合非法 → 400。 幂等：创建类、挂 Idempotency-Key（无自然业务单号，防重复点击重复建商户）。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
