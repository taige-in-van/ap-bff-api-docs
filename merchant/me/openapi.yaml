      description: |
        返回当前用户可访问的关联商户，**仅 ACTIVE / INCOMPLETE / PENDING_REVIEW 三类状态**（REJECTED 不在 switcher 展示，其拒绝展示归入驻流程）+ 当前选中标识。 INCOMPLETE / PENDING_REVIEW 商户的撤回入驻入口、Add Merchant 入口是否展示由 RBAC 决定（前端按权限渲染）。
      responses:
