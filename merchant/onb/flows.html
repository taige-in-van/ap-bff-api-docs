# 商户入驻 —— 调用时序

> 本文是 `openapi.yaml` 的**调用顺序伴档**：OpenAPI 讲清每个接口的入参 / 出参 / 错误码(WHAT)，本文讲清**多步流程里先调谁、后调谁、分支怎么走、什么触发上传 / 审核分流**(HOW)。
>
> **视角**：浏览器(SPA)↔ BFF。前端只与 BFF 交互；BFF 内部对其他服务的委派不画(后端面，与前端无关)。审核是离线过程，不作为前端参与方出现 —— 其结果在下次登录经状态接口分流。
>
> **接口 ID = `operationId`**：下方每个发往 BFF 的调用都标 `[operationId]`，即 OpenAPI 原生 `operationId`——全局唯一，也是生成客户端的**方法名**。**图例表与正文里的 operationId 是可点深链**，直达 ReDoc 接口详情；时序图**内**的 `[operationId]` 受 Mermaid 限制不可点，点同名链接即可。
>
> **通用约定**(每条流程都成立，不在图里重复)：浏览器**不持 token**——登录成功 BFF 下发 httpOnly opaque 会话 cookie(`__Host-msession`)，服务端持后端 token；非安全方法(POST/PUT)一律带 `X-CSRF-Token`；**所有当前商户相关读写携带页面当前 merchantId(`X-Merchant-Context`)**——与会话当前商户不一致 → **409 `MERCHANT_CONTEXT_CHANGED`**(读不返回错商户、写不执行、前端刷新到当前商户)；错误体统一 `ErrorEnvelope`(结构 / 状态码 / 责任方→前端策略 / 字段级 details / 分页 / 幂等 / CSRF 详见 [API 基础约定](../../conventions.html))。
>
> ⚠️ **design / review 阶段**契约 —— 实现前可能调整，可据此并行开发，勿当冻结契约。

## 接口 ID 对照(图例，点 operationId 跳接口)

| operationId | method + path | 用途 |
|---|---|---|
| [`getOnboardingConfig`](index.html#tag/onboarding-config/operation/getOnboardingConfig) | `GET /onboarding/config` | 向导动态配置(支付方式 / 费率 / Currency×Country 有效组合 / 级联) |
| [`getOnboardingApplication`](index.html#tag/onboarding-wizard/operation/getOnboardingApplication) | `GET /onboarding/application` | 加载当前入驻申请草稿(状态 / 各步骤字段 / 待补项 / 已传文档) |
| [`saveOnboardingStep`](index.html#tag/onboarding-wizard/operation/saveOnboardingStep) | `PUT /onboarding/application/steps/{step}` | 分步保存当前步骤(校验失败返字段级错误) |
| [`uploadOnboardingDocument`](index.html#tag/documents/operation/uploadOnboardingDocument) | `POST /onboarding/documents` | 上传单个文档(multipart → 文件引用) |
| [`submitOnboardingApplication`](index.html#tag/onboarding-wizard/operation/submitOnboardingApplication) | `POST /onboarding/application/submission` | Review 页提交审核 |
| [`getOnboardingStatus`](index.html#tag/onboarding-status/operation/getOnboardingStatus) | `GET /onboarding/status` | 审核状态 + 登录后页面分流 + 拒绝结果 |

## 填报入驻向导(加载 → 分步保存 → 上传文档 → 提交审核)

渲染向导前先 [`getOnboardingConfig`](index.html#tag/onboarding-config/operation/getOnboardingConfig) 拿后端动态配置(Step 2 可选支付方式 + 费率、Step 3 有效 Currency×Country 组合)。申请单在完成注册验证后已备为 `DRAFT`，本向导**只加载、不创建**。[`getOnboardingApplication`](index.html#tag/onboarding-wizard/operation/getOnboardingApplication) 加载草稿(Step 1 部分字段从注册资料只读预填 + 预填可展示 Merchant ID（`merchantCode`）)，5 步逐步 [`saveOnboardingStep`](index.html#tag/onboarding-wizard/operation/saveOnboardingStep) 保存，Step 5 文档先 [`uploadOnboardingDocument`](index.html#tag/documents/operation/uploadOnboardingDocument) 拿 `fileId` 再随步骤保存绑定，最后 [`submitOnboardingApplication`](index.html#tag/onboarding-wizard/operation/submitOnboardingApplication) 提交。

```mermaid
sequenceDiagram
    participant B as 浏览器(SPA)
    participant A as 商户后台 BFF
    B->>A: [getOnboardingConfig] GET /onboarding/config
    A-->>B: 200 OnboardingConfig{ paymentMethods〔含 displayRate〕, currencyCountries, industries, settlementCycleDefault }(渲染 Step 2〔含费率〕/3〔含 Industry→MCC 级联；线上服务类型 = 前端 enum + i18n、后端校验提交值〕 + Step 4 默认结算周期)
    B->>A: [getOnboardingApplication] GET /onboarding/application
    A-->>B: 200 Application{ status= DRAFT, merchantCode, entryMode, resumeStep, readonlyFields, steps }
    loop Step 1-5 逐步填写
        B->>A: [saveOnboardingStep] PUT .../steps/{step}?mode=next|draft
        alt 校验通过
            A-->>B: 200 StepSaveResult{ saved= true }(mode=next 推进下一步 / mode=draft 仅保存不推进)
        else 字段非法 / 漏填
            A-->>B: 400 ErrorEnvelope{ details:[字段级校验错误] }(红框 + 错误条，不推进)
        end
    end
    opt Step 5 上传文档(每个文档一次)
        B->>A: [uploadOnboardingDocument] POST /onboarding/documents(multipart：file + docKey)
        A-->>B: 201 FileRef{ fileId }(非幂等：每次新 fileId)
        B->>A: [saveOnboardingStep] PUT .../steps/documents { documents:{ ...所有已传 docKey:{ fileId } } }(全量覆盖该 step 文档映射；省略 docKey = 移除绑定)
    end
    B->>A: [submitOnboardingApplication] POST /onboarding/application/submission
    A-->>B: 200 SubmitResult{ status= UNDER_REVIEW, submittedAt }(一次性提交确认；SLA 前端 i18n 固定文案、不返)
    Note over B,A: 字段 / 5 必传文档不全 400<br/>非法状态迁移 409<br/>已提交后草稿冻结再存 409<br/>Refund PIN 两次不一致 400(settlement 步)<br/>文档超限 413 / 格式非法 400<br/>审核为离线过程(固定 2-3 business days)，结果下次登录经 getOnboardingStatus 分流
```

- 保存两语义：`mode=next`(校验当前步完整 + 推进) / `mode=draft`(离开前持久化未完成草稿、不推进)。草稿在**后端**(非浏览器本地)：跨设备 / 重登录按 `resumeStep` 续填、`completedSteps` 渲染步骤条、`readonlyFields` 决定哪些字段只读(如 `referredBy` 在列表里 = Welcome 来源只读、不在 = 用户可填)；以最近一次成功保存为准(不合并)。Back / 步骤条返回不触发保存。
- Step 1 部分字段(来自注册时已填)**只读预填**(见 `readonlyFields`)；选 Other 时须另填具体 title；来源填 Moneris(大小写不敏感)时出现 `monerisMid` + `monerisManagerName` 必填。
- Step 4 银行账号 / Refund PIN 均 write-only **写入后不回显**；重登录靠 `accountNumberMasked`(末 4) + `accountNumberSet` / `refundPinSet` 标志判断是否已填。两次 Refund PIN 须一致。
- Step 2 选了任一线上支付方式时，Step 3 出现 `typeOfOnlineService`；其为 `Website` 时 `websiteUrl` 必填。
- 提交确认仅**一次性**；刷新 / 重进入驻流程后转审核状态页。

## 登录后页面分流 + 待补料环

每次登录由 [`getOnboardingStatus`](index.html#tag/onboarding-status/operation/getOnboardingStatus) 决定落到哪个业务页面(`routeTo`)。若被审核标记为 `MORE_INFO_REQUIRED`，回到入驻向导、按 `missingFields` 定位待补项修正后重新提交。审核标记补料**不发邮件 / 站内信**——审核员电话联系商户，用户主动重登录处理。

```mermaid
sequenceDiagram
    participant B as 浏览器(SPA)
    participant A as 商户后台 BFF
    B->>A: [getOnboardingStatus] GET /onboarding/status
    A-->>B: 200 OnboardingStatus{ status, routeTo }
    alt routeTo= MERCHANT_HOME
        B->>B: 进入商户后台首页(已通过审核)
    else routeTo= REVIEW_STATUS_PAGE
        B->>B: 展示审核状态页(status= UNDER_REVIEW + submittedAt；SLA 前端 i18n 固定文案)
    else routeTo= REJECTED_PAGE
        A-->>B: rejectInfo{ category }(申诉入口 = 前端从统一客服配置取、不随状态接口返回)
        B->>B: 展示拒绝结果页(粗分类原因 + 申诉入口；终态)
    else routeTo= ONBOARDING_WIZARD(含待补料)
        B->>A: [getOnboardingApplication] GET /onboarding/application
        A-->>B: 200 Application{ status= MORE_INFO_REQUIRED, missingFields:[{ field, step }] }
        B->>B: 定位首个含待补项的步骤 + 红框 + 错误条
        loop 修正待补项
            B->>A: [saveOnboardingStep] PUT .../steps/{step}
            A-->>B: 200 StepSaveResult{ stepMissingFields }
        end
        B->>A: [submitOnboardingApplication] POST /onboarding/application/submission
        A-->>B: 200 SubmitResult{ status= UNDER_REVIEW }(重新进入审核；待补项已清空)
    end
    Note over B,A: 补料不发邮件 / 站内信(审核员电话联系商户)<br/>missingFields 只含字段 + 所属步骤，不含审核原因<br/>routeTo 为完整有限分流集(闭包)<br/>拒绝为终态，同申请不可改回草稿(走客服)
```

- `routeTo` 是登录后业务页面分流真相源(完整有限分流集 / 闭包)；`MERCHANT_HOME` 的首页 / 商户切换由商户实体能力承载。
- `missingFields` 只承载字段 key + 所属步骤(不含审核原因)；与点 Next 时的字段级校验错误(`ErrorEnvelope.details`)在错误条中聚合展示。
- 同一账号有多个申请时，按**当前选中的商户**独立分流；切换商户后重新调本接口。

---

## 新增关联商户(进入同一向导)

从顶栏商户切换器选 "Add New Merchant" 填 Trade Name / Country / Currency / Legal Entity 创建关联商户后，前端经 [`getOnboardingApplication`](index.html#tag/onboarding-wizard/operation/getOnboardingApplication) 加载新草稿，**续走与首次入驻完全相同的 5 步向导 + 提交流程**(Branch 模式部分字段按当前商户预填可改、身份字段预填、Refund PIN 必重设、文档全部重新上传)。

> 关联商户的**创建动作**(切换器弹窗提交)不在本契约面 —— 它由商户实体能力承载、**创建 Merchant + 对应 Application{DRAFT}、不切会话**；前端显式切换当前商户后，本向导经 `getOnboardingApplication` **加载已建草稿**继续。多个关联商户各自独立申请，状态互不阻塞。
