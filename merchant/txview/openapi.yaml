  /refunds/{refundNo}/cancellation:
    post:
      tags:
        - refunds
      operationId: voidRefund
      summary: 撤销待处理退款（仅 REVIEWING）
      description: |
        撤销当前商户仍在审核中（未进通道：`REVIEWING`）的退款：退款单转 `CANCELLED`、不退款、**仅释放该笔可退额度占用**（其他未终态退款占用不受影响）、剩余可发起额回升。（`SUBMITTED` 是受理事务内瞬态、非商户可观察态、不作可撤入口。） `CHANNEL_PROCESSING` / `SUCCESS` / `FAILED` / `REJECTED` 不可撤 → `409`（208009）；**已 `CANCELLED` 再撤 → 幂等 `200`**（天然幂等、无副作用——已达目标终态）。**幂等**：同键 + 同 payload → 返首次结果、不重复撤销；同键异 payload → `409`（208005）；对已撤单的新撤销请求天然幂等（无副作用）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/CommandIdempotencyKey'
        - name: refundNo
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: 撤销成功（退款单转 CANCELLED）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundCancellationResult'
              examples:
                cancelled:
                  summary: 撤销待处理退款
                  value:
                    refundNo: R100240002-3
                    refundStatus: CANCELLED
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '409':
          - 208001
          - 208005
          - 208009
components:
  parameters:
    FromDate:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date
      description: 起始日（**商户 IANA 时区**解析为本地日、服务端转 UTC 半开区间 `[start, end)` 查询——DST / 跨午夜安全；省略 = 今日）。列表 / 汇总 / 导出共享同一查询契约。
    ToDate:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date
      description: 截止日（商户 IANA 时区、含当日；切日语义同 `from`）。
    PaymentMethodFilter:
      name: paymentMethod
      in: query
      required: false
      schema:
        type: string
      description: 支付方式筛选（**稳定 Family code**，如 `wechat` / `alipay`——非本地化展示名；候选集 = `filterOptions.paymentMethods[].code`）。
    PaymentSourceFilter:
      name: source
      in: query
      required: false
      schema:
        type: string
      description: 来源筛选（**稳定来源 code**，如 `store_qr`——非展示文案；后端动态配置枚举、候选集 = `filterOptions.sources[].code`）。退款侧 = **原支付来源**（≠ 退款来源 refundSource——后者服务端用于排除 system_auto、不作 FE 筛选值）。
    PaymentKeyword:
      name: keyword
      in: query
      required: false
      schema:
        type: string
      description: 关键词：订单号 / 备注模糊；纯数值按金额精确匹配（跨标价币种按数值命中、不区分币种）。
    RefundKeyword:
      name: keyword
      in: query
      required: false
      schema:
        type: string
      description: 关键词：退款号 / 原订单号 / 备注模糊；纯数值按金额精确匹配。
    CommandIdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 1
        pattern: \S
      description: 幂等键（资金 / 命令路径**必填**）：本命令按此键去重、防重放；同键同 payload → 返首次结果、异 payload → `409`·208005；缺失 → `400`。
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
      description: 本地化 locale（BCP-47，如 `zh-Hans` / `fr-CA`）——**FE 传当前界面 / 用户语言**；服务端渲染二进制（PDF / xlsx）时执行 **BCP-47 best-match**（如 `fr-CA` → `fr`）、再无匹配才回退**会话 locale → 商户默认**。实际结果经 `Content-Language` 回报。
    MerchantContextGuard:
      name: X-Merchant-Context
      in: header
      required: true
      description: |
        stale-tab 一致性守卫（读写统一）：页面预期的当前商户 ID。与会话当前商户比对，一致才执行； **不一致 → 409 `MerchantBffConflict`**（`code` `208001`、`MERCHANT_CONTEXT_CHANGED`）——**读不返回错商户数据、写不执行**，响应 `context.currentMerchantId` 回显服务端当前商户供前端直接 re-sync。 挂在所有依赖当前商户的读 + 写接口；前端统一 interceptor 发送 + 处理 409（提示并刷新当前商户）。 **豁免**：listMerchants（返回 currentMerchantId 的 re-sync 入口）、switchCurrentMerchant（切换当前商户）、withdrawOnboardingApplication（目标由 path 指定、与当前商户无关）、以及不依赖当前商户的接口。
      schema:
        type: string
        minLength: 1
    PageNum:
      name: pageNum
      in: query
      description: 页码(从 1 计;分页)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      description: 每页记录数(上限可配置;分页默认 20)
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      description: CSRF 令牌(double-submit;cookie 会话鉴权的非安全方法[POST/PUT/PATCH/DELETE]必带;缺失/不匹配 → 403 fail-closed)
      schema:
        type: string
        minLength: 1
        pattern: \S
  responses:
    UpstreamTimeout:
      description: 查询超时——整份响应失败、**不返回半截数据**（read fail-safe）；FE 降级展示「暂不可用」。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: 401 未认证 / 凭证无效或已撤销
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: 403 无权限(fail-secure,默认拒绝)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    MerchantBffConflict:
      description: |
        409 冲突。前端据整数 `code` 区分子因——**常见 `208xxx` 商户后台 BFF 业务·资源型**（下列枚举）；**部分 409 另带身份类业务码**（如 `968xxx`：Login ID 占用 / 改邮箱在途等），**具体码以该 op 的 `x-error-codes` 为准**（另有同域 op 专属 `208xxx`，均不在此枚举）： `208001` **stale-tab 守卫 `MERCHANT_CONTEXT_CHANGED`**——**必携 `context.currentMerchantId`** 供前端 re-sync 当前商户； `208002` 资源已有进行中变更请求或已 `PENDING_REVIEW`（重复提交）； `208003` 状态前置不符（非法状态迁移 / 目标已决策）； `208005` 幂等键复用但 payload 不一致。 （`208004` 不适用本 BFF 面、故不在此枚举。） 前端动作：208001 刷新当前商户、208002 提示已存在、208003 重载最新态、208005 排查重复请求。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MerchantBffError'
          examples:
            staleTab:
              summary: stale-tab 守卫命中（code 208001，必携 context.currentMerchantId）
              value:
                code: 208001
                detail: 页面预期商户与会话当前商户不一致，请刷新到当前商户
                context:
                  currentMerchantId: '1000024'
            businessConflict:
              summary: 业务冲突（code 208002，资源已有进行中变更请求 / 已 PENDING_REVIEW；业务·资源型无 context）
              value:
                code: 208002
                detail: 该资源已有进行中的变更请求或已处于待审核状态，请勿重复提交
            idempotencyConflict:
              summary: 幂等键冲突（code 208005，同 Idempotency-Key 复用但请求内容不一致；业务·资源型无 context）
              value:
                code: 208005
                detail: 该幂等键已用于其他请求内容，请核对原请求；如确需发起新的业务操作，再使用新幂等键
    NotFound:
      description: 404 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    BadGateway:
      description: 502 上游通道错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    GatewayTimeout:
      description: 504 上游超时
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    BadRequest:
      description: 400 业务/校验错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-msession
      description: |
        商户后台 BFF 服务端会话 cookie（httpOnly / secure / SameSite；`__Host-` 前缀强制 Secure + Path=/ + 无 Domain，杜绝子域注入）。 浏览器只持此会话 cookie、不持后端 token。会话裁决商户 scope（当前商户从会话取、不信请求体）。 写接口（非安全方法）另需 CSRF 防护（X-CSRF-Token）；商户级读写另挂 MerchantContextGuard 守卫（见下方 parameters）。
  schemas:
    PaymentStatus:
      type: string
      description: |
        支付订单**商户可见状态**（小写 = 商户口径 / 大写 = 内核态透传）：`paid` 已收款 · `partially_refunded` 部分退款 · `refunded` 全额退款 · `failed` 失败 · `PREAUTH_HOLDING` 预授权挂起。 `paid` / `partially_refunded` / `refunded` 均基于内核 `PAID`（后两者为**退款度派生** f(成交, Σ已成功退款)、非独立 status）；`failed` 来自内核 `FAILED`；`PREAUTH_HOLDING` 为内核挂起态透传。瞬态 `CREATED` / `PAYING` 不进列表。 **封闭 enum**：新增取值 = 破坏性变更、走契约版本化；消费方须 unknown-safe 处理未识别值（保守对待、不静默丢弃）。
      enum:
        - paid
        - partially_refunded
        - refunded
        - failed
        - PREAUTH_HOLDING
    RefundStatus:
      type: string
      description: |
        退款状态（**商户可观察态**）：`REVIEWING` 审核中 · `CHANNEL_PROCESSING` 通道处理中 · `SUCCESS` 成功 · `FAILED` 失败 · `REJECTED` 已拒绝 · `CANCELLED` 已撤销。 **`SUBMITTED` 不在商户可观察态**（受理事务内瞬态、非稳定可观察态）；正常可撤 = `REVIEWING`（未进通道），`CHANNEL_PROCESSING`+ 不可撤。**封闭 enum**：新增取值 = 破坏性变更、走版本化；消费方 unknown-safe。
      enum:
        - REVIEWING
        - CHANNEL_PROCESSING
        - SUCCESS
        - FAILED
        - REJECTED
        - CANCELLED
    PaymentSort:
      type: string
      description: 支付列表排序（默认时间倒序）。**封闭 enum**：新增取值走版本化；消费方 unknown-safe。
      enum:
        - time_desc
        - time_asc
        - amount_desc
        - amount_asc
    RefundSort:
      type: string
      description: 退款列表排序（默认申请时间倒序）。**封闭 enum**：新增取值走版本化；消费方 unknown-safe。
      enum:
        - time_desc
        - time_asc
        - amount_desc
        - amount_asc
    FxInfo:
      type: object
      description: 换汇呈现（**present 条件 = 后端返回换算信息〔通道返回汇率 / 换算信息〕**——标价 ≠ 结算币种为典型场景、非判定条件）：付款人扣款币种 / 商户结算币种 / 汇率 / 换算说明。**present 时 `exchangeRate` 与 `note` 至少一个非空**（present ⇒ 后端有换算信息、自然满足；历史确无换算信息 → `fx` 整体 = null、不 present——不存在「空 fx」，N/A 呈现归 FE）；仅展示、不作退款校验币种。
      required:
        - payerCurrency
        - settlementCurrency
      properties:
        payerCurrency:
          $ref: '#/components/schemas/Currency'
        settlementCurrency:
          $ref: '#/components/schemas/Currency'
        exchangeRate:
          type:
            - string
            - 'null'
          description: 汇率（十进制字符串；**方向：1 `payerCurrency` = `exchangeRate` × `settlementCurrency`**；缺失 = 无换算信息）
        note:
          type:
            - string
            - 'null'
          description: 换算说明（**通道原文——原样展示、不保证本地化**；事实数据、非平台生成文案）
      anyOf:
        - required:
            - exchangeRate
          properties:
            exchangeRate:
              type: string
              minLength: 1
        - required:
            - note
          properties:
            note:
              type: string
              minLength: 1
    PaymentRow:
      type: object
      description: 支付交易列表行（默认列）。付款人 / 客户明细归详情，不入列表。
      required:
        - orderId
        - paymentMethod
        - source
        - amount
        - status
        - transactionTime
        - refundable
        - receiptAvailable
      properties:
        orderId:
          type: string
          minLength: 1
          description: 平台订单号（全局唯一；列表 / 详情 / 命令主键；≠ 商户自填订单号）
        paymentMethod:
          type: string
          description: 支付方式（**稳定 Family code**，如 `wechat`——非本地化展示名；展示名 / 图标 FE 按 `filterOptions.paymentMethods[].displayName` / i18n 映射）
        source:
          type: string
          description: 来源（**稳定 code**，如 `store_qr`；展示名 FE 按 `filterOptions.sources[].displayName` 映射；后端动态配置枚举）
        amount:
          $ref: '#/components/schemas/Money'
        status:
          $ref: '#/components/schemas/PaymentStatus'
        transactionTime:
          $ref: '#/components/schemas/Timestamp'
        note:
          type:
            - string
            - 'null'
        refundable:
          type: boolean
          description: 可退——**后端可退资格结果**（`paid` / `partially_refunded` ∧ 剩余可发起额 > 0，**或平台挂起 `PREAUTH_HOLDING` 经预授权放行**）；非按 status 硬编码。行内退款入口可见性。
        receiptAvailable:
          type: boolean
          description: 已收款（`paid` / `partially_refunded` / `refunded`）——收据入口可见性
    PaymentStatusCount:
      type: object
      description: 支付状态快捷标签计数项（随筛选由后端返回；null = All 总计）。
      required:
        - status
        - count
      properties:
        status:
          oneOf:
            - $ref: '#/components/schemas/PaymentStatus'
            - type: 'null'
          description: 支付状态（null = All 总计）
        count:
          type: integer
          minimum: 0
    RefundStatusCount:
      type: object
      description: 退款状态快捷标签计数项（随筛选由后端返回；null = All 总计）。
      required:
        - status
        - count
      properties:
        status:
          oneOf:
            - $ref: '#/components/schemas/RefundStatus'
            - type: 'null'
          description: 退款状态（null = All 总计）
        count:
          type: integer
          minimum: 0
    FilterOptions:
      type: object
      description: 动态筛选选项（支付方式 / 来源；从**原支付全集**派生；退款页与支付页**同源**、非仅当前结果，由后端输出）。
      required:
        - paymentMethods
        - sources
      properties:
        paymentMethods:
          type: array
          uniqueItems: true
          description: 可选支付方式（**稳定 code + canonical 默认展示名**——筛选 / 行值用 code、FE 按 code 本地化、`displayName` 只作 unknown-safe fallback；防 locale / 展示名变化导致筛选失效）
          items:
            type: object
            required:
              - code
              - displayName
            properties:
              code:
                type: string
                description: 品牌 Family code（稳定值，作查询参数 / 行值）
              displayName:
                type: string
                description: canonical 默认展示名（**非本地化**、不随 locale 变；FE 按 code 本地化、此值作 unknown-safe fallback）
        sources:
          type: array
          uniqueItems: true
          description: 可选来源（稳定 code + canonical 默认展示名，同上）
          items:
            type: object
            required:
              - code
              - displayName
            properties:
              code:
                type: string
                description: 来源 code（稳定值）
              displayName:
                type: string
                description: canonical 默认展示名（非本地化；FE 按 code 本地化、此值作 fallback）
    PaymentList:
      type: object
      required:
        - total
        - data
        - statusCounts
        - filterOptions
      properties:
        total:
          type: integer
          minimum: 0
          description: 命中总数（分页）
        data:
          type: array
          items:
            $ref: '#/components/schemas/PaymentRow'
        statusCounts:
          type: array
          description: 状态快捷标签计数（All + 各状态；随筛选、非仅当前页；由后端输出）
          items:
            $ref: '#/components/schemas/PaymentStatusCount'
        filterOptions:
          $ref: '#/components/schemas/FilterOptions'
    PaymentSummary:
      type: object
      description: 交易页头汇总卡（随筛选，**单一结算币种口径**；标价按成交汇率折算入结算币种，**不按标价币种分组**——「不混算」管列表行、非汇总卡）。
      required:
        - transactions
        - grossSales
        - refundAmount
        - netSales
        - toSettle
      properties:
        transactions:
          type: integer
          minimum: 0
          description: 交易笔数（随筛选）
        grossSales:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 总收款（结算币种；Gross Sales）
        refundAmount:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 退款额（结算币种；Refund Amount —— 按退款**申请时间**入窗、**仅计 `CHANNEL_PROCESSING` + `SUCCESS`**，审核中 / 失败 / 拒绝 / 撤销不计入；**排除 `refundSource=system_auto`**，同退款列表 / 导出口径）
        netSales:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: 净额 = Gross − Refund（结算币种）
        toSettle:
          description: To Settle（结算币种，账务资金派生值；无则 null）
          oneOf:
            - $ref: '#/components/schemas/Money'
            - type: 'null'
    RefundRef:
      type: object
      description: 交易详情内的关联退款条目。
      required:
        - refundNo
        - refundStatus
        - amount
        - requestTime
      properties:
        refundNo:
          type: string
          minLength: 1
        refundStatus:
          $ref: '#/components/schemas/RefundStatus'
        amount:
          $ref: '#/components/schemas/Money'
        requestTime:
          $ref: '#/components/schemas/Timestamp'
    TechnicalDetails:
      type: object
      description: 回调技术细节（审计可观测；默认折叠）。**五字段恒 present、缺失值 = null**（稳定响应形状）。
      required:
        - ip
        - callbackHttpStatus
        - callbackSentAt
        - callbackLatencyMs
        - callbackUrl
      properties:
        ip:
          type:
            - string
            - 'null'
          description: 付款人 / 回调来源 IP
        callbackHttpStatus:
          type:
            - integer
            - 'null'
          description: 回调 HTTP 状态码
        callbackSentAt:
          description: 回调发送时间
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
        callbackLatencyMs:
          type:
            - integer
            - 'null'
          description: 回调延迟（毫秒）
        callbackUrl:
          type:
            - string
            - 'null'
          description: 回调 URL
    Refundability:
      type: object
      description: 可退摘要（供发起退款前展示 + 入口可见性）。**来自后端权威结果**（成交 / 已成功 / 在途占用 / 剩余额 + 可退资格）：展示 / UX 预检口径、权威在后端受理重验；无占用行 = 零占用（仅当后端确认无历史退款）；本端只映射、不自算第二真相源。同标价币种口径。
      required:
        - refundable
        - transactedAmount
        - successfullyRefunded
        - inFlightHold
        - remainingRefundable
      properties:
        refundable:
          type: boolean
          description: 后端可退资格结果（权威、非按余额 / null 推断）——`true` 才可发起、金额再满足 `remainingRefundable` > 0
        transactedAmount:
          $ref: '#/components/schemas/Money'
        successfullyRefunded:
          $ref: '#/components/schemas/Money'
        inFlightHold:
          $ref: '#/components/schemas/Money'
        remainingRefundable:
          $ref: '#/components/schemas/Money'
          description: 剩余可发起额 = 成交 − 已成功 − 在途占用；> 0 才可发起退款
    PaymentDetail:
      type: object
      description: 支付交易详情。恒 present 字段（值可 null）：merchantOrderNo / confirmedAt / refundedAmount / fx / refundability——FE 稳定消费、区分「不适用(null)」与「有值」，不出现「字段省略」歧义。
      required:
        - orderId
        - amount
        - status
        - transactionTime
        - paymentMethod
        - paymentMethodDisplayName
        - source
        - sourceDisplayName
        - merchantOrderNo
        - platformTxnNo
        - relatedRefunds
        - technicalDetails
        - confirmedAt
        - refundedAmount
        - fx
        - refundability
      properties:
        orderId:
          type: string
          minLength: 1
        amount:
          $ref: '#/components/schemas/Money'
        status:
          $ref: '#/components/schemas/PaymentStatus'
        transactionTime:
          $ref: '#/components/schemas/Timestamp'
        confirmedAt:
          description: 确认时间（未确认则 null）
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
        refundedAmount:
          description: 已成功退款累计（无退款则 null）
          oneOf:
            - $ref: '#/components/schemas/Money'
            - type: 'null'
        paymentMethod:
          type: string
          description: 支付方式（**稳定 Family code**）
        paymentMethodDisplayName:
          type: string
          description: 支付方式 **canonical 默认展示名**（非本地化；FE 按 code 本地化、此值作 unknown-safe fallback——详情自足、邮件 CTA 深链直开不依赖列表 filterOptions；**PDF / xlsx 的服务端本地化与此无关**、按请求 locale 另行渲染）
        source:
          type: string
          description: 来源（**稳定 code**）
        sourceDisplayName:
          type: string
          description: 来源 **canonical 默认展示名**（非本地化；FE 按 code 本地化、此值作 fallback；详情自足）
        productAttribution:
          type:
            - string
            - 'null'
          description: Product 归因（无则 null）
        customerName:
          type:
            - string
            - 'null'
        customerEmail:
          type:
            - string
            - 'null'
        payerAccountMasked:
          type:
            - string
            - 'null'
          description: 付款账户（脱敏）
        merchantOrderNo:
          type:
            - string
            - 'null'
          description: 商户自填订单号（可复制；允许缺省 → 值可 null；orderId 才是平台主键）
        platformTxnNo:
          type: string
          description: 平台交易号（可复制）
        tradeName:
          type:
            - string
            - 'null'
        note:
          type:
            - string
            - 'null'
        relatedRefunds:
          type: array
          description: 关联退款（无则空数组）
          items:
            $ref: '#/components/schemas/RefundRef'
        technicalDetails:
          $ref: '#/components/schemas/TechnicalDetails'
        fx:
          description: 换汇呈现（仅涉换汇时 present、否则 null）
          oneOf:
            - $ref: '#/components/schemas/FxInfo'
            - type: 'null'
        refundability:
          description: '可退摘要（**恒返非空**）：`refundable: true/false` = 后端 gate 结果、FE 据此判入口、**不按 null 推断**；不可退时 `refundable=false` + `remainingRefundable=0`。'
          allOf:
            - $ref: '#/components/schemas/Refundability'
    RefundRow:
      type: object
      description: 退款列表行（默认列）。
      required:
        - refundNo
        - originalOrderId
        - paymentMethod
        - source
        - amount
        - isPartial
        - refundStatus
        - requestTime
        - voidable
        - receiptAvailable
      properties:
        refundNo:
          type: string
          minLength: 1
        originalOrderId:
          type: string
          minLength: 1
          description: 原交易（可回链原支付详情）
        paymentMethod:
          type: string
          description: 原支付方式（**稳定 Family code**，取自原交易）
        source:
          type: string
          description: '**原支付来源**（paymentSource，取自原交易；≠ 退款来源 refundSource）'
        amount:
          $ref: '#/components/schemas/Money'
          description: 退款金额（负向由 FE 呈现）
        isPartial:
          type: boolean
          description: 部分退款（true）/ 全额退款（false）
        originalAmount:
          description: 原订单金额（部分退款辅助信息；否则 null）
          oneOf:
            - $ref: '#/components/schemas/Money'
            - type: 'null'
        refundStatus:
          $ref: '#/components/schemas/RefundStatus'
        requestTime:
          $ref: '#/components/schemas/Timestamp'
        note:
          type:
            - string
            - 'null'
        voidable:
          type: boolean
          description: 可撤（`REVIEWING`，未进通道；`SUBMITTED` 是内部瞬态、不作商户可撤态）——撤销入口可见性
        receiptAvailable:
          type: boolean
          description: 成功退款（`SUCCESS`）——收据入口可见性
    RefundList:
      type: object
      required:
        - total
        - data
        - statusCounts
        - filterOptions
      properties:
        total:
          type: integer
          minimum: 0
        data:
          type: array
          items:
            $ref: '#/components/schemas/RefundRow'
        statusCounts:
          type: array
          description: 退款状态快捷标签计数（All + 各状态；随筛选、非仅当前页；状态语义 + 排除 system_auto，由后端输出）
          items:
            $ref: '#/components/schemas/RefundStatusCount'
        filterOptions:
          allOf:
            - $ref: '#/components/schemas/FilterOptions'
          description: 支付方式 / 来源选项**与支付列表同源**（从原支付全集派生）
    RefundDetail:
      type: object
      description: 退款详情。`completedAt` 恒 present（值可 null，仅 `SUCCESS` 有值）。**不含换汇字段**——退款详情不展示换汇信息；换汇仅在退款收据呈现。
      required:
        - refundNo
        - amount
        - refundStatus
        - requestTime
        - isPartial
        - paymentMethod
        - paymentMethodDisplayName
        - source
        - sourceDisplayName
        - initiatorType
        - initiatedBy
        - originalOrderId
        - originalAmount
        - completedAt
        - voidable
        - receiptAvailable
      properties:
        refundNo:
          type: string
          minLength: 1
        amount:
          $ref: '#/components/schemas/Money'
        refundStatus:
          $ref: '#/components/schemas/RefundStatus'
        requestTime:
          $ref: '#/components/schemas/Timestamp'
        isPartial:
          type: boolean
        paymentMethod:
          type: string
          description: 原支付方式（**稳定 Family code**，取自原交易）
        paymentMethodDisplayName:
          type: string
          description: 原支付方式 **canonical 默认展示名**（非本地化；FE 按 code 本地化、此值作 fallback；详情自足、深链直开可用）
        source:
          type: string
          description: '**原支付来源**（paymentSource code，取自原交易；≠ 退款来源）'
        sourceDisplayName:
          type: string
          description: 原支付来源 **canonical 默认展示名**（非本地化；FE 按 code 本地化、此值作 fallback；详情自足）
        customerName:
          type:
            - string
            - 'null'
        customerEmail:
          type:
            - string
            - 'null'
        initiatorType:
          type: string
          enum:
            - merchant_user
            - api_client
            - pos_device
            - system
            - unknown
          description: 发起人类型 **discriminant**（后端返回、缺失归 `unknown`）——FE 据此决定 `initiatedBy` 的用法：`merchant_user` → 直接展示；其余 → 按 type 本地化展示、`initiatedBy` 仅作 fallback。**不由退款来源 `refundSource` 推导**（来源是业务维度、非发起人）。
        initiatedBy:
          type: string
          minLength: 1
          description: 发起人**安全展示值（非空、必显）**：`initiatorType=merchant_user` → 商户用户展示名（后端解析）；其余 type → **canonical 默认标签**（unknown-safe fallback、非本地化——FE 按 `initiatorType` 本地化、此值兜底）。发起人原始标识仍排除〔敏感〕
        completedAt:
          description: 退款完成时间（**恒 present、值可 null**；仅 `SUCCESS` 非 null）
          oneOf:
            - $ref: '#/components/schemas/Timestamp'
            - type: 'null'
        originalOrderId:
          type: string
          minLength: 1
          description: 原订单引用（可复制 + 回链）
        originalAmount:
          $ref: '#/components/schemas/Money'
        voidable:
          type: boolean
          description: 可撤（`REVIEWING`，未进通道）——详情撤销入口可见性（**深链直开自足**、与列表行同口径、勿按 refundStatus 硬编码）
        receiptAvailable:
          type: boolean
          description: 收据可用（`SUCCESS`）——详情收据入口可见性（深链直开自足）
        note:
          type:
            - string
            - 'null'
    CreateRefundRequest:
      type: object
      description: '发起退款请求。金额 ∈ (0, 剩余可发起额]，币种 = 成交结果金额币种。**封闭对象**（`additionalProperties: false`——拒绝拼错字段 / 意外凭据字段 / 客户端自填 scope 信息）。'
      additionalProperties: false
      required:
        - amount
        - refundPin
      properties:
        amount:
          $ref: '#/components/schemas/PositiveMoney'
        note:
          type:
            - string
            - 'null'
          description: 退款备注（选填；长度上限为业务参数〔部署可配置〕）
        refundPin:
          type: string
          minLength: 1
          writeOnly: true
          description: 商户级 Refund PIN（write-only：仅入参、绝不回显〔含错误响应〕；格式〔默认 6 位数字〕由后端校验、本契约不锁 pattern；**不参与幂等比对**——同键重试即使重输 PIN 也返首次结果）
    CreateRefundResult:
      type: object
      required:
        - refundNo
        - refundStatus
      properties:
        refundNo:
          type: string
          minLength: 1
        refundStatus:
          allOf:
            - $ref: '#/components/schemas/RefundStatus'
          description: 退款单可观察态（复用 `RefundStatus` 封闭 enum；`SUBMITTED` 为受理事务内瞬态、不回显）：**首次受理** → `REVIEWING`（审核中）/ `CHANNEL_PROCESSING`（处理中）；同键重发在恢复期可能返终态（`SUCCESS` / `FAILED` / …）；**一经成功即冻结**——后续同键重发返此冻结记录、非当前实时态
    RefundCancellationResult:
      type: object
      required:
        - refundNo
        - refundStatus
      properties:
        refundNo:
          type: string
          minLength: 1
        refundStatus:
          type: string
          const: CANCELLED
          description: 撤销后状态（恒 `CANCELLED`）
    PreAuthCompletionResult:
      type: object
      required:
        - orderId
        - status
      properties:
        orderId:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - paid
            - partially_refunded
            - refunded
          description: 完成后订单**商户状态**（后端派生、**非固定 `paid`**；**成功响应值域收窄** `paid` / `partially_refunded` / `refunded`，不含 `failed` / `PREAUTH_HOLDING`——非成功走非 200）：无挂起期退 = `paid`；挂起期已直退过 = `partially_refunded` / `refunded`（退款度派生）。FE 可据此更新或重读交易。
    Currency:
      type: string
      description: ISO-4217 币种码。本期最小覆盖 CAD/USD/HKD/CNY(部署时可配置扩展)。
      examples:
        - CAD
        - USD
        - HKD
        - CNY
    Money:
      type: object
      description: 金额 = 最小币种单位整数(字符串) + 币种(禁裸数字流转;金额口径:字符串防 JSON number 精度丢失)。
      required:
        - amount
        - currency
      properties:
        amount:
          type: string
          pattern: ^-?[0-9]+$
          description: 最小币种单位整数的字符串(如 CAD 分 "1050";展示层按币种 minorUnit 换算)。可重定义面默认最小单位整数字符串;十进制金额须接口契约显式声明。
        currency:
          $ref: '#/components/schemas/Currency'
    Timestamp:
      type: string
      format: date-time
      description: 'RFC 3339 date-time。in/out 非对称:**响应 MUST UTC `Z`**(如 2026-05-19T14:30:00Z); **请求/query 入参 MAY 任意合法 offset**,服务端归一 UTC(format: date-time 同时接受 Z 与 offset, 「出参 Z」是约定、非 schema 可强制)。展示/清算切日按商户 IANA 时区(单独字段,offset ≠ timezone)。'
    ErrorEnvelope:
      type: object
      description: 统一错误返回(错误响应体:结构化整数 code + detail + 可选 links;扩展 traceId/details)。
      required:
        - code
        - detail
      properties:
        code:
          type: integer
          description: 结构化整数错误码(能力域段 + 责任方类别 + 域内末段;可解析责任方+来源域,与 HTTP 状态正交)。
        detail:
          type: string
          description: 错误描述(面向调用方;本地化按 locale)。
        links:
          type: object
          description: 可选:错误说明 / 后续恢复操作链接。
          additionalProperties:
            type: string
        traceId:
          type: string
          description: 可选:关联 id,串联日志 / 分布式 trace(可观测)。
        details:
          type: array
          description: 可选:字段级校验错误。
          items:
            type: object
            required:
              - field
              - issue
            properties:
              field:
                type: string
              issue:
                type: string
    MerchantBffError:
      description: 商户后台 BFF 错误体 = ErrorEnvelope + 可选 context（错误专属结构化上下文，非字段校验 details）。
      allOf:
        - $ref: '#/components/schemas/ErrorEnvelope'
        - type: object
          properties:
            context:
              type: object
              description: 错误专属结构化上下文（非 details 字段校验数组）。MERCHANT_CONTEXT_CHANGED 时携 currentMerchantId 供前端 re-sync。
              properties:
                currentMerchantId:
                  type:
                    - string
                    - 'null'
                  description: 服务端会话当前商户（≠ 请求携带的 expected X-Merchant-Context）；**null = 无当前商户**（前端须重选）。**契约不变量**：code=208001 时本字段必 **present**（值可为 null）。
    PositiveMoney:
      description: 正额金额（amount = 最小币种单位正非零整数字符串、currency 同 Money）；schema 化收口「> 0」。用于「划多少」类输入（资金划转额 / 阈值 / 退款额等），金额方向由具体业务操作表达、不用正负号表示；区别于 Money（可正可负，用于余额 / 分录 / 结算净额 / 回冲等账面值）。
      allOf:
        - $ref: '#/components/schemas/Money'
        - type: object
          properties:
            amount:
              type: string
              pattern: ^[1-9][0-9]*$
