openapi: 3.1.0
info:
  title: 商户后台 交易管理 (20-05 BFF) — 前端契约面
  version: 0.4.1
  contact:
    name: 商户后台 BFF
  description: |
    商户后台交易域的**读 + 命令**窗口：统一支付交易查询表（多维过滤 + 汇总卡）· 交易详情（含回调技术细节 + 换汇呈现）· 统一退款查询表 · 退款详情 · 支付 / 退款收据（PDF）· 数据导出（Excel）· 发起退款（凭 Refund PIN）· 撤销待处理退款 · 预授权完成（Release）。 交易 / 退款 / 预授权的状态机、清结算、Fee、通道交互归支付核心系统，本域只提供「可见 + 可操作」窗口。 金额一律最小币种单位整数 + currency；列表行不同标价币种不混算，汇总卡单一结算币种（不按标价币种分组）；换汇信息在**后端返回换算信息（通道返回汇率 / 换算信息）时**有条件展示——标价 ≠ 结算币种为典型场景、非判定条件。 **全部端点前置 `Merchant.status = ACTIVE` 门禁**（非 ACTIVE → 403；仅 ACTIVE 商户可用日常能力，会话上下文含 INCOMPLETE / PENDING_REVIEW / REJECTED 仅供入驻 / 拒绝页）。字段类型以本 spec 为准。
servers:
  - url: /api/merchant/v1
    description: 商户后台 BFF（兼前端 BFF）面；浏览器 cookieAuth，非跨部署服务消费面 / 非外部面。
security:
  - cookieAuth: []
tags:
  - name: payments
    description: 支付交易：查询表 / 汇总卡 / 详情 / 收据 / 导出（读）+ 发起退款 / 预授权完成（命令）。
  - name: refunds
    description: 退款：查询表 / 详情 / 收据 / 导出（读）+ 撤销待处理退款（命令）。
paths:
  /payments:
    get:
      tags:
        - payments
      operationId: listPayments
      summary: 统一支付交易查询表（过滤 + 排序 + 分页）
      description: |
        返回当前商户支付交易列表（默认「今日」时间窗）。多维过滤（时间 / 支付方式〔品牌 Family〕/ 来源 / 状态）+ 关键词（订单号 / 备注模糊，金额数值精确、跨标价币种按数值命中）+ 排序 + 分页。 每行金额按其标价币种展示、**不同币种不合并**；行操作可见性（可退 / 收据）由后端返回。查询超时 → 降级（展示「暂不可用」，不返回半截数据）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/PaymentMethodFilter'
        - $ref: '#/components/parameters/PaymentSourceFilter'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - $ref: '#/components/parameters/PaymentKeyword'
        - name: sort
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PaymentSort'
        - $ref: '#/components/parameters/PageNum'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 支付交易分页列表（空 = 空状态、不报错）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentList'
              examples:
                page:
                  summary: 首页 2 条（CAD + CNY 标价、不混算）
                  value:
                    total: 2
                    data:
                      - orderId: P100240001
                        paymentMethod: wechat
                        source: store_qr
                        amount:
                          amount: '10500'
                          currency: CAD
                        status: paid
                        transactionTime: '2026-07-19T03:12:00Z'
                        note: null
                        refundable: true
                        receiptAvailable: true
                      - orderId: P100240002
                        paymentMethod: alipay
                        source: payment_link
                        amount:
                          amount: '20000'
                          currency: CNY
                        status: partially_refunded
                        transactionTime: '2026-07-19T02:40:00Z'
                        note: 门店订单
                        refundable: true
                        receiptAvailable: true
                    statusCounts:
                      - status: null
                        count: 2
                      - status: paid
                        count: 1
                      - status: partially_refunded
                        count: 1
                    filterOptions:
                      paymentMethods:
                        - code: wechat
                          displayName: WeChat Pay
                        - code: alipay
                          displayName: Alipay
                        - code: credit_card
                          displayName: Credit Card
                      sources:
                        - code: store_qr
                          displayName: Store QR
                        - code: payment_link
                          displayName: Payment Link
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
      x-error-codes:
        '409':
          - 208001
  /payments/summary:
    get:
      tags:
        - payments
      operationId: getPaymentSummary
      summary: 交易页头汇总卡（随筛选、单一结算币种）
      description: |
        返回与 `listPayments` 同筛选上下文的汇总卡：交易笔数（币种无关计数）+ **单一结算币种**（标价按成交汇率折算入商户结算币种、**不按标价币种分组**）的 Gross Sales / Refund Amount / Net Sales + To Settle。 To Settle 为账户账务的资金派生值、**不由交易筛选条件重算**（结算币种口径）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/PaymentMethodFilter'
        - $ref: '#/components/parameters/PaymentSourceFilter'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - $ref: '#/components/parameters/PaymentKeyword'
      responses:
        '200':
          description: 汇总卡
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentSummary'
              examples:
                summary:
                  summary: 单一结算币种（CAD）Gross / Refund / Net + To Settle
                  value:
                    transactions: 42
                    grossSales:
                      amount: '700000'
                      currency: CAD
                    refundAmount:
                      amount: '12000'
                      currency: CAD
                    netSales:
                      amount: '688000'
                      currency: CAD
                    toSettle:
                      amount: '495000'
                      currency: CAD
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
      x-error-codes:
        '409':
          - 208001
  /payments/export:
    get:
      tags:
        - payments
      operationId: exportPayments
      summary: 导出支付交易（按当前筛选全集 Excel）
      description: |
        按当前筛选 / 搜索 / 排序条件命中的**全集**（非当前分页）导出当前商户支付交易 Excel。列头 / 枚举 / 金额 / 日期按 locale 本地化（**locale 来源 = `Accept-Language`（BCP-47）→ 回退会话 locale → 商户默认；响应回 `Content-Language`**）、金额带币种。 导出结果集上限为业务参数（部署可配置）；**超过上限 → `400`·204009 拒绝 + 提示缩小筛选范围（不截断、不异步、非上传体过大 413）**，商户收窄条件后重导。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/FromDate'
        - $ref: '#/components/parameters/ToDate'
        - $ref: '#/components/parameters/PaymentMethodFilter'
        - $ref: '#/components/parameters/PaymentSourceFilter'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - $ref: '#/components/parameters/PaymentKeyword'
        - name: sort
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PaymentSort'
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Excel 文件（xlsx）
          headers:
            Content-Disposition:
              required: true
              description: '`attachment; filename=...xlsx`（下载；filename 编码 RFC 5987）——必返'
              schema:
                type: string
            Content-Language:
              required: true
              description: 实际渲染语言（BCP-47；来自 `Accept-Language` → 会话 locale → 商户默认）——**必返**、FE / contract test 可断言
              schema:
                type: string
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '400':
          description: 结果集命中数超业务上限（部署可配置）——缩小时间 / 筛选范围重导（非上传体过大、不截断、不异步）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
      x-error-codes:
        '400':
          - 204009
        '409':
          - 208001
  /payments/{orderId}:
    get:
      tags:
        - payments
      operationId: getPaymentDetail
      summary: 支付交易详情（含技术细节 + 换汇 + 可退摘要）
      description: |
        单笔交易完整详情：概要（金额 / 状态 / 时间 / 已退金额）+ 订单信息（支付方式 / 来源 / Product 归因 / 客户 / 脱敏付款账户 / 商户订单号 / 平台交易号 / Trade Name / 备注 / 确认时间）+ 关联退款列表 + 技术细节（IP / 回调状态 / 延迟 / URL）+ 换汇呈现（涉换汇时）+ 可退摘要（成交 / 已成功 / 在途占用 / 剩余可发起额，供发起退款）。 跨 scope（非本商户 / 不存在）统一 404 反枚举。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: 交易详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentDetail'
              examples:
                cnyWithFx:
                  summary: CNY 标价、涉换汇、部分退款可再退
                  value:
                    orderId: P100240002
                    amount:
                      amount: '20000'
                      currency: CNY
                    status: partially_refunded
                    transactionTime: '2026-07-19T02:40:00Z'
                    confirmedAt: '2026-07-19T02:40:05Z'
                    refundedAmount:
                      amount: '5000'
                      currency: CNY
                    paymentMethod: alipay
                    paymentMethodDisplayName: Alipay
                    source: payment_link
                    sourceDisplayName: Payment Link
                    productAttribution: null
                    customerName: Jane Doe
                    customerEmail: jane@example.com
                    payerAccountMasked: •••• 6789
                    merchantOrderNo: SHOP-INV-8842
                    platformTxnNo: T880240002
                    tradeName: Acme Store
                    note: 门店订单
                    relatedRefunds:
                      - refundNo: R100240002-1
                        refundStatus: SUCCESS
                        amount:
                          amount: '5000'
                          currency: CNY
                        requestTime: '2026-07-19T02:50:00Z'
                    technicalDetails:
                      ip: 203.0.113.7
                      callbackHttpStatus: 200
                      callbackSentAt: '2026-07-19T02:40:06Z'
                      callbackLatencyMs: 120
                      callbackUrl: https://merchant.example/cb
                    fx:
                      payerCurrency: CNY
                      settlementCurrency: CAD
                      exchangeRate: '0.19'
                      note: 按通道返回汇率换算
                    refundability:
                      refundable: true
                      transactedAmount:
                        amount: '20000'
                        currency: CNY
                      successfullyRefunded:
                        amount: '5000'
                        currency: CNY
                      inFlightHold:
                        amount: '0'
                        currency: CNY
                      remainingRefundable:
                        amount: '15000'
                        currency: CNY
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
      x-error-codes:
        '409':
          - 208001
  /payments/{orderId}/receipt:
    get:
      tags:
        - payments
      operationId: getPaymentReceipt
      summary: 支付收据（PDF，可打印）
      description: |
        为**已收款交易**（`paid` / `partially_refunded` / `refunded`）生成可打印支付收据 PDF。 含商户抬头 / 订单号 / 时间 / 金额明细（含退款行 + 净额）/ 状态 / 换汇说明（涉换汇时）；文案按 locale 本地化（**locale 来源 = `Accept-Language`（BCP-47）→ 回退会话 locale → 商户默认；响应回 `Content-Language`**）。 非已收款交易 / `PREAUTH_HOLDING` 挂起单 → 404（无收据）。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: PDF 收据
          headers:
            Content-Disposition:
              required: true
              description: '`inline; filename=...pdf`（浏览器打印 / 另存；filename 编码 RFC 5987）——必返'
              schema:
                type: string
            Content-Language:
              required: true
              description: 实际渲染语言（BCP-47；来自 `Accept-Language` → 会话 locale → 商户默认）——**必返**、FE / contract test 可断言
              schema:
                type: string
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '504':
          $ref: '#/components/responses/UpstreamTimeout'
      x-error-codes:
        '409':
          - 208001
  /payments/{orderId}/refunds:
    post:
      tags:
        - payments
      operationId: createRefund
      summary: 发起退款（全 / 部分 + Refund PIN）
      description: |
        对**可退订单**发起全额 / 部分退款——可退资格 = **后端权威结果**（`paid` / `partially_refunded` ∧ 剩余可发起额 > 0，**或平台挂起 `PREAUTH_HOLDING` 经预授权放行**）；**BFF 不硬编码允许状态**，最终以后端重验为准。金额以成交结果金额币种为准、须 ∈ (0, 剩余可发起额]（= 成交 − 已成功 − 在途占用）。 凭商户级 Refund PIN 授权，PIN 校验结果映射为响应：通过 → 继续；不匹配 / 不可校验 → `403`·206003（反枚举同响应、不披露是否匹配）；连续失败锁定 → `423`·206004（防爆破）；数据完整性故障 → `5xx`。原始 PIN 仅入参、绝不回显。建单后由平台审核规则判定 `REVIEWING` / `CHANNEL_PROCESSING`（`SUBMITTED` 仅建单阶段瞬态、不回显）。 允许与未终态退款并发（各占用其额）。退款原因系统默认 `customer_request`、无商户 picker。 **幂等**：同 `Idempotency-Key` + 同 payload → 返冻结的首次结果、不重复创建退款单；同键异 payload → `409`（208005）；**处理中 → `409`·208011（FE 以同键同 payload 重发 `createRefund` 轮询、无独立查询端点）**。退款单已创建即回 `refundNo` + `refundStatus`（**首次受理为非终态**；**一经成功即冻结**、后续同键重发返冻结结果），终态经后续刷新收敛（FE 勿误读为最终成功）。**可退额校验权威在后端**：BFF 侧剩余可发起额仅 UX 预检（可能陈旧）；后端在受理时原子重验资格 / 币种 / 剩余额并占用——并发两请求之和超限时仅可容纳部分成功、其余以 **`400` + `reason`（机器判别）+ `detail`（人类文案）** 拒绝（可退不足 / 能力关闭 / 产品已核销 / 挂起受理面未开启 均 `400`、**非 `409`**；FE 面 `{code 204008, reason, detail}`——`204007` 仅 BFF `amount` 格式预检〔无 reason〕；FE 据 `reason` enum 区分、重取剩余额后可再退），杜绝并发超退资损。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/CommandIdempotencyKey'
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRefundRequest'
            examples:
              partial:
                summary: 部分退款 + Refund PIN（CNY 成交币种）
                value:
                  amount:
                    amount: '5000'
                    currency: CNY
                  note: 客户退货
                  refundPin: '482913'
      responses:
        '201':
          description: 退款单已受理
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRefundResult'
              examples:
                accepted:
                  summary: 受理（进审核）
                  value:
                    refundNo: R100240002-2
                    refundStatus: REVIEWING
        '400':
          description: 拒绝、不创建。两支判别联合（`code` 区分）：BFF 预检参数错误（`code` `204007`、无 `reason`）或后端业务拒绝（`code` `204008` + `reason` enum 机器判别 + `detail` 人类文案：可退不足 / 能力关闭 / 核销 / 挂起 gate）
          content:
            application/json:
              schema:
                oneOf:
                  - title: BFF 参数预检错误（无 reason）
                    allOf:
                      - $ref: '#/components/schemas/ErrorEnvelope'
                      - type: object
                        properties:
                          code:
                            const: 204007
                          reason: false
                  - title: 后端业务拒绝（reason 必带）
                    allOf:
                      - $ref: '#/components/schemas/ErrorEnvelope'
                      - type: object
                        required:
                          - reason
                        properties:
                          code:
                            const: 204008
                          reason:
                            type: string
                            enum:
                              - insufficient_refundable
                              - amount_invalid
                              - refund_capability_disabled
                              - product_redeemed
                              - settlement_waterfall_insufficient
                              - preauth_acceptance_closed
                            description: 后端业务拒绝判别（FE 据此分流文案）
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/MerchantBffConflict'
        '423':
          description: Refund PIN 连续失败锁定（防爆破、稍后重试）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: 数据完整性故障（ACTIVE 商户缺 Refund PIN 等）——不创建退款单、**不可靠即时重试恢复**（资金路径本就不重试）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'
      x-error-codes:
        '400':
          - 204007
          - 204008
        '403':
          - 206003
        '409':
          - 208001
          - 208005
          - 208011
        '423':
          - 206004
  /payments/{orderId}/preauth-completion:
    post:
      tags:
        - payments
      operationId: releasePreAuth
      summary: 预授权完成（Release：PREAUTH_HOLDING → PAID）
      description: |
        对平台挂起型预授权挂起单（订单状态 `PREAUTH_HOLDING`）执行完成（Release）：订单转 `PAID` 并进入下批清结算。 完成是商户后台**唯一**的预授权操作（作废 / 超时归支付核心）。非 `PREAUTH_HOLDING` → 409。**幂等**：同键 + 同 payload → 返首次结果、不重复完成；同键异 payload → `409`（208005）；失败停留 `PREAUTH_HOLDING` 可重试。
      parameters:
        - $ref: '#/components/parameters/MerchantContextGuard'
        - $ref: '#/components/parameters/CsrfToken'
        - $ref: '#/components/parameters/CommandIdempotencyKey'
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: 完成成功（订单商户状态由后端派生：paid / partially_refunded / refunded）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreAuthCompletionResult'
              examples:
                released:
                  summary: 预授权完成 → PAID
                  value:
                    orderId: P100240003
                    status: paid
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
